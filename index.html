        const ViewLogin = ({ onLoginSuccess, firebaseActive, triggerAlert, appInfo }) => {
            const [nip, setNip] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [activeRoleTab, setActiveRoleTab] = useState('guru'); 

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                const cleanNip = nip.trim();
                const cleanPassword = password.trim();

                try {
                    if (!firebaseActive) {
                        const localUsers = JSON.parse(safeStorage.getItem('jurnal_gurus')) || DUMMY_USERS;
                        const match = localUsers.find(g => g.nip === cleanNip && g.password === cleanPassword && g.role === activeRoleTab);
                        if (match) {
                            onLoginSuccess(match);
                        } else {
                            setError(`NIP/Username atau password salah!`);
                        }
                    } else {
                        const { getFirestore, collection, query, where, getDocs } = window.firebaseFirestoreSDK;
                        const db = window.activeDb;
                        const q = query(
                            collection(db, "gurus"), 
                            where("nip", "==", cleanNip), 
                            where("password", "==", cleanPassword),
                            where("role", "==", activeRoleTab)
                        );
                        const querySnapshot = await getDocs(q);
                        
                        if (!querySnapshot.empty) {
                            const docData = querySnapshot.docs[0];
                            onLoginSuccess({ id: docData.id, ...docData.data() });
                        } else {
                            setError(`Data login tidak terdaftar di database cloud!`);
                        }
                    }
                } catch (err) {
                    console.error(err);
                    setError('Koneksi database gagal atau terjadi pembatasan browser.');

                                    placeholder={activeRoleTab === 'admin' ? "admin" : "NIP/Username"} 
                                    value={nip} 
                                    onChange={e => setNip(e.target.value)} 
                                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition placeholder-slate-500"
                                />
                            </div>

                            <div>
                                <label className="block text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-1.5">Kata Sandi</label>
                                <input 
                                    type="password" 
                                    required 
                                    placeholder="••••••••" 
                                    value={password} 
                                    onChange={e => setPassword(e.target.value)} 
                                    className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition placeholder-slate-500"
                                />
                            </div>

                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition duration-150 disabled:opacity-50 text-sm mt-2 shadow-lg shadow-indigo-600/30"
                            >
                                {loading ? 'Memvalidasi...' : `Masuk Sebagai ${activeRoleTab.toUpperCase()}`}
                            </button>
                        </form>
                    </div>

                    {/* Menampilkan Versi dan Pembuat Aplikasi pada Halaman Login */}
                    <div className="mt-6 text-center text-xs text-slate-400/80 space-y-1">
                        <p className="font-semibold tracking-wide">Versi Aplikasi: <span className="text-indigo-400">{appInfo.version}</span></p>
                        <p>Pembuat: <span className="text-slate-300 font-medium">{appInfo.creator}</span></p>
                    </div>
                </div>
            );
        };

        const ViewKelolaInfo = ({ appInfo, updateAppInfo, triggerAlert }) => {
            const [version, setVersion] = useState(appInfo.version || '');
            const [creator, setCreator] = useState(appInfo.creator || '');
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                setVersion(appInfo.version || '');
                setCreator(appInfo.creator || '');
            }, [appInfo]);

            const handleSave = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    await updateAppInfo({ version, creator });
                    triggerAlert("Informasi Diperbarui", "Versi dan nama pembuat aplikasi berhasil disimpan!");
                } catch (err) {
                    console.error(err);
                    triggerAlert("Error", "Gagal memperbarui informasi aplikasi.");
                }
                setIsSaving(false);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in duration-200">
                    <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                        <IconInfo />
                        <span>Pengaturan Informasi Aplikasi</span>
                    </h3>
                    
                    <form onSubmit={handleSave} className="space-y-5">
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Versi Aplikasi (Muncul di Halaman Login)</label>
                            <input 
                                type="text" 
                                required 
                                placeholder="Contoh: v1.2.0-Alpha" 
                                value={version} 
                                onChange={e => setVersion(e.target.value)} 
                                className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm font-semibold text-slate-800" 
                            />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Pembuat Aplikasi / Tim IT</label>
                            <input 
                                type="text" 
                                required 
                                placeholder="Contoh: Tim IT SMK Negeri 3 Selayar" 
                                value={creator} 
                                onChange={e => setCreator(e.target.value)} 
                                className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm font-semibold text-slate-800" 
                            />
                        </div>

                        <div className="p-5 border border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 text-center">Pratinjau Tampilan Footer Login</h4>
                            <div className="bg-slate-900 p-4 rounded-xl text-center text-xs text-slate-400">
                                <p className="font-semibold tracking-wide">Versi Aplikasi: <span className="text-indigo-400">{version || 'v1.0.0'}</span></p>
                                <p className="mt-0.5">Pembuat: <span className="text-slate-300 font-medium">{creator || 'Developer'}</span></p>
                            </div>
                        </div>

                        <button 
                            type="submit" 
                            disabled={isSaving} 
                            className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-150 text-sm shadow-lg shadow-indigo-600/20 disabled:opacity-50"
                        >
                            {isSaving ? 'Menyimpan...' : 'Simpan Informasi Aplikasi'}
                        </button>
                    </form>
                </div>
            );
        };

        const ViewKelolaGaleri = ({ journals, deleteJournalPhoto, deleteJournalPhotosBulk, triggerAlert, triggerConfirm }) => {
            const [selectedPhotoIds, setSelectedPhotoIds] = useState([]);

            // Memfilter jurnal yang memiliki foto dokumentasi valid (bukan placeholder standar)
            const journalsWithPhotos = useMemo(() => {
                return journals.filter(j => 
                    j.fotoUrl && 
                    j.fotoUrl !== "" && 
                    !j.fotoUrl.includes("Tidak+Ada+Dokumentasi+KBM") &&
                    !j.fotoUrl.includes("placehold.co/800x450/e2e8f0")
                );
            }, [journals]);

            const handleSelectPhoto = (id) => {
                setSelectedPhotoIds(prev => 
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            const handleSelectAll = () => {
                const allIds = journalsWithPhotos.map(j => j.id);
                const allSelected = allIds.every(id => selectedPhotoIds.includes(id));
                if (allSelected) {
                    setSelectedPhotoIds(prev => prev.filter(id => !allIds.includes(id)));
                } else {
                    setSelectedPhotoIds(prev => [...new Set([...prev, ...allIds])]);
                }
            };

            const handleDeleteSingle = (id) => {
                triggerConfirm(
                    "Hapus Foto Dokumentasi",
                    "Apakah Anda yakin ingin menghapus foto ini secara permanen dari database? Jurnal KBM tetap akan dipertahankan.",
                    async () => {
                        try {
                            await deleteJournalPhoto(id);
                            setSelectedPhotoIds(prev => prev.filter(item => item !== id));
                            triggerAlert("Berhasil", "Foto dokumentasi telah dihapus!");
                        } catch (err) {
                            console.error(err);
                            triggerAlert("Error", "Gagal menghapus foto.");
                        }
                    }
                );
            };

            const handleDeleteBulk = () => {
                if (selectedPhotoIds.length === 0) return;
                triggerConfirm(
                    "Hapus Massal Foto",
                    `Apakah Anda yakin ingin menghapus ${selectedPhotoIds.length} foto terpilih secara permanen?`,
                    async () => {
                        try {
                            await deleteJournalPhotosBulk(selectedPhotoIds);
                            setSelectedPhotoIds([]);
                            triggerAlert("Sukses", "Foto yang dipilih berhasil dihapus secara massal.");
                        } catch (err) {
                            console.error(err);
                            triggerAlert("Error", "Gagal melakukan penghapusan massal.");
                        }
                    }
                );
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-200">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-4 mb-6">
                            <div>
                                <h3 className="text-lg font-bold text-slate-900">Galeri Media Foto Dokumentasi KBM</h3>
                                <p className="text-slate-500 text-xs mt-0.5">Memantau dan mengelola berkas media yang di-upload oleh Guru</p>
                            </div>
                            {journalsWithPhotos.length > 0 && (
                                <div className="flex items-center gap-3">
                                    <button 
                                        onClick={handleSelectAll}
                                        className="px-4 py-2 border border-slate-200 text-slate-700 hover:bg-slate-50 rounded-xl text-xs font-semibold transition"
                                    >
                                        {journalsWithPhotos.every(j => selectedPhotoIds.includes(j.id)) ? 'Batal Pilih Semua' : 'Pilih Semua'}
                                    </button>
                                    {selectedPhotoIds.length > 0 && (
                                        <button 
                                            onClick={handleDeleteBulk}
                                            className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-xs font-bold transition flex items-center space-x-1.5 shadow-md shadow-rose-600/15"
                                        >
                                            <IconTrash />
                                            <span>Hapus Terpilih ({selectedPhotoIds.length})</span>
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>

                        {journalsWithPhotos.length === 0 ? (
                            <div className="p-12 text-center text-slate-400 bg-slate-50 rounded-2xl border border-dashed flex flex-col items-center justify-center space-y-2">
                                <IconImage className="w-10 h-10 text-slate-300" />
                                <p className="font-semibold text-sm">Tidak Ada Foto Dokumentasi</p>
                                <p className="text-xs">Foto yang di-upload oleh guru saat mengisi jurnal mengajar akan muncul di panel ini.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {journalsWithPhotos.map(j => (
                                    <div 
                                        key={j.id} 
                                        className={`relative group bg-slate-50 rounded-2xl overflow-hidden border transition-all duration-200 ${selectedPhotoIds.includes(j.id) ? 'border-indigo-600 ring-2 ring-indigo-500/20' : 'border-slate-100 hover:shadow-md'}`}
                                    >
                                        {/* Checkbox Overlay */}
                                        <div className="absolute top-3 left-3 z-10">
                                            <input 
                                                type="checkbox" 
                                                checked={selectedPhotoIds.includes(j.id)}
                                                onChange={() => handleSelectPhoto(j.id)}
                                                className="w-5 h-5 cursor-pointer accent-indigo-600 rounded-lg shadow-sm"
                                            />
                                        </div>

                                        {/* Action Button Overlay */}
                                        <div className="absolute top-3 right-3 z-10 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
                                            <button 
                                                onClick={() => handleDeleteSingle(j.id)}
                                                className="p-2 bg-rose-600 hover:bg-rose-700 text-white rounded-xl shadow-lg transition-all"
                                                title="Hapus Foto ini"
                                            >
                                                <IconTrash />
                                            </button>
                                        </div>

                                        {/* Image Display */}
                                        <div className="relative aspect-[4/3] bg-slate-200 overflow-hidden">
                                            <img 
                                                src={j.fotoUrl} 
                                                alt={j.materi} 
                                                className="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" 
                                            />
                                        </div>

                                        {/* Meta Description Card */}
                                        <div className="p-4">
                                            <span className="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold bg-indigo-50 text-indigo-700 mb-2 uppercase">
                                                {j.kelas} - {j.mapel}
                                            </span>
                                            <h4 className="text-xs font-bold text-slate-800 line-clamp-1 mb-1">{j.materi}</h4>
                                            <p className="text-[10px] text-slate-400 font-semibold mb-2">{j.tanggal}</p>
                                            <div className="border-t border-slate-100 pt-2 flex items-center justify-between">
                                                <span className="text-[10px] font-medium text-slate-500 truncate" title={j.guru_nama}>
                                                    By: {j.guru_nama}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [journals, setJournals] = useState([]);
            const [gurus, setGurus] = useState([]);
            const [classes, setClasses] = useState([]);
            const [subjects, setSubjects] = useState([]);
            const [kop, setKop] = useState(DEFAULT_KOP);
            const [loading, setLoading] = useState(true);
            const [firebaseActive, setFirebaseActive] = useState(false);
            const [loggedInUser, setLoggedInUser] = useState(null);
            
            const [appInfo, setAppInfo] = useState({ version: 'v1.0.0-Release', creator: 'Developer SMK Negeri 3 Selayar' });

            const [meetings, setMeetings] = useState([]);
            const [meetingGrades, setMeetingGrades] = useState([]);

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '' });

            const triggerConfirm = (title, message, callback) => {
                setConfirmState({
                    isOpen: true,
                    title,
                    message,
                    onConfirm: () => {
                        callback();
                        setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null });
                    }
                });
            };

            const triggerAlert = (title, message) => {
                setAlertState({ isOpen: true, title, message });
            };

            // Pemulihan sesi pengguna dari storage local
            useEffect(() => {
                const savedUser = safeStorage.getItem('jurnal_active_user');
                if (savedUser) {
                    try {
                        setLoggedInUser(JSON.parse(savedUser));
                    } catch (e) {
                        safeStorage.removeItem('jurnal_active_user');
                    }
                }
            }, []);

            // Logika inisiasi koneksi Firebase vs LocalStorage
            useEffect(() => {
                let checkAttempts = 0;
                const checkFirebaseLib = setInterval(() => {
                    checkAttempts++;
                    const hasCredentials = firebaseConfig.apiKey !== "API_KEY_ANDA" && !IS_PREVIEW;

                    if (window.firebaseInitialized && hasCredentials) {
                        clearInterval(checkFirebaseLib);
                        setupFirebaseConnection();
                    } else if (checkAttempts > 8 || !hasCredentials) {
                        clearInterval(checkFirebaseLib);
                        setupLocalStorageConnection();
                    }
                }, 150);
            }, []);

            const setupFirebaseConnection = async () => {
                try {
                    const { initializeApp } = window.firebaseCore;
                    const { getAuth, signInAnonymously } = window.firebaseAuthSDK;
                    const { getFirestore, collection, onSnapshot, doc, setDoc } = window.firebaseFirestoreSDK;

                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);

                    await signInAnonymously(auth);

                    setFirebaseActive(true);
                    window.activeDb = db;

                    // Mengatur Sinkronisasi KOP Cetak
                    const kopRef = doc(db, "configs", "kop");
                    onSnapshot(kopRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setKop(docSnap.data());
                        } else {
                            setDoc(kopRef, DEFAULT_KOP);
                            setKop(DEFAULT_KOP);
                        }
                    });

                    const infoRef = doc(db, "configs", "info");
                    onSnapshot(infoRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setAppInfo(docSnap.data());
                        } else {
                            const defaultInfo = { version: 'v1.0.0-Release', creator: 'Developer SMK Negeri 3 Selayar' };
                            setDoc(infoRef, defaultInfo);
                            setAppInfo(defaultInfo);
                        }
                    });

                    // Sinkronisasi Siswa
                    const studentsRef = collection(db, "students");
                    onSnapshot(studentsRef, (snapshot) => {
                        if (snapshot.empty) {
                            autoSetupDatabase(db);
                        } else {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                            setStudents(data);
                        }
                    });

                    // Sinkronisasi Jurnal
                    const journalsRef = collection(db, "journals");
                    onSnapshot(journalsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                        setJournals(data);
                    });

                    // Sinkronisasi Akun Pengguna
                    const gurusRef = collection(db, "gurus");
                    onSnapshot(gurusRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setGurus(data);
                    });

                    // Sinkronisasi Referensi Kelas
                    const classesRef = collection(db, "classes");
                    onSnapshot(classesRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => a.nama.localeCompare(b.nama));
                        setClasses(data);
                    });

                    // Sinkronisasi Referensi Mapel
                    const subjectsRef = collection(db, "subjects");
                    onSnapshot(subjectsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => a.nama.localeCompare(b.nama));
                        setSubjects(data);
                    });

                    // Sinkronisasi Sesi Pertemuan Penilaian
                    const meetingsRef = collection(db, "meetings");
                    onSnapshot(meetingsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setMeetings(data);
                    }, (err) => console.error("Firebase Sync Error (meetings):", err));

                    // Sinkronisasi Rekaman Nilai Pertemuan
                    const meetingGradesRef = collection(db, "meeting_grades");
                    onSnapshot(meetingGradesRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setMeetingGrades(data);
                    }, (err) => console.error("Firebase Sync Error (meeting_grades):", err));

                    setLoading(false);
                } catch (error) {
                    console.error("Firebase Gagal. Berpindah ke Simulasi localstorage.", error);
                    setupLocalStorageConnection();
                }
            };

            const setupLocalStorageConnection = () => {
                setFirebaseActive(false);
                
                if (!safeStorage.getItem('jurnal_kop')) {
                    safeStorage.setItem('jurnal_kop', JSON.stringify(DEFAULT_KOP));
                }
                if (!safeStorage.getItem('jurnal_app_info')) {
                    safeStorage.setItem('jurnal_app_info', JSON.stringify({ version: 'v1.0.0-Release', creator: 'Developer SMK Negeri 3 Selayar' }));
                }
                if (!safeStorage.getItem('jurnal_students')) {
                    safeStorage.setItem('jurnal_students', JSON.stringify(DUMMY_STUDENTS));
                }
                if (!safeStorage.getItem('jurnal_journals')) {
                    safeStorage.setItem('jurnal_journals', JSON.stringify(DUMMY_JOURNALS));
                }
                if (!safeStorage.getItem('jurnal_gurus')) {
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(DUMMY_USERS));
                }
                if (!safeStorage.getItem('jurnal_classes')) {
                    safeStorage.setItem('jurnal_classes', JSON.stringify([{ id: "c1", nama: "XI-A" }, { id: "c2", nama: "XI-B" }]));
                }
                if (!safeStorage.getItem('jurnal_subjects')) {
                    safeStorage.setItem('jurnal_subjects', JSON.stringify([{ id: "sub1", nama: "Matematika" }, { id: "sub2", nama: "Fisika" }]));
                }
                if (!safeStorage.getItem('jurnal_meetings')) {
                    safeStorage.setItem('jurnal_meetings', JSON.stringify([]));
                }
                if (!safeStorage.getItem('jurnal_meeting_grades')) {
                    safeStorage.setItem('jurnal_meeting_grades', JSON.stringify([]));
                }

                const localKop = JSON.parse(safeStorage.getItem('jurnal_kop'));
                const localInfo = JSON.parse(safeStorage.getItem('jurnal_app_info'));
                const localStuds = JSON.parse(safeStorage.getItem('jurnal_students'));
                const localJourns = JSON.parse(safeStorage.getItem('jurnal_journals'));
                const localGurus = JSON.parse(safeStorage.getItem('jurnal_gurus'));
                const localClasses = JSON.parse(safeStorage.getItem('jurnal_classes'));
                const localSubjects = JSON.parse(safeStorage.getItem('jurnal_subjects'));
                const localMeetings = JSON.parse(safeStorage.getItem('jurnal_meetings')) || [];
                const localMeetingGrades = JSON.parse(safeStorage.getItem('jurnal_meeting_grades')) || [];

                localStuds.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                localJourns.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                localClasses.sort((a, b) => a.nama.localeCompare(b.nama));
                localSubjects.sort((a, b) => a.nama.localeCompare(b.nama));

                setKop(localKop);
                setAppInfo(localInfo);
                setStudents(localStuds);
                setJournals(localJourns);
                setGurus(localGurus);
                setClasses(localClasses);
                setSubjects(localSubjects);
                setMeetings(localMeetings);
                setMeetingGrades(localMeetingGrades);
                setLoading(false);
            };

            const autoSetupDatabase = async (db) => {
                const { collection, addDoc, doc, setDoc } = window.firebaseFirestoreSDK;
                const studentsRef = collection(db, "students");
                const journalsRef = collection(db, "journals");
                const gurusRef = collection(db, "gurus");
                const classesRef = collection(db, "classes");
                const subjectsRef = collection(db, "subjects");
                const kopRef = doc(db, "configs", "kop");
                const infoRef = doc(db, "configs", "info");

                await setDoc(kopRef, DEFAULT_KOP);
                await setDoc(infoRef, { version: 'v1.0.0-Release', creator: 'Developer SMK Negeri 3 Selayar' });

                for (const student of DUMMY_STUDENTS) {
                    await addDoc(studentsRef, {
                        nis: student.nis,
                        nama: student.nama,
                        kelas: student.kelas
                    });
                }
                for (const jrn of DUMMY_JOURNALS) {
                    await addDoc(journalsRef, {
                        tanggal: jrn.tanggal,
                        kelas: jrn.kelas,
                        mapel: jrn.mapel,
                        materi: jrn.materi,
                        catatan: jrn.catatan,
                        fotoUrl: jrn.fotoUrl,
                        waktu_input: jrn.waktu_input,
                        guru_nama: jrn.guru_nama,
                        guru_nip: jrn.guru_nip,
                        absensi_data: jrn.absensi_data,
                        rekap: jrn.rekap,
                        jumlah_jam: jrn.jumlah_jam || "2",
                        guru_pengganti: jrn.guru_pengganti || ""
                    });
                }
                for (const gr of DUMMY_USERS) {
                    await addDoc(gurusRef, {
                        nip: gr.nip,
                        nama: gr.nama,
                        password: gr.password,
                        role: gr.role,
                        mapel: gr.mapel
                    });
                }
                await addDoc(classesRef, { nama: "XI-A" });
                await addDoc(classesRef, { nama: "XI-B" });
                await addDoc(subjectsRef, { nama: "Matematika" });
                await addDoc(subjectsRef, { nama: "Fisika" });
            };

            const handleLoginSuccess = (userData) => {
                setLoggedInUser(userData);
                safeStorage.setItem('jurnal_active_user', JSON.stringify(userData));
                setCurrentView('dashboard');
            };

            const handleLogout = () => {
                triggerConfirm(
                    "Keluar Aplikasi",
                    "Apakah Anda yakin ingin mengakhiri sesi dan keluar dari sistem Jurnal?",
                    () => {
                        setLoggedInUser(null);
                        safeStorage.removeItem('jurnal_active_user');
                    }
                );
            };

            const updateKop = async (newKop) => {
                if (firebaseActive) {
                    const { doc, setDoc } = window.firebaseFirestoreSDK;
                    await setDoc(doc(window.activeDb, "configs", "kop"), newKop);
                } else {
                    safeStorage.setItem('jurnal_kop', JSON.stringify(newKop));
                    setKop(newKop);
                }
            };

            const updateAppInfo = async (newInfo) => {
                if (firebaseActive) {
                    const { doc, setDoc } = window.firebaseFirestoreSDK;
                    await setDoc(doc(window.activeDb, "configs", "info"), newInfo);
                } else {
                    safeStorage.setItem('jurnal_app_info', JSON.stringify(newInfo));
                    setAppInfo(newInfo);
                }
            };

            const deleteJournalPhoto = async (id) => {
                const emptyPhoto = "https://placehold.co/800x450/e2e8f0/64748b?text=Tidak+Ada+Dokumentasi+KBM";
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, "journals", id), { fotoUrl: emptyPhoto });
                } else {
                    const updated = journals.map(j => j.id === id ? { ...j, fotoUrl: emptyPhoto } : j);
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                    setJournals(updated);
                }
            };

            const deleteJournalPhotosBulk = async (ids) => {
                const emptyPhoto = "https://placehold.co/800x450/e2e8f0/64748b?text=Tidak+Ada+Dokumentasi+KBM";
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    for (const id of ids) {
                        await updateDoc(doc(window.activeDb, "journals", id), { fotoUrl: emptyPhoto });
                    }
                } else {
                    const updated = journals.map(j => ids.includes(j.id) ? { ...j, fotoUrl: emptyPhoto } : j);
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                    setJournals(updated);
                }
            };

            const addStudent = async (newStudent) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "students"), newStudent);
                } else {
                    const updated = [...students, { id: 'local_' + Date.now(), ...newStudent }];
                    updated.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const updateStudent = async (id, updatedStudent) => {
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, "students", id), updatedStudent);
                } else {
                    const updated = students.map(s => s.id === id ? { ...s, ...updatedStudent } : s);
                    updated.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const addStudentsBulk = async (studentList) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    const studentsRef = collection(window.activeDb, "students");
                    for (const student of studentList) {
                        await addDoc(studentsRef, student);
                    }
                } else {
                    const localWithIds = studentList.map((s, idx) => ({
                        id: 'local_bulk_' + Date.now() + '_' + idx,
                        ...s
                    }));
                    const updated = [...students, ...localWithIds];
                    updated.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const deleteStudent = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, "students", id));
                } else {
                    const updated = students.filter(s => s.id !== id);
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const deleteStudentsBulk = async (ids) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    for (const id of ids) {
                        await deleteDoc(doc(window.activeDb, "students", id));
                    }
                } else {
                    const updated = students.filter(s => !ids.includes(s.id));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const addJournal = async (newJournal) => {
                const journalPayload = {
                    ...newJournal,
                    guru_nama: loggedInUser.nama,
                    guru_nip: loggedInUser.nip
                };

                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "journals"), journalPayload);
                } else {
                    const updated = [{ id: 'j_local_' + Date.now(), ...journalPayload }, ...journals];
                    updated.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                    setJournals(updated);
                }
            };

            const deleteJournal = async (id) => {
                triggerConfirm(
                    "Hapus Jurnal Mengajar",
                    "Apakah Anda yakin ingin menghapus data jurnal ini secara permanen?",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "journals", id));
                        } else {
                            const updated = journals.filter(j => j.id !== id);
                            safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                            setJournals(updated);
                        }
                    }
                );
            };

            const addGuru = async (newGuru) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "gurus"), newGuru);
                } else {
                    const updated = [...gurus, { id: 'g_local_' + Date.now(), ...newGuru }];
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(updated));
                    setGurus(updated);
                }
            };

            const updateGuru = async (id, updatedGuru) => {
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, "gurus", id), updatedGuru);
                } else {
                    const updated = gurus.map(g => g.id === id ? { ...g, ...updatedGuru } : g);
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(updated));
                    setGurus(updated);
                }
                
                if (loggedInUser && loggedInUser.id === id) {
                    const newSession = { ...loggedInUser, ...updatedGuru };
                    setLoggedInUser(newSession);
                    safeStorage.setItem('jurnal_active_user', JSON.stringify(newSession));
                }
            };

            const deleteGuru = async (id) => {
                triggerConfirm(
                    "Hapus Akun Pengguna",
                    "Apakah Anda yakin ingin menghapus akun ini secara permanen dari sistem?",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "gurus", id));
                        } else {
                            const updated = gurus.filter(g => g.id !== id);
                            safeStorage.setItem('jurnal_gurus', JSON.stringify(updated));
                            setGurus(updated);
                        }
                    }
                );
            };

            const addClass = async (newClass) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "classes"), newClass);
                } else {
                    const updated = [...classes, { id: 'class_' + Date.now(), ...newClass }];
                    updated.sort((a, b) => a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_classes', JSON.stringify(updated));
                    setClasses(updated);
                }
            };

            const deleteClass = async (id) => {
                triggerConfirm(
                    "Hapus Kelas",
                    "Apakah Anda yakin ingin menghapus kelas ini? Tindakan ini dapat mempengaruhi dropdown kelas di menu lain.",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "classes", id));
                        } else {
                            const updated = classes.filter(c => c.id !== id);
                            safeStorage.setItem('jurnal_classes', JSON.stringify(updated));
                            setClasses(updated);
                        }
                    }
                );
            };

            const addSubject = async (newSub) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "subjects"), newSub);
                } else {
                    const updated = [...subjects, { id: 'sub_' + Date.now(), ...newSub }];
                    updated.sort((a, b) => a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_subjects', JSON.stringify(updated));
                    setSubjects(updated);
                }
            };

            const deleteSubject = async (id) => {
                triggerConfirm(
                    "Hapus Mata Pelajaran",
                    "Apakah Anda yakin ingin menghapus mata pelajaran ini? Tindakan ini dapat mempengaruhi dropdown mapel di menu lain.",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "subjects", id));
                        } else {
                            const updated = subjects.filter(s => s.id !== id);
                            safeStorage.setItem('jurnal_subjects', JSON.stringify(updated));
                            setSubjects(updated);
                        }
                    }
                );
            };

            const addMeeting = async (newMeeting) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "meetings"), newMeeting);
                } else {
                    const updated = [...meetings, { id: 'm_' + Date.now(), ...newMeeting }];
                    safeStorage.setItem('jurnal_meetings', JSON.stringify(updated));
                    setMeetings(updated);
                }
            };

            const deleteMeeting = async (meetingId) => {
                if (firebaseActive) {
                    const { doc, deleteDoc, collection, query, where, getDocs } = window.firebaseFirestoreSDK;
                    const db = window.activeDb;
                    await deleteDoc(doc(db, "meetings", meetingId));
                    try {
                        const gradesQ = query(collection(db, "meeting_grades"), where("meetingId", "==", meetingId));
                        const snapshot = await getDocs(gradesQ);
                        for (const docSnap of snapshot.docs) {
                            await deleteDoc(doc(db, "meeting_grades", docSnap.id));
                        }
                    } catch (e) {
                        console.error("Gagal membersihkan database nilai pertemuan:", e);
                    }
                } else {
                    const updatedMeetings = meetings.filter(m => m.id !== meetingId);
                    const updatedGrades = meetingGrades.filter(g => g.meetingId !== meetingId);
                    safeStorage.setItem('jurnal_meetings', JSON.stringify(updatedMeetings));
                    safeStorage.setItem('jurnal_meeting_grades', JSON.stringify(updatedGrades));
                    setMeetings(updatedMeetings);
                    setMeetingGrades(updatedGrades);
                }
            };

            const saveMeetingGrade = async (studentId, meetingId, nilai) => {
                const payload = {
                    studentId,
                    meetingId,
                    nilai: nilai !== null ? Number(nilai) : null
                };

                const existing = meetingGrades.find(g => g.studentId === studentId && g.meetingId === meetingId);

                if (firebaseActive) {
                    const { collection, doc, addDoc, updateDoc } = window.firebaseFirestoreSDK;
                    const db = window.activeDb;
                    if (existing) {
                        await updateDoc(doc(db, "meeting_grades", existing.id), { nilai });
                    } else {
                        await addDoc(collection(db, "meeting_grades"), payload);
                    }
                } else {
                    let updated;
                    if (existing) {
                        updated = meetingGrades.map(g => g.id === existing.id ? { ...g, nilai } : g);
                    } else {
                        updated = [...meetingGrades, { id: 'mg_' + Date.now(), ...payload }];
                    }
                    safeStorage.setItem('jurnal_meeting_grades', JSON.stringify(updated));
                    setMeetingGrades(updated);
                }
            };

            const deleteMeetingGradesSingle = async (studentId, meetingIds) => {
                const targetGrades = meetingGrades.filter(g => g.studentId === studentId && meetingIds.includes(g.meetingId));
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    const db = window.activeDb;
                    for (const g of targetGrades) {
                        await deleteDoc(doc(db, "meeting_grades", g.id));
                    }
                } else {
                    const idsToRemove = targetGrades.map(g => g.id);
                    const updated = meetingGrades.filter(g => !idsToRemove.includes(g.id));
                    safeStorage.setItem('jurnal_meeting_grades', JSON.stringify(updated));
                    setMeetingGrades(updated);
                }
            };

            const deleteMeetingGradesBulk = async (gradesList) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    const db = window.activeDb;
                    for (const g of gradesList) {
                        await deleteDoc(doc(db, "meeting_grades", g.id));
                    }
                } else {
                    const idsToRemove = gradesList.map(g => g.id);
                    const updated = meetingGrades.filter(g => !idsToRemove.includes(g.id));
                    safeStorage.setItem('jurnal_meeting_grades', JSON.stringify(updated));
                    setMeetingGrades(updated);
                }
            };

            if (loading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white space-y-4">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-lg font-semibold tracking-wider">Menyiapkan Aplikasi Jurnal...</p>
                        <p className="text-xs text-slate-400">Menyinkronkan database sekolah secara aman</p>
                    </div>
                );
            }

            if (!loggedInUser) {
                return <ViewLogin onLoginSuccess={handleLoginSuccess} firebaseActive={firebaseActive} triggerAlert={triggerAlert} appInfo={appInfo} />;
            }

            const isKepsek = loggedInUser.role === 'kepsek';
            const isAdmin = loggedInUser.role === 'admin';

            return (
                <div className="flex h-screen overflow-hidden">
                    <CustomConfirmModal 
                        isOpen={confirmState.isOpen}
                        title={confirmState.title}
                        message={confirmState.message}
                        onConfirm={confirmState.onConfirm}
                        onCancel={() => setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null })}
                    />

                    <CustomAlertModal 
                        isOpen={alertState.isOpen}
                        title={alertState.title}
                        message={alertState.message}
                        onClose={() => setAlertState({ isOpen: false, title: '', message: '' })}
                    />

                    {/* Sidebar Navigasi Permanen di Desktop */}
                    <aside className="hidden md:flex w-72 bg-slate-900 text-white flex-col shadow-2xl print-hidden flex-shrink-0 z-30">
                        <div className="p-8 border-b border-indigo-950 flex items-center space-x-3">
                            <div className="p-2.5 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-600/30">
                                <IconBook />
                            </div>
                            <div>
                                <h1 className="text-lg font-black tracking-tight leading-none text-white">E-JURNAL</h1>
                                <span className="text-indigo-400 text-[10px] font-semibold tracking-widest uppercase">
                                    {isAdmin ? 'ADMINISTRATOR' : isKepsek ? 'KEPALA SEKOLAH' : 'GURU TERPADU'}
                                </span>
                            </div>
                        </div>

                        <div className="px-8 mt-4">
                            <div className={`text-[10px] uppercase font-bold py-1.5 px-3 rounded-full flex items-center space-x-2 w-fit ${firebaseActive ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}`}>
                                <span className={`w-2 h-2 rounded-full ${firebaseActive ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`}></span>
                                <span>{firebaseActive ? 'Firebase Server' : 'Mode Simulasi'}</span>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 py-8 space-y-1.5 overflow-y-auto">
                            {isAdmin ? (
                                <>
                                    <MenuButton icon={<IconDashboard />} label="Dashboard Admin" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                    <MenuButton icon={<IconUsers />} label="Kelola Akun Guru" isActive={currentView === 'kelola_guru'} onClick={() => setCurrentView('kelola_guru')} />
                                    <MenuButton icon={<IconBook />} label="Referensi Kelas &amp; Mapel" isActive={currentView === 'kelola_referensi'} onClick={() => setCurrentView('kelola_referensi')} />
                                    <MenuButton icon={<IconPrint />} label="Pengaturan Kop Cetak" isActive={currentView === 'kelola_kop'} onClick={() => setCurrentView('kelola_kop')} />
                                    <MenuButton icon={<IconInfo />} label="Informasi Aplikasi" isActive={currentView === 'kelola_info'} onClick={() => setCurrentView('kelola_info')} />
                                    <MenuButton icon={<IconImage />} label="Galeri Foto KBM" isActive={currentView === 'kelola_galeri'} onClick={() => setCurrentView('kelola_galeri')} />
                                    <MenuButton icon={<IconLock />} label="Kelola Akun Kepsek" isActive={currentView === 'kelola_kepsek'} onClick={() => setCurrentView('kelola_kepsek')} />
                                    <MenuButton icon={<IconLock />} label="Pengaturan Admin" isActive={currentView === 'kelola_admin'} onClick={() => setCurrentView('kelola_admin')} />
                                </>
                            ) : isKepsek ? (
                                <>
                                    <MenuButton icon={<IconDashboard />} label="Dashboard Kepsek" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                    <MenuButton icon={<IconHistory />} label="Monitoring Jurnal" isActive={currentView === 'monitoring_jurnal'} onClick={() => setCurrentView('monitoring_jurnal')} />
                                    <MenuButton icon={<IconChart />} label="Rekap &amp; Laporan" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                </>
                            ) : (
                                <>
                                    <MenuButton icon={<IconDashboard />} label="Dashboard" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                    <MenuButton icon={<IconUsers />} label="Data Siswa" isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                    <MenuButton icon={<IconBook />} label="Isi Jurnal &amp; Absen" isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                                    <MenuButton icon={<IconHistory />} label="Riwayat Jurnal" isActive={currentView === 'riwayat'} onClick={() => setCurrentView('riwayat')} />
                                    <MenuButton icon={<IconChart />} label="Penilaian Siswa" isActive={currentView === 'penilaian'} onClick={() => setCurrentView('penilaian')} />
                                    <MenuButton icon={<IconChart />} label="Rekap Laporan" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                </>
                            )}
                        </nav>

                        <div className="p-6 border-t border-indigo-950/80 bg-slate-950/40">
                            <div className="flex items-center space-x-3 mb-4">
                                <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white uppercase shadow-lg">
                                    {loggedInUser.nama.charAt(0)}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-semibold truncate text-white leading-tight">{loggedInUser.nama}</p>
                                    <p className="text-[10px] text-slate-400 font-mono mt-0.5">Role: {loggedInUser.role.toUpperCase()}</p>
                                </div>
                            </div>
                            <button 
                                onClick={handleLogout}
                                className="w-full bg-rose-500/10 hover:bg-rose-50 hover:text-white border border-rose-500/20 text-rose-400 text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center space-x-2"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                <span>Keluar Sistem</span>
                            </button>
                        </div>
                    </aside>

                    {/* Bottom Nav Melayang untuk Perangkat Seluler */}
                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md rounded-2xl p-2.5 flex items-center justify-around shadow-2xl print-hidden z-40 border border-white/10">
                        {isAdmin ? (
                            <>
                                <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                <MobileTabButton icon={<IconUsers />} isActive={currentView === 'kelola_guru'} onClick={() => setCurrentView('kelola_guru')} />
                                <MobileTabButton icon={<IconBook />} isActive={currentView === 'kelola_referensi'} onClick={() => setCurrentView('kelola_referensi')} />
                                <MobileTabButton icon={<IconPrint />} isActive={currentView === 'kelola_kop'} onClick={() => setCurrentView('kelola_kop')} />
                                <MobileTabButton icon={<IconInfo />} isActive={currentView === 'kelola_info'} onClick={() => setCurrentView('kelola_info')} />
                                <MobileTabButton icon={<IconImage />} isActive={currentView === 'kelola_galeri'} onClick={() => setCurrentView('kelola_galeri')} />
                                <MobileTabButton icon={<IconLock />} isActive={currentView === 'kelola_admin'} onClick={() => setCurrentView('kelola_admin')} />
                            </>
                        ) : isKepsek ? (
                            <>
                                <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                <MobileTabButton icon={<IconHistory />} isActive={currentView === 'monitoring_jurnal'} onClick={() => setCurrentView('monitoring_jurnal')} />
                                <MobileTabButton icon={<IconChart />} isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                            </>
                        ) : (
                            <>
                                <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                <MobileTabButton icon={<IconUsers />} isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                <MobileTabButton icon={<IconBook />} isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                                <MobileTabButton icon={<IconHistory />} isActive={currentView === 'riwayat'} onClick={() => setCurrentView('riwayat')} />
                                <MobileTabButton icon={<IconChart />} isActive={currentView === 'penilaian'} onClick={() => setCurrentView('penilaian')} />
                                <MobileTabButton icon={<IconChart />} isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                            </>
                        )}
                        <button onClick={handleLogout} className="p-3 rounded-xl text-rose-400">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        </button>
                    </nav>

                    {/* Area Konten Utama Scrollable */}
                    <main className="flex-1 flex flex-col h-screen overflow-y-auto print-block relative bg-slate-50">
                        <header className="bg-white/85 backdrop-blur-md shadow-sm border-b border-slate-100 px-8 py-5 flex items-center justify-between print-hidden sticky top-0 z-20">
                            <h2 className="text-xl font-bold text-slate-800 capitalize tracking-tight flex items-center space-x-2">
                                <span className="text-indigo-600">|</span>
                                <span>{currentView.replace('_', ' ')}</span>
                            </h2>
                            <div className="flex items-center space-x-3 text-sm font-semibold text-slate-600 bg-slate-100/60 py-1.5 px-4 rounded-full border border-slate-200/50">
                                <div className="w-2.5 h-2.5 rounded-full bg-indigo-600 animate-pulse"></div>
                                <span>{loggedInUser.mapel || "Sistem Administrator"}</span>
                            </div>
                        </header>

                        <div className="p-4 md:p-8 flex-1 pb-24 md:pb-8">
                            {isAdmin ? (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboardAdmin gurus={gurus} students={students} journals={journals} />}
                                    {currentView === 'kelola_guru' && <ViewKelolaGuru gurus={gurus} subjects={subjects} addGuru={addGuru} updateGuru={updateGuru} deleteGuru={deleteGuru} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_referensi' && <ViewKelolaReferensi classes={classes} subjects={subjects} addClass={addClass} deleteClass={deleteClass} addSubject={addSubject} deleteSubject={deleteSubject} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_kop' && <ViewKelolaKop kop={kop} updateKop={updateKop} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_info' && <ViewKelolaInfo appInfo={appInfo} updateAppInfo={updateAppInfo} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_galeri' && <ViewKelolaGaleri journals={journals} deleteJournalPhoto={deleteJournalPhoto} deleteJournalPhotosBulk={deleteJournalPhotosBulk} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm} />}
                                    {currentView === 'kelola_kepsek' && <ViewKelolaKepsek gurus={gurus} updateGuru={updateGuru} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_admin' && <ViewKelolaAdmin gurus={gurus} updateGuru={updateGuru} loggedInUser={loggedInUser} triggerAlert={triggerAlert} />}
                                </>
                            ) : isKepsek ? (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboardKepsek journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'monitoring_jurnal' && <ViewMonitoringJurnal journals={journals} deleteJournal={deleteJournal} kop={kop} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} loggedInUser={loggedInUser} kop={kop} />}
                                </>
                            ) : (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboard journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'siswa' && <ViewDataSiswa students={students} classes={classes} addStudent={addStudent} updateStudent={updateStudent} addStudentsBulk={addStudentsBulk} deleteStudent={deleteStudent} deleteStudentsBulk={deleteStudentsBulk} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm} />}
                                    {currentView === 'isi_jurnal' && <ViewIsiJurnal students={students} classes={classes} subjects={subjects} addJournal={addJournal} onSuccess={() => setCurrentView('riwayat')} triggerAlert={triggerAlert} />}
                                    {currentView === 'riwayat' && <ViewRiwayat journals={journals} deleteJournal={deleteJournal} kop={kop} />}
                                    {currentView === 'penilaian' && <ViewPenilaian students={students} classes={classes} subjects={subjects} loggedInUser={loggedInUser} kop={kop} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm} firebaseActive={firebaseActive} meetings={meetings} meetingGrades={meetingGrades} addMeeting={addMeeting} deleteMeeting={deleteMeeting} saveMeetingGrade={saveMeetingGrade} deleteMeetingGradesSingle={deleteMeetingGradesSingle} deleteMeetingGradesBulk={deleteMeetingGradesBulk} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} loggedInUser={loggedInUser} kop={kop} />}
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const MenuButton = ({ icon, label, isActive, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                    isActive 
                        ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/25 font-semibold translate-x-1' 
                        : 'text-indigo-200/80 hover:bg-slate-800 hover:text-white hover:translate-x-1'
                }`}
            >
                <span className={isActive ? 'text-white' : 'text-indigo-400'}>{icon}</span>
                <span className="text-sm tracking-wide">{label}</span>
            </button>
        );

        const MobileTabButton = ({ icon, isActive, onClick }) => (
            <button 
                onClick={onClick} 
                className={`p-3 rounded-xl transition-all duration-200 ${
                    isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-indigo-300 hover:text-white'
                }`}
            >
                {icon}
            </button>
        );

        const ViewDashboardAdmin = ({ gurus, students, journals }) => {
            const listGuru = gurus.filter(g => g.role === 'guru');
            const listKepsek = gurus.filter(g => g.role === 'kepsek');

            return (
                <div className="space-y-8 animate-in fade-in duration-200">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Total Guru Terdaftar" value={listGuru.length} color="indigo" icon={<IconUsers/>} />
                        <StatCard title="Kepala Sekolah" value={listKepsek.length} color="sky" icon={<IconLock/>} />
                        <StatCard title="Total Siswa" value={students.length} color="emerald" icon={<IconUsers/>} />
                        <StatCard title="Total Jurnal Terisi" value={journals.length} color="indigo" icon={<IconBook/>} />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100">
                        <h3 className="text-lg font-bold text-slate-900 mb-4">Informasi Akses Administrator</h3>
                        <p className="text-slate-500 text-sm leading-relaxed mb-4">
                            Sebagai Administrator, Anda memiliki akses penuh untuk mengelola otentikasi internal sekolah. Gunakan menu samping untuk menambah, mengedit, atau menghapus akun Guru Pengajar serta mengatur Kop Cetak Surat resmi instansi dan akun Kepala Sekolah.
                        </p>
                        <div className="p-4 bg-indigo-50 border border-indigo-100 rounded-2xl text-xs text-indigo-800 font-medium">
                            Keamanan Akun: Harap pastikan setiap NIP guru bersifat unik agar menghindari bentrokan data di dalam laporan jurnal terintegrasi.
                        </div>
                    </div>
                </div>
            );
        };

        const ViewKelolaGuru = ({ gurus, subjects, addGuru, updateGuru, deleteGuru, triggerAlert }) => {
            const listGuru = useMemo(() => gurus.filter(g => g.role === 'guru'), [gurus]);

            const [nip, setNip] = useState('');
            const [nama, setNama] = useState('');
            const [mapel, setMapel] = useState('');
            const [password, setPassword] = useState('');
            
            const [editingId, setEditingId] = useState(null);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!nip.trim() || !nama.trim() || !mapel.trim() || !password.trim()) return;

                const payload = {
                    nip: nip.trim(),
                    nama: nama.trim(),
                    mapel: mapel.trim(),
                    password: password.trim(),
                    role: 'guru'
                };

                try {
                    if (editingId) {
                        await updateGuru(editingId, payload);
                        setEditingId(null);
                        triggerAlert("Guru Diperbarui", "Data guru berhasil disimpan!");
                    } else {
                        const exist = gurus.find(g => g.nip === payload.nip);
                        if (exist) {
                            triggerAlert("Peringatan", "Guru dengan NIP tersebut sudah terdaftar!");
                            return;
                        }
                        await addGuru(payload);
                        triggerAlert("Guru Ditambahkan", "Data guru baru berhasil didaftarkan!");
                    }
                    setNip('');
                    setNama('');
                    setMapel('');
                    setPassword('');
                } catch (err) {
                    console.error(err);
                }
            };

            const handleEditClick = (g) => {
                setEditingId(g.id);
                setNip(g.nip);
                setNama(g.nama);
                setMapel(g.mapel);
                setPassword(g.password);
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNip('');
                setNama('');
                setMapel('');
                setPassword('');
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in fade-in duration-200">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 h-fit">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                            <span className="text-indigo-600 text-xl font-bold">{editingId ? '✎' : '+'}</span>
                            <span>{editingId ? 'Edit Akun Guru' : 'Tambah Akun Guru'}</span>
                        </h3>
                        <form onSubmit={handleSave} className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nomor Induk Pegawai (NIP)</label>
                                <input type="text" required placeholder="NIP Guru" value={nip} onChange={e=>setNip(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Lengkap Guru</label>
                                <input type="text" required placeholder="Nama Lengkap &amp; Gelar" value={nama} onChange={e=>setNama(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Mata Pelajaran Utama</label>
                                <select required value={mapel} onChange={e=>setMapel(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm bg-white">
                                    <option value="">-- Pilih Mata Pelajaran --</option>
                                    {subjects.map(s => <option key={s.id} value={s.nama}>{s.nama}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Kata Sandi Akun</label>
                                <input type="text" required placeholder="Kata Sandi Login" value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                            </div>
                            <div className="flex space-x-2">
                                {editingId && (
                                    <button type="button" onClick={cancelEdit} className="w-1/2 bg-slate-100 text-slate-600 font-semibold py-3 rounded-xl hover:bg-slate-200 transition text-sm">
                                        Batal
                                    </button>
                                )}
                                <button type="submit" className={`font-semibold py-3 rounded-xl transition duration-150 text-sm shadow-md ${editingId ? 'w-1/2 bg-indigo-600 text-white hover:bg-indigo-700' : 'w-full bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                    {editingId ? 'Simpan' : 'Daftarkan Guru'}
                                </button>
                            </div>
                        </form>
                    </div>

                    <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3">
                            Daftar Guru Pengajar ({listGuru.length})
                        </h3>
                        <div className="overflow-y-auto max-h-[60vh] rounded-xl border border-slate-100">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="sticky top-0 bg-slate-50 font-semibold z-10 border-b border-slate-100">
                                    <tr className="text-slate-500">
                                        <th className="p-4">NIP</th>
                                        <th className="p-4">Nama Guru</th>
                                        <th className="p-4">Mata Pelajaran</th>
                                        <th className="p-4">Sandi</th>
                                        <th className="p-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {listGuru.map(g => (
                                        <tr key={g.id} className="border-b hover:bg-slate-50/30 transition">
                                            <td className="p-4 text-slate-600 font-mono text-xs font-bold">{g.nip}</td>
                                            <td className="p-4 text-slate-800 font-semibold">{g.nama}</td>
