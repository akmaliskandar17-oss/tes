  <script>

      { nisn: "242501002", nama: "Lina Marlina", kelas: "XII RPL 1", password: "siswa123*", perusahaan: "PT. Solusi Digitalindo", pembimbing: "Budi Santoso, S.Pd.", status: "Aktif" },

    ];

    let db = null;
    let auth = null;

    function initFirebase() {
      if (!IS_PREVIEW) {
        try {
          if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
          }
          db = firebase.firestore();
          auth = firebase.auth();
          console.log("Firebase initialized successfully.");
        } catch (error) {
          console.error("Firebase init failed:", error);
          showToast("Koneksi Gagal", "Gagal menghubungi Firebase. Berpindah ke Mode Preview lokal.", "error");
          appState.isFallbackPreview = true;
        }
      }
    }

    async function autoSetupDatabase() {
      if (IS_PREVIEW || appState.isFallbackPreview) {
        if (!localStorage.getItem("epkl_students")) {
          localStorage.setItem("epkl_students", JSON.stringify(DUMMY_STUDENTS));
          localStorage.setItem("epkl_attendance", JSON.stringify(DUMMY_ATTENDANCE));
          localStorage.setItem("epkl_jurnals", JSON.stringify(DUMMY_JURNALS));
          localStorage.setItem("epkl_grades", JSON.stringify(DUMMY_GRADES));
          console.log("Data dummy diinisialisasi ke LocalStorage.");
        }
        return;
      }

      // Dilakukan secara aman HANYA jika admin terautentikasi dan database kosong
      if (appState.currentUser && appState.currentUser.role === 'admin') {
        try {
          const studentSnapshot = await db.collection("students").limit(1).get();
          if (studentSnapshot.empty) {
            showLoading(true, "Mempersiapkan data sekolah perdana...");
            
            for (let student of DUMMY_STUDENTS) {
              await db.collection("students").doc(student.nisn).set(student);
            }
            for (let att of DUMMY_ATTENDANCE) {
              await db.collection("attendance").doc(att.id).set(att);
            }
            for (let jr of DUMMY_JURNALS) {
              await db.collection("jurnals").doc(jr.id).set(jr);
            }
            for (let gr of DUMMY_GRADES) {
              await db.collection("grades").doc(gr.nisn).set(gr);
            }
            console.log("Database Firestore berhasil disetup otomatis.");
            showToast("Database Siap", "Data awal berhasil diunggah ke Cloud Firestore!", "success");
          }
        } catch (error) {
          console.error("Error auto-setup database:", error);
        } finally {
          showLoading(false);
        }
      }
    }

    async function fetchDataAdmin() {
      try {
        const studentsSnap = await db.collection("students").get();
        appState.students = studentsSnap.docs.map(doc => doc.data());

        const attendanceSnap = await db.collection("attendance").get();
        appState.attendance = attendanceSnap.docs.map(doc => doc.data());

        const jurnalsSnap = await db.collection("jurnals").get();
        appState.jurnals = jurnalsSnap.docs.map(doc => doc.data());

        const gradesSnap = await db.collection("grades").get();
        appState.grades = gradesSnap.docs.map(doc => doc.data());
      } catch (error) {
        console.error("Gagal menarik data admin:", error);
        showToast("Error Sinkronisasi", "Gagal memuat database sekolah.", "error");
      }
    }

    async function fetchDataStudent(nisn) {
      try {
        // Ambil profil data diri siswa tunggal
        const studentDoc = await db.collection("students").doc(nisn).get();
        if (studentDoc.exists) {
          appState.currentUser.studentData = studentDoc.data();
          appState.students = [studentDoc.data()];
        }

        // Ambil presensi khusus milik siswa tersebut (menggunakan filter server)
        const attendanceSnap = await db.collection("attendance").where("nisn", "==", nisn).get();
        appState.attendance = attendanceSnap.docs.map(doc => doc.data());

        // Ambil jurnal khusus milik siswa tersebut
        const jurnalsSnap = await db.collection("jurnals").where("nisn", "==", nisn).get();
        appState.jurnals = jurnalsSnap.docs.map(doc => doc.data());

        // Ambil nilai khusus milik siswa tersebut
        const gradeDoc = await db.collection("grades").doc(nisn).get();
        if (gradeDoc.exists) {
          appState.grades = [gradeDoc.data()];
        } else {
          appState.grades = [];
        }
      } catch (error) {
        console.error("Gagal menarik data siswa:", error);
        showToast("Error Sinkronisasi", "Gagal mengambil data dari server sekolah.", "error");
      }
    }

    async function fetchData() {
      if (IS_PREVIEW || appState.isFallbackPreview) {
        appState.students = JSON.parse(localStorage.getItem("epkl_students")) || [];
        appState.attendance = JSON.parse(localStorage.getItem("epkl_attendance")) || [];
        appState.jurnals = JSON.parse(localStorage.getItem("epkl_jurnals")) || [];
        appState.grades = JSON.parse(localStorage.getItem("epkl_grades")) || [];
        return;
      }

      if (!appState.currentUser) return;

      if (appState.currentUser.role === 'admin') {
        await fetchDataAdmin();
      } else if (appState.currentUser.role === 'student') {
        await fetchDataStudent(appState.currentUser.nisn);
      }
    }

    async function saveData(collection, docId, data) {
      if (IS_PREVIEW || appState.isFallbackPreview) {
        let storageKey = `epkl_${collection}`;
        let currentArray = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        let index = currentArray.findIndex(item => (item.id === docId || item.nisn === docId));
        if (index !== -1) {
          currentArray[index] = { ...currentArray[index], ...data };
        } else {
          currentArray.push({ ...data, id: docId });
        }
        localStorage.setItem(storageKey, JSON.stringify(currentArray));
        await fetchData();
        return;
      }

      try {
        await db.collection(collection).doc(docId).set(data, { merge: true });
        await fetchData();
      } catch (error) {
        console.error(`Gagal menyimpan data pada ${collection}:`, error);
        showToast("Error Menyimpan", "Gagal mengirim data ke server sekolah.", "error");
        throw error;
      }
    }

    async function deleteData(collection, docId) {
      if (IS_PREVIEW || appState.isFallbackPreview) {
        let storageKey = `epkl_${collection}`;
        let currentArray = JSON.parse(localStorage.getItem(storageKey)) || [];
        currentArray = currentArray.filter(item => (item.id !== docId && item.nisn !== docId));
        localStorage.setItem(storageKey, JSON.stringify(currentArray));
        await fetchData();
        return;
      }

      try {
        await db.collection(collection).doc(docId).delete();
        await fetchData();
      } catch (error) {
        console.error(`Gagal menghapus data di ${collection}:`, error);
        showToast("Error Menghapus", "Gagal memproses penghapusan data.", "error");
        throw error;
      }
    }

    function showToast(title, message, type = "info") {
      const toast = document.getElementById("toast");
      const icon = document.getElementById("toast-icon");
      const titleEl = document.getElementById("toast-title");
      const msgEl = document.getElementById("toast-message");

      toast.className = "fixed top-5 right-5 z-50 transform transition-all duration-300 max-w-sm w-full p-4 rounded-xl shadow-xl border flex items-center gap-3 bg-white";
      
      if (type === "success") {
        toast.classList.add("border-green-500", "text-green-800");
        icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
      } else if (type === "error") {
        toast.classList.add("border-red-500", "text-red-800");
        icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
      } else {
        toast.classList.add("border-indigo-500", "text-indigo-800");
        icon.innerHTML = '<i class="fa-solid fa-circle-info text-indigo-500"></i>';
      }

      titleEl.innerText = title;
      msgEl.innerText = message;

      toast.classList.remove("translate-y-[-100px]", "opacity-0");
      toast.classList.add("translate-y-0", "opacity-100");

      setTimeout(() => {
        toast.classList.add("translate-y-[-100px]", "opacity-0");
        toast.classList.remove("translate-y-0", "opacity-100");
      }, 4000);
    }

    function showLoading(show, text = "Sedang memproses...") {
      const overlay = document.getElementById("loading-overlay");
      const txt = document.getElementById("loading-text");
      if (show) {
        txt.innerText = text;
        overlay.classList.remove("hidden");
      } else {
        overlay.classList.add("hidden");
      }
    }

    function formatTanggal(strDate) {
      if(!strDate) return "-";
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      return new Date(strDate).toLocaleDateString('id-ID', options);
    }

    function routeTo(tabName) {
      appState.activeTab = tabName;
      renderApp();
    }

    function handleLogout() {
      showLoading(true, "Keluar dari sistem...");
      setTimeout(() => {
        if (!IS_PREVIEW && !appState.isFallbackPreview) {
          if (appState.currentUser && appState.currentUser.role === 'admin') {
            auth.signOut();
          }
        }
        localStorage.removeItem("epkl_active_student_nisn");
        appState.currentUser = null;
        appState.activeTab = 'dashboard';
        showLoading(false);
        renderApp();
        showToast("Logout Berhasil", "Sampai jumpa di lain waktu!", "success");
      }, 800);
    }

      const appDiv = document.getElementById("app");
      appDiv.innerHTML = `
        <div class="flex flex-col flex-1 items-center justify-center px-4 py-12 sm:px-6 lg:px-8 bg-slate-50">
          <div class="max-w-md w-full space-y-8 p-8 rounded-2xl glass-card shadow-lg">

              </div>

              <p class="mt-2 text-sm text-slate-500">Aplikasi Monitoring PKL SMK Berbasis Hybrid</p>
              ${IS_PREVIEW ? '<span class="mt-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Mode Preview Terbuka</span>' : ''}

    function switchLoginTab(role) {
      const stdTab = document.getElementById("tab-student-login");
      const admTab = document.getElementById("tab-admin-login");
      const roleInput = document.getElementById("login-role");
      const idLabel = document.getElementById("login-id-label");
      const idIcon = document.getElementById("login-id-icon");
      const idInput = document.getElementById("login-id");

      roleInput.value = role;

      if (role === 'student') {
        stdTab.className = "border-indigo-500 text-indigo-600 w-1/2 pb-4 px-1 text-center border-b-2 font-medium text-sm transition-all";
        admTab.className = "border-transparent text-slate-500 hover:text-slate-700 w-1/2 pb-4 px-1 text-center border-b-2 font-medium text-sm transition-all";
        idLabel.innerText = "NISN Siswa";
        idIcon.className = "fa-solid fa-id-card";
        idInput.type = "text";
        idInput.placeholder = "Masukkan 9 digit NISN (Contoh: 242501001)";
      } else {
        stdTab.className = "border-transparent text-slate-500 hover:text-slate-700 w-1/2 pb-4 px-1 text-center border-b-2 font-medium text-sm transition-all";
        admTab.className = "border-indigo-500 text-indigo-600 w-1/2 pb-4 px-1 text-center border-b-2 font-medium text-sm transition-all";
        idLabel.innerText = "Email Pembimbing (Firebase Auth)";
        idIcon.className = "fa-solid fa-envelope";
        idInput.type = "email";
        idInput.placeholder = "pembimbing@smk.sch.id";
      }
    }

    async function executeLogin(e) {
      e.preventDefault();
      const role = document.getElementById("login-role").value;
      const idVal = document.getElementById("login-id").value.trim();
      const passwordVal = document.getElementById("login-password").value;

      showLoading(true, "Memvalidasi kredensial Anda...");

      if (role === 'student') {
        if (IS_PREVIEW || appState.isFallbackPreview) {
          const sMatch = appState.students.find(s => s.nisn === idVal && s.password === passwordVal);
          if (sMatch) {
            appState.currentUser = { role: 'student', nisn: idVal, studentData: sMatch };
            localStorage.setItem("epkl_active_student_nisn", idVal);
            showLoading(false);
            routeTo('dashboard');
            showToast("Login Berhasil", `Selamat datang kembali, ${sMatch.nama}!`, "success");
          } else {
            showLoading(false);
            showToast("Login Gagal", "NISN atau Password tidak sesuai.", "error");
          }
        } else {
          try {
            // Ambil dan validasi profil NISN secara spesifik dari Firestore
            const studentDoc = await db.collection("students").doc(idVal).get();
            if (studentDoc.exists) {
              const sData = studentDoc.data();
              if (sData.password === passwordVal) {
                appState.currentUser = { role: 'student', nisn: idVal, studentData: sData };
                localStorage.setItem("epkl_active_student_nisn", idVal);
                await fetchData();
                showLoading(false);
                routeTo('dashboard');
                showToast("Login Berhasil", `Selamat datang, ${sData.nama}!`, "success");
              } else {
                showLoading(false);
                showToast("Login Gagal", "Kata sandi salah.", "error");
              }
            } else {
              showLoading(false);
              showToast("Login Gagal", "NISN tidak terdaftar di database sekolah.", "error");
            }
          } catch (error) {
            showLoading(false);
            showToast("Error", "Gagal menghubungi server database sekolah.", "error");
            console.error(error);
          }
        }
      } else {
        // Admin Login
        if (IS_PREVIEW || appState.isFallbackPreview) {
          if (idVal === "admin@smk.sch.id" && passwordVal === "admin123") {
            appState.currentUser = { role: 'admin', email: idVal };
            showLoading(false);
            routeTo('dashboard');
            showToast("Login Berhasil", "Selamat datang, Guru Pembimbing!", "success");
          } else {
            showLoading(false);
            showToast("Login Gagal", "Akun Admin Preview salah. Gunakan admin@smk.sch.id / admin123", "error");
          }
        } else {
          try {
            const userCredential = await auth.signInWithEmailAndPassword(idVal, passwordVal);
            appState.currentUser = { role: 'admin', email: userCredential.user.email, uid: userCredential.user.uid };
            
            // Lakukan inisialisasi data otomatis jika database masih benar-benar kosong
            await autoSetupDatabase();
            await fetchData();
            
            showLoading(false);

      e.preventDefault();
      const student = appState.currentUser.studentData || { nisn: "242501001" };
      const status = document.getElementById("presensi-status").value;
      const lokasi = document.getElementById("presensi-lokasi").value.trim();
      const tanggal = new Date().toISOString().split('T')[0];

                <select id="form-status" class="mt-1 w-full py-2 px-3 bg-white border border-slate-300 rounded-xl text-sm">
                  <option value="Aktif">Aktif</option>
                  <option value="Belum Penempatan">Belum Penempatan</option>
                  <option value="Selesai">Selesai</option>
                </select>
              </div>
              <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeStudentModal()" class="py-2 px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold">Batal</button>
                <button type="submit" class="py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-md">Simpan</button>
              </div>
            </form>
          </div>
        </div>
      `;
      renderAppLayout(content);
    }

    function openAddStudentModal() {
      document.getElementById("modal-title").innerText = "Tambah Siswa Baru";
      document.getElementById("form-action").value = "add";
      document.getElementById("form-nisn").value = "";
      document.getElementById("form-nisn").removeAttribute("readonly");
      document.getElementById("form-nama").value = "";
      document.getElementById("form-kelas").value = "";
      document.getElementById("form-password").value = "siswa123*";
      document.getElementById("form-perusahaan").value = "";
      document.getElementById("form-pembimbing").value = "";
      document.getElementById("form-status").value = "Belum Penempatan";

      document.getElementById("student-modal").classList.remove("hidden");
    }

    function openEditStudentModal(nisn) {
      const student = appState.students.find(s => s.nisn === nisn);
      if (!student) return;

      document.getElementById("modal-title").innerText = "Edit Data Siswa";
      document.getElementById("form-action").value = "edit";
      
      const nisnInput = document.getElementById("form-nisn");
      nisnInput.value = student.nisn;
      nisnInput.setAttribute("readonly", true);

      document.getElementById("form-nama").value = student.nama;
      document.getElementById("form-kelas").value = student.kelas;
      document.getElementById("form-password").value = student.password || "siswa123*";
      document.getElementById("form-perusahaan").value = student.perusahaan || "";
      document.getElementById("form-pembimbing").value = student.pembimbing || "";
      document.getElementById("form-status").value = student.status || "Belum Penempatan";

      document.getElementById("student-modal").classList.remove("hidden");
    }

    function closeStudentModal() {
      document.getElementById("student-modal").classList.add("hidden");
    }

    async function saveStudentForm(e) {
      e.preventDefault();
      const nisn = document.getElementById("form-nisn").value.trim();
      const nama = document.getElementById("form-nama").value.trim();
      const kelas = document.getElementById("form-kelas").value.trim();
      const password = document.getElementById("form-password").value.trim();
      const perusahaan = document.getElementById("form-perusahaan").value.trim();
      const pembimbing = document.getElementById("form-pembimbing").value.trim();
      const status = document.getElementById("form-status").value;

      showLoading(true, "Menyimpan data siswa...");
      try {
        const studentData = { nisn, nama, kelas, password, perusahaan, pembimbing, status };
        await saveData("students", nisn, studentData);
        closeStudentModal();
        showToast("Tersimpan", "Data siswa berhasil diperbarui!", "success");
        routeTo("data-siswa");
      } catch (err) {
        showToast("Error", "Gagal menyimpan perubahan siswa.", "error");
      } finally {
        showLoading(false);
      }
    }

    async function handleDeleteStudent(nisn) {
      if (confirm(`Apakah Anda yakin ingin menghapus siswa dengan NISN ${nisn}? Semua data presensi, jurnal, dan nilainya akan dihapus.`)) {
        showLoading(true, "Menghapus akun...");
        try {
          await deleteData("students", nisn);
          showToast("Dihapus", "Siswa berhasil dihapus dari database sekolah.", "success");
          routeTo("data-siswa");
        } catch (err) {
          showToast("Error", "Gagal memproses penghapusan.", "error");
        } finally {
          showLoading(false);
        }
      }
    }

    function renderAdminVerifikasi() {
      const pendingList = appState.jurnals.filter(j => j.status === 'Pending').sort((a,b) => b.tanggal.localeCompare(a.tanggal));
      
      let journalListHtml = '';
      pendingList.forEach(j => {
        const student = appState.students.find(s => s.nisn === j.nisn) || { nama: "Siswa Tidak Dikenal", kelas: "-" };

        journalListHtml += `
          <div class="p-6 rounded-2xl bg-white border border-slate-200 shadow-sm space-y-4">
            <div class="flex items-start justify-between gap-3">
              <div>
                <h4 class="text-sm font-bold text-slate-800">${student.nama} <span class="text-xs font-normal text-slate-400">(${student.kelas})</span></h4>
                <p class="text-[10px] font-semibold text-indigo-600 mt-0.5"><i class="fa-solid fa-calendar mr-1"></i>Tanggal Kerja: ${formatTanggal(j.tanggal)}</p>
              </div>
              <span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-100 text-amber-800">Menunggu Verifikasi</span>
            </div>
            
            <p class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-3 rounded-xl">${j.kegiatan}</p>
            
            ${j.lampiran ? `
              <div class="relative rounded-xl overflow-hidden border max-h-48">
                <img src="${j.lampiran}" class="w-full h-full object-cover" alt="Lampiran">
              </div>
            ` : ''}

            <div class="pt-2 border-t border-slate-100 flex flex-col sm:flex-row gap-3 items-center justify-between">
              <input id="note-${j.id}" type="text" placeholder="Berikan catatan perbaikan (opsional)" class="w-full sm:flex-1 py-1.5 px-3 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:ring-1 focus:ring-indigo-500">
              <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="verifyJurnal('${j.id}', 'Ditolak')" class="flex-1 sm:flex-initial py-1.5 px-4 bg-red-50 hover:bg-red-100 text-red-600 font-bold text-xs rounded-xl transition-all">
                  Tolak
                </button>
                <button onclick="verifyJurnal('${j.id}', 'Disetujui')" class="flex-1 sm:flex-initial py-1.5 px-4 bg-green-600 hover:bg-green-700 text-white font-bold text-xs rounded-xl shadow-md transition-all">
                  Setujui
                </button>
              </div>
            </div>
          </div>
        `;
      });

      const content = `
        <div class="space-y-6">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-bold text-slate-800">Daftar Antrean Verifikasi Jurnal</h2>
            <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2.5 py-1 rounded-full">${pendingList.length} Menunggu</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${journalListHtml || '<div class="md:col-span-2 p-12 text-center text-slate-400 bg-white border border-slate-200 rounded-2xl shadow-sm text-sm">Tidak ada pengajuan jurnal baru hari ini. Semua bersih!</div>'}
          </div>
        </div>
      `;
      renderAppLayout(content);
    }

    async function verifyJurnal(id, newStatus) {
      const noteInput = document.getElementById(`note-${id}`);
      const note = noteInput ? noteInput.value.trim() : '';

      showLoading(true, "Memproses verifikasi...");
      try {
        await saveData("jurnals", id, { status: newStatus, catatanPembimbing: note });
        showToast("Verifikasi Berhasil", `Status Jurnal diperbarui menjadi: ${newStatus}`, "success");
        routeTo("verifikasi");
      } catch (err) {
        showToast("Gagal", "Gagal memperbarui status jurnal.", "error");
      } finally {
        showLoading(false);
      }
    }

    function renderAdminPenilaian() {
      let activeStudents = appState.students.filter(s => s.status === 'Aktif');

      let evaluationRows = '';
      activeStudents.forEach(s => {
        const grade = appState.grades.find(g => g.nisn === s.nisn);

        evaluationRows += `
          <tr class="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
            <td class="px-4 py-3 text-xs font-bold text-slate-800">${s.nisn}</td>
            <td class="px-4 py-3 text-xs font-bold text-slate-700">${s.nama}</td>
            <td class="px-4 py-3 text-xs text-slate-500">${s.kelas}</td>
            <td class="px-4 py-3 text-xs text-slate-600 font-medium">${s.perusahaan || '-'}</td>
            <td class="px-4 py-3 text-xs font-bold text-indigo-600">${grade ? grade.nilaiRataRata.toFixed(1) : '-'}</td>
            <td class="px-4 py-3 text-xs text-right">
              <button onclick="openGradingModal('${s.nisn}')" class="py-1 px-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold rounded-lg transition-all text-[11px]">
                <i class="fa-solid fa-star mr-1"></i>${grade ? 'Update Nilai' : 'Input Nilai'}
              </button>
            </td>
          </tr>
        `;
      });

      const content = `
        <div class="space-y-6">
          <h2 class="text-lg font-bold text-slate-800">Evaluasi & Penilaian Akhir PKL</h2>
          
          <div class="p-6 rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="border-b border-slate-200 text-slate-400 text-xs uppercase tracking-wider">
                    <th class="px-4 py-2 font-bold">NISN</th>
                    <th class="px-4 py-2 font-bold">Nama Lengkap</th>
                    <th class="px-4 py-2 font-bold">Kelas</th>
                    <th class="px-4 py-2 font-bold">Instansi Mitra</th>
                    <th class="px-4 py-2 font-bold">Nilai Rata-rata</th>
                    <th class="px-4 py-2 font-bold text-right">Aksi</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                  ${evaluationRows || '<tr><td colspan="6" class="text-center py-8 text-slate-400 text-sm">Tidak ada siswa aktif yang siap dinilai.</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Grading Form Modal -->
        <div id="grading-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
          <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden p-6 relative">
            <h3 class="text-lg font-bold text-slate-800 mb-2">Penilaian Kompetensi PKL</h3>
            <p id="grading-student-title" class="text-xs text-slate-400 font-semibold uppercase mb-4">Nama Siswa</p>
            <form id="grading-form" onsubmit="saveGradeForm(event)" class="space-y-4">
              <input type="hidden" id="grading-nisn">
              <div class="grid grid-cols-3 gap-4">
                <div>
                  <label class="block text-[10px] font-extrabold text-slate-500 uppercase">Hard Skill (0-100)</label>
                  <input id="grading-teknis" type="number" min="0" max="100" required class="mt-1 w-full py-2 px-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                  <label class="block text-[10px] font-extrabold text-slate-500 uppercase">Soft Skill (0-100)</label>
                  <input id="grading-nonteknis" type="number" min="0" max="100" required class="mt-1 w-full py-2 px-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                  <label class="block text-[10px] font-extrabold text-slate-500 uppercase">Kedisiplinan (0-100)</label>
                  <input id="grading-disiplin" type="number" min="0" max="100" required class="mt-1 w-full py-2 px-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500">
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase">Catatan Hasil Penilaian</label>
                <textarea id="grading-catatan" rows="3" required placeholder="Tuliskan saran perbaikan untuk masa depan siswa setelah lulus dari industri..." class="mt-1 w-full py-2 px-3 bg-white border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500"></textarea>
              </div>
              <div class="flex justify-end gap-3 pt-2">
                <button type="button" onclick="closeGradingModal()" class="py-2 px-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl text-xs font-bold">Batal</button>
                <button type="submit" class="py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-md">Simpan Nilai</button>
              </div>
            </form>
          </div>
        </div>
      `;
      renderAppLayout(content);
    }

    function openGradingModal(nisn) {
      const student = appState.students.find(s => s.nisn === nisn);
      if (!student) return;

      document.getElementById("grading-student-title").innerText = `${student.nama} (${student.kelas}) - ${student.perusahaan || 'Mitra PKL'}`;
      document.getElementById("grading-nisn").value = student.nisn;

      const grade = appState.grades.find(g => g.nisn === nisn);
      if (grade) {
        document.getElementById("grading-teknis").value = grade.nilaiTeknis;
        document.getElementById("grading-nonteknis").value = grade.nilaiNonTeknis;
        document.getElementById("grading-disiplin").value = grade.nilaiDisiplin;
        document.getElementById("grading-catatan").value = grade.catatan || "";
      } else {
        document.getElementById("grading-teknis").value = "";
        document.getElementById("grading-nonteknis").value = "";
        document.getElementById("grading-disiplin").value = "";
        document.getElementById("grading-catatan").value = "";
      }

      document.getElementById("grading-modal").classList.remove("hidden");
    }

    function closeGradingModal() {
      document.getElementById("grading-modal").classList.add("hidden");
    }

    async function saveGradeForm(e) {
      e.preventDefault();
      const nisn = document.getElementById("grading-nisn").value;
      const nilaiTeknis = parseFloat(document.getElementById("grading-teknis").value);
      const nilaiNonTeknis = parseFloat(document.getElementById("grading-nonteknis").value);
      const nilaiDisiplin = parseFloat(document.getElementById("grading-disiplin").value);
      const catatan = document.getElementById("grading-catatan").value.trim();

      const nilaiRataRata = (nilaiTeknis + nilaiNonTeknis + nilaiDisiplin) / 3;

      showLoading(true, "Mengirim nilai...");
      try {
        const gradeData = { nisn, nilaiTeknis, nilaiNonTeknis, nilaiDisiplin, nilaiRataRata, catatan };
        await saveData("grades", nisn, gradeData);
        closeGradingModal();
        showToast("Nilai Disimpan", "Evaluasi akhir berhasil disimpan ke server.", "success");
        routeTo("penilaian");
      } catch (err) {
        showToast("Gagal", "Gagal mengunggah penilaian.", "error");
      } finally {
        showLoading(false);
      }
    }

    function renderApp() {
      if (!appState.currentUser) {
        renderLogin();
        return;
      }

      const role = appState.currentUser.role;

      if (role === 'student') {
        switch (appState.activeTab) {
          case 'dashboard':
            renderStudentDashboard();
            break;
          case 'presensi':
            renderStudentPresensi();
            break;
          case 'jurnal':
            renderStudentJurnal();
            break;
          case 'nilai':
            renderStudentNilai();
            break;
          default:
            renderStudentDashboard();
        }
      } else {
        switch (appState.activeTab) {
          case 'dashboard':
            renderAdminDashboard();
            break;
          case 'data-siswa':
            renderAdminDataSiswa();
            break;
          case 'verifikasi':
            renderAdminVerifikasi();
            break;
          case 'penilaian':
            renderAdminPenilaian();
            break;
          default:
            renderAdminDashboard();
        }
      }
    }

    function initPWA() {
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const swCode = `
            const CACHE_NAME = 'epkl-v2';
            self.addEventListener('install', (e) => {
              self.skipWaiting();
            });
            self.addEventListener('activate', (e) => {
              e.waitUntil(clients.claim());
            });
            self.addEventListener('fetch', (e) => {
              // Aset offline PWA
            });
          `;
          try {
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl)
              .then(reg => console.log('ServiceWorker registered with Blob:', reg.scope))
              .catch(err => console.log('ServiceWorker registration failed:', err));
          } catch (e) {
            console.error('Failed to create ServiceWorker blob:', e);
          }
        });
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      initFirebase();
      
      if (IS_PREVIEW || appState.isFallbackPreview) {
        // Mode offline simulasi
        await autoSetupDatabase();
        await fetchData();
        
        // Memulihkan sesi siswa offline jika ada
        const cachedNisn = localStorage.getItem("epkl_active_student_nisn");
        if (cachedNisn) {
          const sMatch = appState.students.find(s => s.nisn === cachedNisn);
          if (sMatch) {
            appState.currentUser = { role: 'student', nisn: cachedNisn, studentData: sMatch };
          }
        }
        renderApp();
      } else {
        // Mode Real Cloud Database
        showLoading(true, "Menghubungkan ke server sekolah...");
        
        // Listener Status Autentikasi Admin
        auth.onAuthStateChanged(async (user) => {
          if (user) {
            appState.currentUser = { role: 'admin', email: user.email, uid: user.uid };
            await autoSetupDatabase();
            await fetchData();
            renderApp();
            showLoading(false);
          } else {
            // Memulihkan sesi login siswa online (Hybrid Client Session)
            const cachedNisn = localStorage.getItem("epkl_active_student_nisn");
            if (cachedNisn) {
              appState.currentUser = { role: 'student', nisn: cachedNisn };
              await fetchData();
              renderApp();
              showLoading(false);
            } else {
              renderApp();
              showLoading(false);
            }
          }
        });
      }
      initPWA();
    });
  </script>
</body>
</html>
