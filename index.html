<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jurnal Mengajar Guru</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>

  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --ink: #1a2238;
    --muted: #6b7280;
    --primary: #3b5bdb;
    --primary-dark: #2f4bc0;
    --line: #e5e8f0;
    --green: #2b8a3e;
    --green-bg: #ebfbee;
    --amber: #b78100;
    --amber-bg: #fff9db;
    --red: #c92a2a;
    --red-bg: #fff0f0;
  }

  /* ===== TEMA WARNA (ganti warna utama) ===== */
  [data-theme="hijau"]  { --primary: #2f9e44; --primary-dark: #268138; }
  [data-theme="ungu"]   { --primary: #7048e8; --primary-dark: #5f3dc4; }
  [data-theme="merah"]  { --primary: #e03131; --primary-dark: #c92a2a; }
  [data-theme="tosca"]  { --primary: #0c8599; --primary-dark: #0b7285; }
  [data-theme="oranye"] { --primary: #e8590c; --primary-dark: #d9480f; }

  /* ===== MODE GELAP ===== */
  [data-dark="1"] {
    --bg: #12151c;
    --card: #1c2130;
    --ink: #e7eaf0;
    --muted: #9aa3b2;
    --line: #2b3242;
    --green-bg: #14321d;
    --amber-bg: #33290a;
    --red-bg: #3a1616;
  }
  [data-dark="1"] input,
  [data-dark="1"] select,
  [data-dark="1"] textarea {
    background: #232838; color: var(--ink); border-color: var(--line);
  }
  [data-dark="1"] .btn-ghost { background: #2b3242; color: var(--ink); }
  [data-dark="1"] .btn-ghost:hover { background: #353d51; }
  [data-dark="1"] th { background: #232838; }
  [data-dark="1"] code { background: #2b3242; color: #d7dbe6; }

  /* Pemilih tema */
  .tema-panel {
    position: absolute; top: 60px; right: 16px; z-index: 900;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 14px; box-shadow: 0 12px 30px rgba(0,0,0,.18);
    display: none; min-width: 220px;
  }
  .tema-panel.show { display: block; }
  .tema-panel h4 { font-size: 13px; color: var(--muted); margin-bottom: 8px; font-weight: 600; }
  .tema-warna { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .tema-dot {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
  }
  .tema-dot.aktif { border-color: var(--ink); }
  .tema-toggle-dark {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 14px; padding-top: 10px; border-top: 1px solid var(--line);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
  }

  .loading { padding: 60px; text-align: center; color: var(--muted); }

  /* Header */
  header {
    background: var(--primary);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    position: sticky; top: 0; z-index: 500;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header .user-info { font-size: 13px; opacity: .95; text-align: right; }
  header .badge {
    display: inline-block; background: rgba(255,255,255,.2);
    padding: 2px 10px; border-radius: 20px; font-size: 12px;
    text-transform: capitalize; margin-top: 3px;
  }

  /* Tabs */
  nav {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    display: flex; overflow-x: auto;
    position: sticky; z-index: 490;
  }
  nav button {
    background: none; border: none; padding: 14px 18px;
    font-size: 14px; color: var(--muted); cursor: pointer;
    border-bottom: 3px solid transparent; white-space: nowrap;
  }
  nav button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  main { max-width: 900px; margin: 0 auto; padding: 20px; }

  main { overflow-x: hidden; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .card h2 { font-size: 16px; margin-bottom: 14px; }

  /* Form */
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 5px; }
  input, select, textarea {
    width: 100%; padding: 10px 12px; font-size: 14px;
    border: 1px solid var(--line); border-radius: 8px;
    font-family: inherit; background: #fff;
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--primary);
  }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 130px; }

  /* Buttons */
  .btn {
    background: var(--primary); color: #fff; border: none;
    padding: 11px 18px; font-size: 14px; border-radius: 8px;
    cursor: pointer; font-weight: 600; margin-top: 16px;
  }
  .btn:hover { background: var(--primary-dark); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .btn-sm { padding: 6px 12px; font-size: 13px; margin-top: 0; }
  .btn-green { background: var(--green); }
  .btn-green:hover { background: #237032; }
  .btn-red { background: var(--red); }
  .btn-red:hover { background: #a51f1f; }
  .btn-ghost { background: #eef1f8; color: var(--ink); }
  .btn-ghost:hover { background: #e0e5f2; }

  /* Status chips */
  .chip { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .chip.Menunggu { background: var(--amber-bg); color: var(--amber); }
  .chip.Disetujui { background: var(--green-bg); color: var(--green); }
  .chip.Ditolak { background: var(--red-bg); color: var(--red); }

  /* Jurnal item */
  .jurnal-item { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .jurnal-item .head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .jurnal-item .meta { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .jurnal-item .materi { font-size: 14px; margin: 6px 0; }
  .jurnal-item .actions { margin-top: 10px; display: flex; gap: 8px; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; text-align: center; }
  .stat .num { font-size: 26px; font-weight: 700; }
  .stat .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); }
  th { color: var(--muted); font-weight: 600; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 20px;
    border-radius: 8px; font-size: 14px; opacity: 0;
    transition: opacity .3s; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; }

  .empty { text-align: center; color: var(--muted); padding: 30px; }
  .warn { background: var(--amber-bg); color: var(--amber); padding: 16px; border-radius: 10px; font-size: 14px; }
  code { background: #eef1f8; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: "Courier New", monospace; }
  input[type="file"] { padding: 8px; background: #fafbfe; border-style: dashed; cursor: pointer; }
  input[type="radio"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--primary); }

  /* Sub-tab di menu Rekap */
  .rekap-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .rekap-tab {
    background: #eef1f8; color: var(--muted); border: none;
    padding: 10px 16px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 600;
  }
  .rekap-tab.active { background: var(--amber); color: #fff; }

  /* Badge kelas di daftar siswa */
  .chip-kelas {
    display: inline-block; background: var(--amber-bg); color: var(--amber);
    padding: 4px 12px; border-radius: 8px; font-size: 13px; font-weight: 700;
  }

  /* Footer info pembuat */
  .app-footer {
    text-align: center; color: var(--muted); font-size: 13px;
    padding: 20px; margin-top: 10px; border-top: 1px solid var(--line);
  }

  /* Modal konfirmasi custom */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(26, 34, 56, .55);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--card); border-radius: 16px; padding: 24px;
    max-width: 400px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.25);
    animation: modalMuncul .18s ease-out;
  }
  @keyframes modalMuncul {
    from { transform: translateY(10px) scale(.98); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .modal-judul { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
  .modal-pesan { font-size: 14px; color: var(--ink); line-height: 1.6; margin-bottom: 20px; }
  .modal-aksi { display: flex; justify-content: flex-end; gap: 10px; }

  /* Saat mencetak halaman utama, sembunyikan elemen navigasi & tombol */
  @media print {
    .no-print, nav, header { display: none !important; }
  }

/* ==== Login ==== */
#login { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
.login-wrap { width: 100%; max-width: 380px; display: flex; flex-direction: column; }
.loginbox { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
  padding: 32px; width: 100%; max-width: 380px; }
.loginbox h1 { font-size: 22px; margin-bottom: 4px; }
.loginbox p.sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
.login-pass-row { position: relative; }
.login-pass-row button { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--primary); font-size: 13px; cursor: pointer;
  font-weight: 600; margin: 0; padding: 4px 6px; }
.login-msg { padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 12px; }
.login-msg.err { background: var(--red-bg); color: var(--red); }
.hidden { display: none !important; }
.page-kosong { text-align: center; color: var(--muted); padding: 50px 20px; }
.aksi-hapus { color: var(--red); border: 1px solid var(--red); background: none;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin: 0; }
.aksi-hapus:hover { background: var(--red-bg); }
.aksi-edit { color: var(--ink); border: 1px solid var(--line); background: #eef1f8;
  padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
  margin: 0 6px 0 0; }
.aksi-edit:hover { background: #e0e5f2; }
.aksi-cell { text-align: right; white-space: nowrap; }
/* Toolbar filter + cari di menu Siswa */
.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 6px; }
.toolbar > div { flex: 1; min-width: 160px; }
.toolbar label { margin-top: 0; }
/* Bar aksi massal (muncul saat ada checkbox tercentang) */
.bulkbar { display: none; align-items: center; gap: 12px; background: var(--amber-bg);
  border: 1px solid var(--amber); border-radius: 8px; padding: 10px 14px; margin: 12px 0; }
.bulkbar.show { display: flex; }
.bulkbar .info { font-size: 13px; font-weight: 600; color: var(--amber); }
th.cek-col, td.cek-col { width: 34px; text-align: center; }
td.cek-col input, th.cek-col input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

/* Wadah scroll horizontal untuk tabel siswa di layar sempit */
.tabel-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tabel-siswa { min-width: 560px; }
.tabel-siswa td.cek-col, .tabel-siswa th.cek-col {
  width: 40px; min-width: 40px; vertical-align: middle; }
.tabel-siswa .nama-siswa { min-width: 150px; }
.tabel-siswa .aksi-cell { min-width: 130px; white-space: nowrap; }
.aksi-tombol { display: flex; gap: 6px; justify-content: flex-end; }

/* Tabel pengguna: berubah jadi kartu bertumpuk di HP */
@media (max-width: 600px) {
  table.tabel-responsif, table.tabel-responsif tbody,
  table.tabel-responsif tr, table.tabel-responsif td { display: block; width: 100%; }
  table.tabel-responsif tr:first-child { display: none; } /* sembunyikan baris header */
  table.tabel-responsif tr {
    border: 1px solid var(--line); border-radius: 10px;
    margin-bottom: 12px; padding: 6px 4px; }
  table.tabel-responsif td {
    border: none; padding: 7px 12px;
    display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  table.tabel-responsif td::before {
    content: attr(data-label); font-weight: 600; color: var(--muted);
    font-size: 12px; flex-shrink: 0; }
  table.tabel-responsif td.aksi-cell { justify-content: flex-end; }
  table.tabel-responsif td.aksi-cell::before { content: ""; }
}
.info-kolom { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
/* Pagination */
.pagination { display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line); }
.pagination .hinfo { font-size: 13px; color: var(--muted); }
.pagination .hbtn { background: #eef1f8; color: var(--ink); border: 1px solid var(--line);
  padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; margin: 0; }
.pagination .hbtn:hover:not(:disabled) { background: #e0e5f2; }
.pagination .hbtn:disabled { opacity: .4; cursor: not-allowed; }
/* Modul Nilai */
.nilai-sub { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.nilai-sub button { background: #eef1f8; color: var(--muted); border: none;
  padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin: 0; }
.nilai-sub button.active { background: var(--primary); color: #fff; }
.input-nilai { width: 70px; text-align: center; padding: 6px; }
table.tabel-nilai td.n-input { text-align: center; }
.bobot-info { background: var(--amber-bg); color: var(--amber); padding: 12px 14px;
  border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
.bobot-total { font-weight: 700; font-size: 15px; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--line); }
.bobot-total.ok { color: var(--green); }
.bobot-total.warn { color: var(--red); }
.nilai-akhir { font-weight: 700; }
.nilai-akhir.tuntas { color: var(--green); }
.nilai-akhir.belum { color: var(--red); }
/* Pemilih tema */
.tema-pilih { display: flex; gap: 10px; flex-wrap: wrap; }
.tema-btn { flex: 1; min-width: 120px; background: var(--card); border: 2px solid var(--line);
  padding: 16px 12px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
  color: var(--ink); margin: 0; transition: all .15s; }
.tema-btn:hover { border-color: var(--primary); }
.tema-btn.aktif { border-color: var(--primary); background: var(--primary); color: #fff; }
/* Daftar checkbox mapel (multi-pilih untuk guru) */
/* Wadah field mapel: kotak cari + info + daftar grid */
.mapel-box { border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
.mapel-cari { width: 100%; margin: 0 0 8px; }
.mapel-info { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.mapel-info b { color: var(--primary); }
/* Daftar centang mapel: grid otomatis, ringkas, tinggi dibatasi */
.mapel-cek-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 4px 12px; max-height: 168px; overflow-y: auto; padding: 2px; }
.cek-mapel { display: flex; align-items: center; gap: 8px; margin: 0; cursor: pointer;
  font-size: 13px; font-weight: normal; padding: 4px 2px; border-radius: 6px; }
.cek-mapel:hover { background: var(--bg); }
.cek-mapel input { width: 17px; height: 17px; flex-shrink: 0; cursor: pointer; accent-color: var(--primary); margin: 0; }
.cek-mapel.tersembunyi { display: none; }
/* Footer info aplikasi */
.app-footer { text-align: center; color: var(--muted); font-size: 12px; line-height: 1.6;
  padding: 20px 16px calc(28px + env(safe-area-inset-bottom, 24px));
  border-top: 1px solid var(--line); margin-top: 20px;
  overflow-wrap: anywhere; word-break: break-word;
  max-width: 900px; margin-left: auto; margin-right: auto; }
#loginFooter { border-top: 1px solid var(--line); margin-top: 20px; padding: 16px 8px 0;
  max-width: none; display: block; color: var(--muted); font-size: 12px;
  line-height: 1.6; text-align: center; }
.app-footer b { color: var(--ink); font-weight: 600; }
/* Absensi per siswa */
.absen-aksi { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 14px 0 6px; }
.absen-aksi .btn-sm { margin-top: 0; }
table.absen th.pusat, table.absen td.pusat { text-align: center; width: 64px; }
table.absen td.nm { font-size: 14px; }
.rad { display: flex; align-items: center; justify-content: center; padding: 8px 0; cursor: pointer; margin: 0; }
.rad input { width: 18px; height: 18px; cursor: pointer; margin: 0; }
.rad input[value="Hadir"] { accent-color: var(--green); }
.rad input[value="Sakit"] { accent-color: var(--amber); }
.rad input[value="Izin"]  { accent-color: var(--primary); }
.rad input[value="Alpa"]  { accent-color: var(--red); }
th.k-Hadir { color: var(--green); }
th.k-Sakit { color: var(--amber); }
th.k-Izin  { color: var(--primary); }
th.k-Alpa  { color: var(--red); }
.rekap-absen { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.rekap-absen span { font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 8px; }
.rekap-absen .r-h { background: var(--green-bg); color: var(--green); }
.rekap-absen .r-s { background: var(--amber-bg); color: var(--amber); }
.rekap-absen .r-i { background: #e7ecfb; color: var(--primary); }
.rekap-absen .r-a { background: var(--red-bg); color: var(--red); }
/* Kartu jurnal */
.jurnal-item .info-baris { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.jurnal-item .kehadiran { font-size: 12px; color: var(--muted); margin-top: 6px; }
/* Tombol aksi di kartu jurnal */
.jbtn { border: none; padding: 7px 13px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; margin: 0; }
.jbtn-ghost { background: #eef1f8; color: var(--ink); }
.jbtn-ghost:hover { background: #e0e5f2; }
.jbtn-edit { background: #eef1f8; color: var(--ink); }
.jbtn-hapus { background: var(--red); color: #fff; }
.jbtn-hapus:hover { background: #a51f1f; }
.jbtn-setuju { background: var(--green); color: #fff; }
.jbtn-setuju:hover { background: #237032; }
.jbtn-tolak { background: var(--red); color: #fff; }
.jbtn-tolak:hover { background: #a51f1f; }
.jurnal-item .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
.jurnal-item .actions-verif { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
.jurnal-item { position: relative; }
.jurnal-cek { flex-shrink: 0; display: flex; align-items: flex-start; padding-top: 2px; margin: 0; cursor: pointer; }
.jurnal-cek input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); margin: 0; }
.jurnal-item .head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; padding-top: 0; justify-content: space-between; }
.jurnal-item .head-teks { flex: 1; min-width: 0; }
.semua-hadir { color: var(--green); font-size: 13px; margin-top: 4px; }
.tidak-hadir { color: var(--warn, #b3541e); font-size: 13px; margin-top: 4px; }
/* Bulkbar jurnal */
.jbulk { display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap; margin-bottom: 16px; padding: 4px 2px; }
.jbulk-kiri { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
.jbulk-kiri input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
.jbulk-kanan { display: flex; gap: 8px; flex-wrap: wrap; }
.jbulk-kanan button { border: none; padding: 9px 16px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; margin: 0; color: #fff; }
.jbulk-kanan .b-setuju { background: var(--green); }
.jbulk-kanan .b-tolak { background: var(--red); }
.jbulk-kanan .b-hapus { background: #7a1010; }
.jbulk-kanan button:disabled { opacity: .4; cursor: not-allowed; }
/* Foto dokumentasi */
.foto-preview { max-width: 220px; border-radius: 8px; border: 1px solid var(--line);
  margin-top: 10px; display: block; }
.foto-dok-besar { max-width: 100%; border-radius: 8px; }
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->

<script type="module">

         updateDoc, setDoc, writeBatch, query, orderBy, where, serverTimestamp }

   TEMPEL firebaseConfig MILIKMU DI SINI (sama seperti sebelumnya)

const firebaseConfig = {

let ME = null;
let _kelasCache = [];   // cache daftar kelas (dipakai modul Kelas & Siswa)
let _siswaCache = [];   // cache daftar siswa (dipakai untuk filter & cari)
let _penggunaCache = []; // cache daftar pengguna (dipakai untuk edit)
let _editUserId = null;  // null = mode tambah pengguna; ada isi = mode edit

/* ============ TEMA / MODE PENCAHAYAAN ============
   Pilihan: "light" | "dark" | "system". Disimpan di localStorage. */
function bacaTema(){
  try { return localStorage.getItem("temaAplikasi") || "system"; }
  catch (e) { return "system"; }
}
function simpanTema(nilai){
  try { localStorage.setItem("temaAplikasi", nilai); } catch (e) {}
}
/* Terapkan tema ke halaman. "system" mengikuti pengaturan HP/komputer. */
function terapkanTema(){
  const pilihan = bacaTema();
  let gelap = false;
  if (pilihan === "dark") gelap = true;
  else if (pilihan === "system")
    gelap = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  document.documentElement.setAttribute("data-dark", gelap ? "1" : "0");
}
/* Terapkan segera saat file dimuat, sebelum login sekalipun */
terapkanTema();
/* Bila pilihan "system", ikuti perubahan tema perangkat secara langsung */
if (window.matchMedia) {
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
    if (bacaTema() === "system") terapkanTema();
  });
}

/* ============ INFO APLIKASI (versi, pembuat, sekolah) ============
   Dimuat sekali dari Firestore lalu disimpan agar footer & login cepat. */
let _infoApp = null;
async function ambilInfoApp(paksa){
  if (_infoApp && !paksa) return _infoApp;
  _infoApp = { versi: "1.0", pembuat: "Administrator Sekolah", namaSekolah: "" };
  try {
    const snap = await getDoc(doc(db, "pengaturan", "app"));
    if (snap.exists()) _infoApp = { ..._infoApp, ...snap.data() };
  } catch (e) { /* pakai default */ }
  return _infoApp;
}

/* Susun teks footer: [Nama Sekolah ·] vX.X · Pembuat · © tahun */
function tekstFooter(info){
  const tahun = new Date().getFullYear();
  // Baris 1: Versi · Dibuat oleh (tanpa nama sekolah)
  const baris1 = 'Versi ' + esc(info.versi) + ' \u00b7 Dibuat oleh ' + esc(info.pembuat);
  // Baris 2: © tahun NamaSekolah. Hak cipta dilindungi.
  const baris2 = '\u00a9 ' + tahun +
    (info.namaSekolah ? ' ' + esc(info.namaSekolah) : '') + '. Hak cipta dilindungi.';
  return baris1 + '<br>' + baris2;
}

async function isiFooter(elId){
  const el = $(elId);
  if (!el) return;
  // Bila info sudah pernah dimuat, langsung pakai (tanpa kedip).
  if (_infoApp) { el.innerHTML = tekstFooter(_infoApp); return; }
  // Belum ada data: biarkan kosong dulu, jangan tampilkan default,
  // supaya tidak muncul "1.0" sekejap sebelum data asli termuat.
  el.innerHTML = "";
  try {
    const info = await ambilInfoApp();
    el.innerHTML = tekstFooter(info);
  } catch (e) {
    // Hanya bila gagal total, tampilkan default sebagai cadangan.
    el.innerHTML = tekstFooter({ versi: "1.0", pembuat: "Administrator Sekolah", namaSekolah: "" });
  }
}
/* Isi footer login segera saat halaman dimuat */
window.addEventListener("DOMContentLoaded", () => isiFooter("loginFooter"));
isiFooter("loginFooter");

const MENU = {
  admin : ["beranda","isijurnal","daftarjurnal","nilai","siswa","kelas","mapel","pengguna","pengaturan"],
  kepsek: ["beranda","daftarjurnal","nilai"],
  guru  : ["beranda","isijurnal","daftarjurnal","nilai"]
};
const LABEL = {
  beranda:"Beranda", isijurnal:"Isi Jurnal", daftarjurnal:"Daftar Jurnal",
  nilai:"Nilai", siswa:"Siswa", kelas:"Kelas", mapel:"Mapel",
  pengguna:"Pengguna", pengaturan:"Pengaturan"
};
const namaRole = r => ({admin:"Admin", kepsek:"Kepala Sekolah", guru:"Guru"}[r] || r);

/* Format tampilan mapel: "(KODE) Nama". Kode = field kelompok.
   Menerima objek mapel {namaMapel, kelompok} atau nama mapel (string).
   Bila hanya nama diberikan, dicari kodenya dari cache mapel. */
function labelMapel(m){
  if (typeof m === "string") {
    const found = (window._mapelSemua || []).find(x => x.namaMapel === m);
    m = found || { namaMapel: m, kelompok: "" };
  }
  const nama = m.namaMapel || "";
  const kode = (m.kelompok || "").trim();
  return kode ? "(" + kode + ") " + nama : nama;
}
/* Bangun <option> untuk daftar mapel: value tetap namaMapel, teks pakai labelMapel */
function opsiMapelHTML(mapelList, terpilih){
  window._mapelSemua = mapelList;  // simpan untuk labelMapel(string)
  return '<option value="">-- pilih mapel --</option>' +
    mapelList.map(m => '<option value="' + esc(m.namaMapel) + '"' +
      (m.namaMapel===terpilih?" selected":"") + '>' + esc(labelMapel(m)) + '</option>').join("");
}

/* Normalkan mapel guru jadi array nama mapel.
   Menerima: array baru ["A","B"], teks tunggal lama "A", atau kosong. */
function mapelGuruArray(mapelField){
  if (Array.isArray(mapelField)) return mapelField.filter(Boolean);
  if (typeof mapelField === "string" && mapelField.trim()) return [mapelField.trim()];
  return [];
}

/* Daftar mapel yang boleh dipakai pengguna saat ini.
   Guru: hanya mapel yang diampu (dari ME.mapel). Admin/kepsek: semua. */
function mapelUntukSaya(semuaMapel){
  if (ME && ME.role === "guru") {
    const diampu = mapelGuruArray(ME.mapel);
    if (diampu.length) {
      const setAmpu = new Set(diampu);
      const cocok = semuaMapel.filter(m => setAmpu.has(m.namaMapel));
      // bila ada yang cocok, pakai itu; kalau tidak ada sama sekali, kembalikan semua
      return cocok.length ? cocok : semuaMapel;
    }
  }
  return semuaMapel;
}
const bisaEditMaster = () => ME && ME.role === "admin";
/* Guru & admin boleh mengatur bobot nilai dan KKM (kepsek tidak) */
const bisaAturNilai = () => ME && (ME.role === "admin" || ME.role === "guru");

/* ID dokumen bobot per kelas+mapel. Firestore melarang '/' di ID,
   jadi karakter aneh diganti '_'. Contoh: "XI NKPI"+"Matematika" -> "XINKPI__Matematika" */
function idBobot(kelas, mapel){
  const bersih = s => String(s || "").replace(/[^\w-]+/g, "");
  return bersih(kelas) + "__" + bersih(mapel);
}

const $ = id => document.getElementById(id);
const esc = s => String(s == null ? "" : s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function toast(teks){
  const t = $("toast");
  t.textContent = teks;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

/* Modal konfirmasi cantik (pengganti confirm bawaan).
   Pakai: if (await konfirmasi("Judul", "Pesan", "Hapus")) { ... } */
function konfirmasi(judul, pesan, labelOke = "Hapus", okeMerah = true){
  return new Promise(resolve => {
    const overlay = $("modalKonfirmasi");
    $("modalJudul").textContent = judul;
    $("modalPesan").textContent = pesan;
    const btnOke = $("modalOke"), btnBatal = $("modalBatal");
    btnOke.textContent = labelOke;
    btnOke.className = "btn " + (okeMerah ? "btn-red" : "");
    btnOke.style.marginTop = "0";
    overlay.classList.add("show");

    const tutup = (hasil) => {
      overlay.classList.remove("show");
      btnOke.onclick = null; btnBatal.onclick = null; overlay.onclick = null;
      resolve(hasil);
    };
    btnOke.onclick = () => tutup(true);
    btnBatal.onclick = () => tutup(false);
    overlay.onclick = (e) => { if (e.target === overlay) tutup(false); };
  });
}

/* ============ AUTH ============ */
window.masuk = async () => {
  const email = $("lEmail").value.trim(), pass = $("lPass").value;
  if (!email || !pass) return pesanLogin("Isi email dan kata sandi dulu.");
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch (e) { pesanLogin("Email atau kata sandi salah. Coba lagi."); }
};
window.lihatPass = () => {
  const i = $("lPass"), b = $("btnLihatPass");
  const lihat = i.type === "password";
  i.type = lihat ? "text" : "password";
  b.textContent = lihat ? "Tutup" : "Lihat";
  i.focus();
};
window.keluar = () => signOut(auth);
function pesanLogin(teks){
  $("loginMsg").innerHTML = '<div class="login-msg err">' + esc(teks) + '</div>';
  setTimeout(() => { $("loginMsg").innerHTML = ""; }, 5000);
}
$("lPass").addEventListener("keydown", e => { if (e.key === "Enter") masuk(); });
$("lEmail").addEventListener("keydown", e => { if (e.key === "Enter") $("lPass").focus(); });

onAuthStateChanged(auth, async user => {
  if (!user) {
    ME = null;
    $("login").classList.remove("hidden");
    $("app").classList.add("hidden");
    $("lPass").value = "";
    if ($("lPass").type === "text") lihatPass();
    return;
  }
  let snap;
  try { snap = await getDoc(doc(db, "pengguna", user.uid)); }
  catch (e) { pesanLogin("Gagal membaca data peran: " + e.message); return signOut(auth); }
  if (!snap.exists()) { pesanLogin("Akun ini belum diberi peran. Hubungi admin."); return signOut(auth); }

  ME = { uid: user.uid, email: user.email, ...snap.data() };
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("whoNama").textContent = ME.nama || ME.email;
  $("whoRole").textContent = namaRole(ME.role);
  bangunNav();
  isiFooter("appFooter");
});

/* ============ NAVIGASI ============ */
function bangunNav(){
  const nav = $("nav");
  nav.innerHTML = "";
  const menu = MENU[ME.role] || [];
  if (!menu.length) {
    $("main").innerHTML = '<div class="page-kosong">Peran "' + esc(ME.role) +
      '" belum dikenali. Hubungi admin.</div>';
    return;
  }
  menu.forEach((key, i) => {
    const b = document.createElement("button");
    b.textContent = LABEL[key] || key;
    b.onclick = () => buka(key, b);
    nav.appendChild(b);
    if (i === 0) buka(key, b);
  });
  aturStickyNav();
}

/* Set posisi 'top' navbar tepat di bawah header agar keduanya menempel
   saat halaman di-scroll. Dipanggil ulang saat ukuran layar berubah. */
function aturStickyNav(){
  const header = document.querySelector("header");
  const nav = $("nav");
  if (!header || !nav) return;
  const tinggi = header.offsetHeight;
  nav.style.top = tinggi + "px";
}
window.addEventListener("resize", aturStickyNav);

function buka(key, btn){
  document.querySelectorAll("#nav button").forEach(x => x.classList.remove("active"));
  if (btn) btn.classList.add("active");
  if (key === "beranda") return muatBeranda();
  if (key === "kelas")   return muatKelas();
  if (key === "mapel")   return muatMapel();
  if (key === "siswa")   return muatSiswa();
  if (key === "pengguna") return muatPengguna();
  if (key === "isijurnal")   return muatIsiJurnal();
  if (key === "daftarjurnal") return muatDaftarJurnal();
  if (key === "nilai")   return muatNilai();
  if (key === "pengaturan") return muatPengaturan();
  return tampilBelumDibangun(key);
}

/* Pindah tab lewat kode berdasarkan key menu (mis. "daftarjurnal").
   Menyorot tombol nav yang sesuai lalu memanggil buka(). */
function bukaTab(key){
  const label = LABEL[key] || key;
  const btn = Array.from(document.querySelectorAll("#nav button"))
    .find(b => b.textContent === label);
  buka(key, btn || null);
}

function tampilBelumDibangun(key){
  $("main").innerHTML =
    '<div class="card"><h2>' + (LABEL[key]||key) + '</h2>' +
    '<div class="page-kosong">Menu <b>' + (LABEL[key]||key) +
    '</b> akan dibangun di langkah berikutnya.</div></div>';
}

/* Helper: ambil semua dokumen sebuah collection sebagai array {id, ...data} */
async function ambilSemua(namaCollection, urutkanField){
  const q = urutkanField
    ? query(collection(db, namaCollection), orderBy(urutkanField))
    : collection(db, namaCollection);
  const snap = await getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

/* ============================================================
   MODUL: BERANDA
   ============================================================ */
async function muatBeranda(){
  $("main").innerHTML = '<div class="page-kosong">Memuat statistik...</div>';
  try {
    const [jSnap, kSnap, sSnap] = await Promise.all([
      getDocs(collection(db, "jurnal")),
      getDocs(collection(db, "kelas")),
      getDocs(collection(db, "siswa"))
    ]);
    let total=0, menunggu=0, disetujui=0, ditolak=0;
    jSnap.forEach(d => {
      total++;
      const s = d.data().status;
      if (s==="Menunggu") menunggu++;
      else if (s==="Disetujui") disetujui++;
      else if (s==="Ditolak") ditolak++;
    });
    $("main").innerHTML =
      '<div class="stats">' +
        stat(total,"Total Jurnal") + stat(menunggu,"Menunggu") +
        stat(disetujui,"Disetujui") + stat(ditolak,"Ditolak") +
        stat(kSnap.size,"Kelas") + stat(sSnap.size,"Siswa") +
      '</div>' +
      '<div class="card"><h2>Selamat datang, ' + esc(ME.nama || ME.email) + '</h2>' +
      '<p style="color:var(--muted)">Kamu masuk sebagai <b>' + namaRole(ME.role) +
      '</b>. Gunakan tab di atas untuk berpindah menu.</p></div>';
  } catch (e) {
    $("main").innerHTML = '<div class="card"><div class="page-kosong">Gagal memuat: ' +
      esc(e.message) + '</div></div>';
  }
}
function stat(angka, label){
  return '<div class="stat"><div class="num">' + angka +
    '</div><div class="lbl">' + label + '</div></div>';
}

/* ============================================================
   MODUL: KELAS  (dengan Edit + header kolom Aksi)
   ============================================================ */
let _editKelasId = null;   // null = mode tambah, ada isi = mode edit

async function muatKelas(){
  const bolehEdit = bisaEditMaster();
  _editKelasId = null;
  $("main").innerHTML =
    (bolehEdit ?
      '<div class="card"><h2 id="kJudulForm">Tambah Kelas</h2><div class="row">' +
        '<div><label>Nama Kelas</label><input id="kNama" placeholder="mis. X IPA 1"></div>' +
        '<div><label>Wali Kelas (opsional)</label><input id="kWali" placeholder="Nama wali kelas"></div>' +
      '</div>' +
      '<button class="btn" id="kBtnSimpan" onclick="simpanKelas()">Simpan Kelas</button>' +
      '<button class="btn btn-ghost" id="kBtnBatal" style="margin-left:8px;display:none" ' +
        'onclick="batalEditKelas()">Batal Edit</button>' +
      '</div>' : '') +
    '<div class="card"><h2>Daftar Kelas</h2>' +
    '<div id="kelasList"><div class="page-kosong">Memuat...</div></div></div>';
  await renderKelas();
}

async function renderKelas(){
  try {
    _kelasCache = await ambilSemua("kelas", "namaKelas");
    const bolehEdit = bisaEditMaster();
    if (!_kelasCache.length) { $("kelasList").innerHTML = '<div class="empty">Belum ada kelas.</div>'; return; }
    let html = '<div class="tabel-scroll"><table><tr><th>Nama Kelas</th><th>Wali Kelas</th>' +
      (bolehEdit ? '<th class="aksi-cell">Aksi</th>' : '') + '</tr>';
    _kelasCache.forEach(k => {
      const nmAman = esc(k.namaKelas).replace(/'/g,"");
      html += '<tr><td><b>' + esc(k.namaKelas) + '</b></td><td>' + esc(k.waliKelas || "-") + '</td>' +
        (bolehEdit ? '<td class="aksi-cell">' +
          '<button class="aksi-edit" onclick="editKelas(\'' + k.id + '\')">Edit</button>' +
          '<button class="aksi-hapus" onclick="hapusKelas(\'' + k.id + '\',\'' + nmAman + '\')">Hapus</button>' +
          '</td>' : '') + '</tr>';
    });
    $("kelasList").innerHTML = html + '</table></div>';
  } catch (e) { $("kelasList").innerHTML = '<div class="empty">Gagal memuat: ' + esc(e.message) + '</div>'; }
}

window.simpanKelas = async () => {
  const namaKelas = $("kNama").value.trim(), waliKelas = $("kWali").value.trim();
  if (!namaKelas) return toast("Nama kelas belum diisi.");
  try {
    if (_editKelasId) {
      await updateDoc(doc(db, "kelas", _editKelasId), { namaKelas, waliKelas });
      toast("Kelas diperbarui.");
      batalEditKelas();
    } else {
      await addDoc(collection(db, "kelas"), { namaKelas, waliKelas });
      $("kNama").value = ""; $("kWali").value = "";
      toast("Kelas ditambahkan.");
    }
    await renderKelas();
  } catch (e) { toast("Gagal menyimpan: " + e.message); }
};

window.editKelas = (id) => {
  const k = _kelasCache.find(x => x.id === id);
  if (!k) return;
  _editKelasId = id;
  $("kNama").value = k.namaKelas || "";
  $("kWali").value = k.waliKelas || "";
  $("kJudulForm").textContent = "Edit Kelas";
  $("kBtnSimpan").textContent = "Perbarui Kelas";
  $("kBtnBatal").style.display = "inline-block";
  window.scrollTo({ top: 0, behavior: "smooth" });
  $("kNama").focus();
};

window.batalEditKelas = () => {
  _editKelasId = null;
  $("kNama").value = ""; $("kWali").value = "";
  $("kJudulForm").textContent = "Tambah Kelas";
  $("kBtnSimpan").textContent = "Simpan Kelas";
  $("kBtnBatal").style.display = "none";
};

window.hapusKelas = async (id, nama) => {
  if (!(await konfirmasi('Hapus Kelas', 'Hapus kelas "' + nama + '"?'))) return;
  try { await deleteDoc(doc(db, "kelas", id)); toast("Kelas dihapus."); await renderKelas(); }
  catch (e) { toast("Gagal menghapus: " + e.message); }
};


/* ============================================================
   MODUL: MAPEL  (dengan Kode Mapel, Edit, header Aksi)
   Catatan: field database tetap bernama "kelompok" agar data lama
   tidak rusak; yang berubah hanya label tampilan menjadi "Kode Mapel".
   ============================================================ */
let _mapelCache = [];
let _editMapelId = null;

async function muatMapel(){
  const bolehEdit = bisaEditMaster();
  _editMapelId = null;
  $("main").innerHTML =
    (bolehEdit ?
      '<div class="card"><h2 id="mJudulForm">Tambah Mata Pelajaran</h2><div class="row">' +
        '<div><label>Nama Mapel</label><input id="mNama" placeholder="Contoh: Matematika"></div>' +
        '<div><label>Kode Mapel</label><input id="mKode" placeholder="Contoh: MTK"></div>' +
      '</div>' +
      '<button class="btn" id="mBtnSimpan" onclick="simpanMapel()">Simpan Mapel</button>' +
      '<button class="btn btn-ghost" id="mBtnBatal" style="margin-left:8px;display:none" ' +
        'onclick="batalEditMapel()">Batal Edit</button>' +
      '</div>' +
      // ---- Import massal Excel ----

/* ---- Import massal mapel dari Excel ---- */
window.importMapel = async (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const setMsg = (t, ok) => {
    $("mImportMsg").innerHTML = '<div class="msg ' + (ok?"ok":"err") + '">' + esc(t) + '</div>';
  };
  setMsg("Membaca file...", true);
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
    if (!rows.length) { setMsg("File kosong atau format tidak dikenali.", false); ev.target.value=""; return; }

    const dataMapel = [];
    let lewat = 0;
    rows.forEach(r => {
      const namaMapel = String(r["Nama Mapel"] ?? r["Nama"] ?? r["nama"] ?? "").trim();
      const kelompok  = String(r["Kode Mapel"] ?? r["Kode"] ?? r["Kelompok"] ?? r["kode"] ?? "").trim();
      if (!namaMapel) { lewat++; return; }
      dataMapel.push({ namaMapel, kelompok });
    });
    if (!dataMapel.length) { setMsg("Tidak ada baris valid (kolom Nama Mapel kosong semua).", false); ev.target.value=""; return; }

    setMsg("Menyimpan " + dataMapel.length + " mapel...", true);
    let batch = writeBatch(db), n = 0;
    for (const m of dataMapel) {
      batch.set(doc(collection(db, "mapel")), m);
      n++;
      if (n % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();

    let hasil = dataMapel.length + " mapel berhasil diimpor.";
    if (lewat) hasil += " " + lewat + " baris dilewati (tanpa nama).";
    setMsg(hasil, true);
    await renderMapel();
  } catch (e) {
    setMsg("Gagal mengimpor: " + e.message, false);
  }
  ev.target.value = "";
};

let _pilihSiswa = new Set();   // id siswa yang dicentang
let _halamanSiswa = 1;         // halaman aktif pagination
const SISWA_PER_HALAMAN = 25;  // jumlah siswa per halaman

/* Terapkan filter kelas + kata kunci pencarian */
function siswaTersaring(){
  const filter = $("sFilter") ? $("sFilter").value : "";
  const cari = $("sCari") ? $("sCari").value.trim().toLowerCase() : "";
  let list = _siswaCache;
  if (filter) list = list.filter(s => s.kelas === filter);
  if (cari) list = list.filter(s =>
    String(s.namaSiswa || "").toLowerCase().includes(cari) ||
    String(s.nis || "").toLowerCase().includes(cari));
  return list;
}

/* Dipanggil saat filter/cari berubah: reset ke halaman 1 lalu render */
window.renderSiswaReset = () => { _halamanSiswa = 1; renderSiswa(); };

window.gantiHalamanSiswa = (arah) => {
  _halamanSiswa += arah;
  renderSiswa();
  // gulir ke atas daftar agar nyaman
  const el = $("siswaList");
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
};

window.renderSiswa = () => {
  const bolehEdit = bisaEditMaster();
  const semua = siswaTersaring();
  const total = semua.length;
  $("sJudulDaftar").textContent = "Daftar Siswa (" + total + ")";

  if (!total) {
    $("siswaList").innerHTML = '<div class="empty">Tidak ada siswa yang cocok.</div>';
    perbaruiBulkbar();
    return;
  }

  // Hitung batas halaman
  const totalHalaman = Math.ceil(total / SISWA_PER_HALAMAN);
  if (_halamanSiswa > totalHalaman) _halamanSiswa = totalHalaman;
  if (_halamanSiswa < 1) _halamanSiswa = 1;
  const mulai = (_halamanSiswa - 1) * SISWA_PER_HALAMAN;
  const list = semua.slice(mulai, mulai + SISWA_PER_HALAMAN);

  let html = '<div class="tabel-scroll"><table class="tabel-siswa"><tr>' +
    (bolehEdit ? '<th class="cek-col"><input type="checkbox" id="sCekAll" onclick="cekSemuaSiswa(this)"></th>' : '') +
    '<th>Kelas</th><th>NIS</th><th>Nama Lengkap</th>' +
    (bolehEdit ? '<th class="aksi-cell">Aksi</th>' : '') + '</tr>';
  list.forEach(s => {
    const nmAman = esc(s.namaSiswa).replace(/'/g,"");
    const tercentang = _pilihSiswa.has(s.id) ? "checked" : "";
    html += '<tr>' +
      (bolehEdit ? '<td class="cek-col"><input type="checkbox" ' + tercentang +
        ' onclick="togglePilihSiswa(\'' + s.id + '\')"></td>' : '') +
      '<td><span class="chip-kelas">' + esc(s.kelas || "-") + '</span></td>' +
      '<td>' + esc(s.nis || "-") + '</td>' +
      '<td class="nama-siswa"><b>' + esc(s.namaSiswa) + '</b></td>' +
      (bolehEdit ? '<td class="aksi-cell"><div class="aksi-tombol">' +
        '<button class="aksi-edit" onclick="editSiswa(\'' + s.id + '\')">Edit</button>' +
        '<button class="aksi-hapus" onclick="hapusSiswa(\'' + s.id + '\',\'' + nmAman + '\')">Hapus</button>' +
        '</div></td>' : '') + '</tr>';
  });
  html += '</table></div>';

  // Kontrol pagination (hanya bila lebih dari 1 halaman)
  if (totalHalaman > 1) {
    const dari = mulai + 1, sampai = Math.min(mulai + SISWA_PER_HALAMAN, total);
    html += '<div class="pagination">' +
      '<button class="hbtn" onclick="gantiHalamanSiswa(-1)"' +
        (_halamanSiswa <= 1 ? ' disabled' : '') + '>\u2039 Sebelumnya</button>' +
      '<span class="hinfo">Menampilkan ' + dari + '\u2013' + sampai + ' dari ' + total +
        ' \u00b7 Halaman ' + _halamanSiswa + '/' + totalHalaman + '</span>' +
      '<button class="hbtn" onclick="gantiHalamanSiswa(1)"' +
        (_halamanSiswa >= totalHalaman ? ' disabled' : '') + '>Berikutnya \u203a</button>' +
    '</div>';
  }

  $("siswaList").innerHTML = html;
  perbaruiBulkbar();
};

/* ---- Checkbox ---- */
window.togglePilihSiswa = (id) => {
  if (_pilihSiswa.has(id)) _pilihSiswa.delete(id); else _pilihSiswa.add(id);
  perbaruiBulkbar();
};
window.cekSemuaSiswa = (cb) => {
  const list = siswaTersaring();
  if (cb.checked) list.forEach(s => _pilihSiswa.add(s.id));
  else list.forEach(s => _pilihSiswa.delete(s.id));
  renderSiswa();
};
window.batalPilihSiswa = () => { _pilihSiswa = new Set(); renderSiswa(); };
function perbaruiBulkbar(){
  const bar = $("sBulkbar");
  if (!bar) return;
  const n = _pilihSiswa.size;
  bar.classList.toggle("show", n > 0);
  if (n > 0) $("sBulkInfo").textContent = n + " dipilih";

/* ---- Hapus satu & massal ---- */
window.hapusSiswa = async (id, nama) => {
  if (!(await konfirmasi('Hapus Siswa', 'Hapus siswa "' + nama + '"?'))) return;
  try {
    await deleteDoc(doc(db, "siswa", id));
    _pilihSiswa.delete(id);
    toast("Siswa dihapus.");
    _siswaCache = _siswaCache.filter(s => s.id !== id);
    renderSiswa();
  } catch (e) { toast("Gagal menghapus: " + e.message); }
};
window.hapusSiswaMassal = async () => {
  const ids = Array.from(_pilihSiswa);
  if (!ids.length) return;
  if (!(await konfirmasi('Hapus Siswa', 'Hapus ' + ids.length + ' siswa yang dipilih? Tindakan ini tidak bisa dibatalkan.'))) return;
  try {
    // writeBatch: hapus banyak sekaligus dalam satu operasi
    let batch = writeBatch(db), n = 0;
    for (const id of ids) {
      batch.delete(doc(db, "siswa", id));
      n++;
      if (n % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();
    toast(ids.length + " siswa dihapus.");
    _pilihSiswa = new Set();
    _siswaCache = await ambilSemua("siswa", "namaSiswa");
    renderSiswa();
  } catch (e) { toast("Gagal menghapus massal: " + e.message); }
};

  ];

  });

/* ---- Import Excel massal ---- */
window.importSiswa = async (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const setMsg = (t, ok) => {
    $("sImportMsg").innerHTML = '<div class="msg ' + (ok ? "ok" : "err") + '">' + esc(t) + '</div>';
  };
  setMsg("Membaca file...", true);
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
    if (!rows.length) { setMsg("File kosong atau format tidak dikenali.", false); ev.target.value = ""; return; }

    // Set nama kelas yang valid (untuk peringatan bila tidak cocok)
    const kelasValid = new Set(_kelasCache.map(k => k.namaKelas));

    // Susun data & validasi ringan
    const dataSiswa = [];
    let lewat = 0;
    const kelasTakDikenal = new Set();
    rows.forEach(r => {
      // Terima beberapa variasi nama kolom
      const nis   = String(r["NIS"] ?? r["Nis"] ?? r["nis"] ?? "").trim();
      const nama  = String(r["Nama Siswa"] ?? r["Nama"] ?? r["nama"] ?? "").trim();
      const kelas = String(r["Kelas"] ?? r["kelas"] ?? "").trim();
      let jk      = String(r["Jenis Kelamin (L/P)"] ?? r["Jenis Kelamin"] ?? r["JK"] ?? r["L/P"] ?? "").trim().toUpperCase();
      if (jk.startsWith("L")) jk = "L"; else if (jk.startsWith("P")) jk = "P"; else jk = "L";
      if (!nama) { lewat++; return; }   // baris tanpa nama dilewati
      if (kelas && !kelasValid.has(kelas)) kelasTakDikenal.add(kelas);
      dataSiswa.push({ nis, namaSiswa: nama, kelas, jenisKelamin: jk });
    });

    if (!dataSiswa.length) { setMsg("Tidak ada baris valid (kolom Nama Siswa kosong semua).", false); ev.target.value = ""; return; }

    setMsg("Menyimpan " + dataSiswa.length + " siswa...", true);

    // Simpan pakai writeBatch (maks 500 operasi per batch -> pecah tiap 400)
    let batch = writeBatch(db), n = 0;
    for (const s of dataSiswa) {
      batch.set(doc(collection(db, "siswa")), s);
      n++;
      if (n % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();

    let pesanHasil = dataSiswa.length + " siswa berhasil diimpor.";
    if (lewat) pesanHasil += " " + lewat + " baris dilewati (tanpa nama).";
    if (kelasTakDikenal.size)
      pesanHasil += " Catatan: kelas berikut belum terdaftar \u2014 " +
        Array.from(kelasTakDikenal).join(", ") + " (siswa tetap tersimpan).";
    setMsg(pesanHasil, true);

    _siswaCache = await ambilSemua("siswa", "namaSiswa");
    renderSiswa();
  } catch (e) {
    setMsg("Gagal mengimpor: " + e.message, false);
  }
  ev.target.value = "";   // reset input agar file sama bisa dipilih lagi
};

/* ============================================================
   MODUL: PENGGUNA  (admin membuat & mengelola akun guru/kepsek)
   Memakai "instance auth kedua" agar sesi admin tidak berpindah
   ke akun yang baru dibuat.

window.buatPengguna = async () => {
  const nama  = $("uNama").value.trim();
  const email = $("uEmail").value.trim();
  const pass  = $("uPass").value;
  const role  = $("uRole").value;
  const nip   = $("uNip").value.trim();
  // kumpulkan mapel tercentang (array) untuk guru
  let mapel = [];
  if (role === "guru") {
    document.querySelectorAll(".uMapelCek:checked").forEach(cb => mapel.push(cb.value));
  }
  const kelas = (role === "guru" && $("uKelas")) ? $("uKelas").value : "";

  const setMsg = (t, ok) => { $("uMsg").innerHTML = '<div class="msg ' + (ok?"ok":"err") + '">' + esc(t) + '</div>'; };

  // ===== MODE EDIT: ubah data pengguna yang sudah ada =====
  if (_editUserId) {
    if (!nama) return setMsg("Nama tidak boleh kosong.", false);
    const btn = $("uBtnSimpan");
    btn.disabled = true; btn.textContent = "Menyimpan...";
    try {
      // Email & kata sandi TIDAK diubah di sini (batasan akun login).
      // Hanya perbarui data profil di Firestore.
      await updateDoc(doc(db, "pengguna", _editUserId), { nama, role, nip, mapel, kelas });
      setMsg('Data "' + nama + '" diperbarui.', true);
      batalEditPengguna();
      await renderPengguna();
    } catch (e) {
      setMsg("Gagal memperbarui: " + e.message, false);
    } finally {
      btn.disabled = false; btn.textContent = "Perbarui Data";
    }
    return;
  }

  // ===== MODE TAMBAH: buat akun baru =====
  if (!nama || !email || pass.length < 6) {
    return setMsg("Lengkapi nama, email, dan kata sandi minimal 6 karakter.", false);
  }

  const btn = $("uBtnSimpan");
  btn.disabled = true; btn.textContent = "Membuat akun...";

  try {
    await buatSatuAkun_({ nama, email, pass, role, nip, mapel, kelas });
    // Bersihkan form
    $("uNama").value = ""; $("uEmail").value = ""; $("uPass").value = ""; $("uNip").value = "";
    setMsg('Akun "' + nama + '" dibuat sebagai ' + namaRole(role) + '.', true);
    await renderPengguna();
  } catch (e) {
    setMsg("Gagal membuat akun: " + pesanErrorAkun_(e), false);
  } finally {
    btn.disabled = false; btn.textContent = "Buat Akun";
  }
};

/* ---- Fungsi bersama: buat SATU akun (dipakai tombol & import) ----
   Mengembalikan uid bila berhasil; melempar error bila gagal.
   Memakai instance auth kedua agar sesi admin tidak berpindah. */
async function buatSatuAkun_(data){
  const { nama, email, pass, role, nip, mapel, kelas } = data;
  let app2 = null, auth2 = null;
  try {
    app2  = initializeApp(firebaseConfig, "pendaftar-" + Date.now() + "-" + Math.random().toString(36).slice(2));
    auth2 = initializeAuth(app2, { persistence: browserLocalPersistence });
    const cred = await createUserWithEmailAndPassword(auth2, email, pass);
    await setDoc(doc(db, "pengguna", cred.user.uid), {
      nama, email, role, nip: nip || "", mapel: mapel || "", kelas: kelas || ""
    });
    await signOut(auth2);
    return cred.user.uid;
  } catch (e) {
    // pastikan keluar dari instance kedua meski gagal
    try { if (auth2) await signOut(auth2); } catch (_) {}
    throw e;
  }
}

/* Terjemahkan kode error Firebase jadi pesan yang mudah dipahami */
function pesanErrorAkun_(e){
  const c = String(e.code || "");
  if (c.includes("email-already-in-use")) return "Email sudah dipakai";
  if (c.includes("invalid-email"))        return "Format email salah";
  if (c.includes("weak-password"))        return "Kata sandi < 6 karakter";
  return e.message;
}

/* ---- Import massal pengguna dari Excel (baris demi baris) ---- */
window.importPengguna = async (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const setMsg = (t, ok) => {
    $("uImportMsg").innerHTML = '<div class="msg ' + (ok?"ok":"err") + '">' + esc(t) + '</div>';
  };
  $("uImportHasil").innerHTML = "";
  setMsg("Membaca file...", true);

  let rows;
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
  } catch (e) {
    setMsg("Gagal membaca file: " + e.message, false);
    ev.target.value = ""; return;
  }
  if (!rows.length) { setMsg("File kosong atau format tidak dikenali.", false); ev.target.value=""; return; }

  // Susun daftar akun yang akan dibuat
  const rencana = [];
  rows.forEach((r, idx) => {
    const nama  = String(r["Nama"] ?? r["nama"] ?? "").trim();
    const email = String(r["Email"] ?? r["email"] ?? "").trim();
    const pass  = String(r["Kata Sandi"] ?? r["Password"] ?? r["kata sandi"] ?? "").trim();
    let role    = String(r["Peran (guru/kepsek/admin)"] ?? r["Peran"] ?? r["role"] ?? "guru").trim().toLowerCase();
    if (["guru","kepsek","admin"].indexOf(role) === -1) role = "guru";
    const nip   = String(r["NIP"] ?? r["Nip"] ?? "").trim();
    const mapel = String(r["Mapel"] ?? r["mapel"] ?? "").trim();
    const kelas = String(r["Kelas"] ?? r["kelas"] ?? "").trim();
    rencana.push({ baris: idx + 2, nama, email, pass, role, nip, mapel, kelas });
  });

  // Proses satu per satu
  let sukses = 0, gagal = 0;
  const detail = [];
  for (let i = 0; i < rencana.length; i++) {
    const a = rencana[i];
    setMsg("Memproses " + (i+1) + " dari " + rencana.length + "... (" + esc(a.nama || a.email) + ")", true);

    // Validasi ringan sebelum menyentuh Firebase
    if (!a.nama || !a.email || a.pass.length < 6) {
      gagal++;
      detail.push({ baris: a.baris, nama: a.nama || a.email || "(kosong)",
        ok: false, ket: "Data kurang (nama/email/sandi<6)" });
      continue;
    }
    try {
      await buatSatuAkun_(a);
      sukses++;
      detail.push({ baris: a.baris, nama: a.nama, ok: true, ket: namaRole(a.role) });
    } catch (e) {
      gagal++;
      detail.push({ baris: a.baris, nama: a.nama, ok: false, ket: pesanErrorAkun_(e) });
    }
  }

  setMsg("Selesai. Berhasil: " + sukses + ", gagal: " + gagal + " dari " + rencana.length + " baris.", gagal === 0);

  // Tabel laporan per baris
  let tabel = '<table style="margin-top:12px"><tr><th>Baris</th><th>Nama</th><th>Status</th><th>Keterangan</th></tr>';
  detail.forEach(d => {
    tabel += '<tr' + (d.ok ? '' : ' class="tolak"') + '>' +
      '<td>' + d.baris + '</td>' +
      '<td>' + esc(d.nama) + '</td>' +
      '<td>' + (d.ok ? '<span class="chip Disetujui">OK</span>'
                     : '<span class="chip Ditolak">Gagal</span>') + '</td>' +
      '<td>' + esc(d.ket) + '</td></tr>';
  });
  tabel += '</table>';
  $("uImportHasil").innerHTML = tabel;

  await renderPengguna();
  ev.target.value = "";
};

/* ---- Kompres foto di browser sebelum disimpan ----
   Memperkecil dimensi & kualitas agar muat di Firestore (<1MB/dokumen). */
function kompresFoto(file, maxLebar = 1000, kualitas = 0.7){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Gagal membaca file"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Gagal memuat gambar"));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxLebar) { height = Math.round(height * maxLebar / width); width = maxLebar; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        // JPEG selalu, untuk ukuran kecil
        const dataUrl = canvas.toDataURL("image/jpeg", kualitas);
        resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

window.pilihFotoJurnal = async (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const prev = $("jFotoPreview");
  prev.innerHTML = '<p class="info-kolom">Memproses foto...</p>';
  try {
    _fotoDataUrl = await kompresFoto(file);
    // perkiraan ukuran: panjang base64 * 3/4
    const kb = Math.round(_fotoDataUrl.length * 0.75 / 1024);
    prev.innerHTML = '<img src="' + _fotoDataUrl + '" class="foto-preview" alt="pratinjau">' +
      '<p class="info-kolom" style="margin-top:6px">Ukuran ~' + kb + ' KB. ' +
      '<button class="jbtn jbtn-ghost" onclick="hapusFotoJurnal()">Hapus foto</button></p>';
  } catch (e) {
    prev.innerHTML = '<div class="msg err">Gagal memproses foto: ' + esc(e.message) + '</div>';
    _fotoDataUrl = "";
  }
};
window.hapusFotoJurnal = () => {
  _fotoDataUrl = "";
  if ($("jFoto")) $("jFoto").value = "";
  if ($("jFotoPreview")) $("jFotoPreview").innerHTML = "";
};

/* ---- Absensi ---- */
window.muatAbsensi = async () => {
  const kelas = $("jKelas") ? $("jKelas").value : "";
  const area = $("absenArea");
  if (!kelas) {
    _absenSiswa = [];
    area.innerHTML = '<p class="info-kolom" style="margin-top:14px">' +
      'Pilih kelas dulu untuk menampilkan daftar absensi siswa.</p>';
    return;
  }
  area.innerHTML = '<p class="info-kolom" style="margin-top:14px">Memuat siswa...</p>';
  try {
    if (!_siswaCache.length) _siswaCache = await ambilSemua("siswa", "namaSiswa");
    _absenSiswa = _siswaCache.filter(s => s.kelas === kelas)
      .map(s => ({ nis: s.nis || "", nama: s.namaSiswa, status: "Hadir" }));
    if (!_absenSiswa.length) {
      area.innerHTML = '<div class="warn" style="margin-top:14px">Belum ada siswa di kelas ' +
        esc(kelas) + '. Tambahkan siswa dulu di menu Siswa.</div>';
      return;
    }
    renderAbsensi();
  } catch (e) {
    area.innerHTML = '<div class="warn" style="margin-top:14px">Gagal memuat siswa: ' + esc(e.message) + '</div>';
  }
};

function renderAbsensi(){
  const opsi = ["Hadir","Sakit","Izin","Alpa"];
  let html = '<label style="margin-top:16px">Absensi Siswa (' + _absenSiswa.length + ')</label>' +
    '<div class="absen-aksi">Tandai semua: ' +
      opsi.map(o => '<button class="btn btn-sm btn-ghost" onclick="tandaiSemuaAbsen(\'' + o + '\')">' +
        o + '</button>').join("") + '</div>' +
    '<div style="overflow-x:auto"><table class="absen"><tr><th>No</th><th>Nama</th>' +
      opsi.map(o => '<th class="pusat k-' + o + '">' + o + '</th>').join("") + '</tr>';
  _absenSiswa.forEach((s, i) => {
    html += '<tr><td>' + (i+1) + '</td><td class="nm">' + esc(s.nama) +
      (s.nis ? ' <span style="color:var(--muted);font-size:12px">(' + esc(s.nis) + ')</span>' : '') + '</td>' +
      opsi.map(o =>
        '<td class="pusat"><label class="rad"><input type="radio" name="absen_' + i + '" value="' + o + '"' +
        (s.status === o ? ' checked' : '') + ' onchange="setAbsen(' + i + ',\'' + o + '\')"></label></td>'
      ).join("") + '</tr>';
  });
  html += '</table></div><div class="rekap-absen" id="rekapAbsen"></div>';
  $("absenArea").innerHTML = html;
  hitungRekapAbsen();
}
window.setAbsen = (i, status) => { _absenSiswa[i].status = status; hitungRekapAbsen(); };
window.tandaiSemuaAbsen = (status) => { _absenSiswa.forEach(s => s.status = status); renderAbsensi(); };

function hitungRekap(){
  let h=0,s=0,i=0,a=0;
  _absenSiswa.forEach(x => {
    const v = String(x.status).toLowerCase();
    if (v==="hadir") h++; else if (v==="sakit") s++;
    else if (v==="izin") i++; else if (v==="alpa") a++;
  });
  return { h, s, i, a };
}
function hitungRekapAbsen(){
  const r = hitungRekap();
  const box = $("rekapAbsen");
  if (box) box.innerHTML =
    '<span class="r-h">Hadir ' + r.h + '</span><span class="r-s">Sakit ' + r.s + '</span>' +
    '<span class="r-i">Izin ' + r.i + '</span><span class="r-a">Alpa ' + r.a + '</span>';
}

/* ---- Simpan / perbarui jurnal ---- */
window.simpanJurnal = async () => {
  const tanggal = $("jTanggal").value;
  const jamKe   = $("jJam").value.trim();
  const kelas   = $("jKelas").value;
  const mapel   = $("jMapel").value;
  const materi  = $("jMateri").value.trim();
  const catatan = $("jCatatan").value.trim();
  const setMsg = (t, ok) => { $("jMsg").innerHTML = '<div class="msg ' + (ok?"ok":"err") + '">' + esc(t) + '</div>'; };

  if (!tanggal) return setMsg("Tanggal belum diisi.", false);
  if (!kelas)   return setMsg("Pilih kelas dulu.", false);
  if (!mapel)   return setMsg("Pilih mapel dulu.", false);
  if (!materi)  return setMsg("Materi belum diisi.", false);
  if (!_absenSiswa.length) return setMsg("Absensi siswa belum dimuat. Pilih kelas dulu.", false);

  const r = hitungRekap();
  const kehadiran = "Hadir " + r.h + ", Sakit " + r.s + ", Izin " + r.i + ", Alpa " + r.a;
  const btn = $("jBtnSimpan");
  btn.disabled = true; btn.textContent = "Menyimpan...";

  const data = {
    email: ME.email, nama: ME.nama || ME.email,
    tanggal, kelas, mapel, jamKe, materi, catatan, kehadiran,
    absensi: _absenSiswa.map(s => ({ nis: s.nis, nama: s.nama, status: s.status })),
    fotoUrl: _fotoDataUrl || "",
    status: "Menunggu", verifikasiOleh: "", tglVerifikasi: "",
    dibuat: serverTimestamp()
  };

  try {
    if (_editJurnalId) {
      // edit: pertahankan status jika sudah diverifikasi? -> reset ke Menunggu bila diedit
      await updateDoc(doc(db, "jurnal", _editJurnalId), {
        tanggal, kelas, mapel, jamKe, materi, catatan, kehadiran,
        absensi: data.absensi, fotoUrl: data.fotoUrl,
        status: "Menunggu", verifikasiOleh: "", tglVerifikasi: ""
      });
      setMsg("Jurnal diperbarui. Status kembali ke Menunggu.", true);
      _editJurnalId = null;
      toast("Jurnal diperbarui.");
      bukaTab("daftarjurnal");   // kembali ke daftar
      return;
    } else {
      await addDoc(collection(db, "jurnal"), data);
      $("jJam").value = ""; $("jMateri").value = ""; $("jCatatan").value = "";
      hapusFotoJurnal();
      setMsg("Jurnal berhasil disimpan.", true);
    }
  } catch (e) {
    setMsg("Gagal menyimpan: " + e.message, false);
  } finally {
    btn.disabled = false; btn.textContent = _editJurnalId ? "Perbarui Jurnal" : "Simpan Jurnal";
  }
};

window.batalEditJurnal = () => {
  const sedangEdit = !!_editJurnalId;
  _editJurnalId = null;
  if (sedangEdit) {
    // saat membatalkan edit, kembali ke Daftar Jurnal
    bukaTab("daftarjurnal");
    return;
  }
  $("jJudulForm") && ($("jJudulForm").textContent = "Isi Jurnal Mengajar");
  $("jBtnSimpan") && ($("jBtnSimpan").textContent = "Simpan Jurnal");
  $("jBtnBatal") && ($("jBtnBatal").style.display = "none");
};

async function muatDaftarJurnal(){
  _pilihJurnal = new Set();
  // pastikan cache mapel terisi agar tampilan (kode) nama benar
  try { if (!window._mapelSemua) window._mapelSemua = await ambilSemua("mapel", "namaMapel"); }
  catch (e) { /* biarkan, labelMapel akan tampilkan nama saja */ }
  const bisaVerif = (ME.role === "admin" || ME.role === "kepsek");
  $("main").innerHTML =
    '<div class="card"><h2>Daftar Jurnal</h2>' +
      (bisaVerif ?
        '<div class="jbulk">' +
          '<label class="jbulk-kiri"><input type="checkbox" id="jCekAll" onclick="cekSemuaJurnal(this)"> Pilih semua</label>' +
          '<div class="jbulk-kanan" id="jBulkAksi" style="display:none">' +
            '<button class="b-setuju" onclick="verifMassal(\'Disetujui\')" id="jbSetuju">\u2713 Setujui</button>' +
            '<button class="b-tolak" onclick="verifMassal(\'Ditolak\')" id="jbTolak">\u2715 Tolak</button>' +
            (ME.role === "admin" ?
              '<button class="b-hapus" onclick="hapusMassalJurnal()" id="jbHapus">\uD83D\uDDD1 Hapus</button>' : '') +
          '</div>' +
        '</div>' : '') +
      '<div id="jurnalList"><div class="page-kosong">Memuat...</div></div>' +
    '</div>';
  await renderJurnal();
}

async function renderJurnal(){
  try {
    let q;
    if (ME.role === "guru") {
      q = query(collection(db, "jurnal"), where("email", "==", ME.email));
    } else {
      q = collection(db, "jurnal");
    }
    const snap = await getDocs(q);
    _jurnalCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    _jurnalCache.sort((a,b) => {
      const sa = (a.dibuat && a.dibuat.seconds) ? a.dibuat.seconds : 0;
      const sb = (b.dibuat && b.dibuat.seconds) ? b.dibuat.seconds : 0;
      if (sa !== sb) return sb - sa;
      return String(b.tanggal||"").localeCompare(String(a.tanggal||""));
    });

    if (!_jurnalCache.length) {
      $("jurnalList").innerHTML = '<div class="empty">Belum ada jurnal.</div>';
      perbaruiBulkJurnal();
      return;
    }

    const bisaVerif = (ME.role === "admin" || ME.role === "kepsek");
    const bisaHapus = (ME.role === "admin");
    const bisaEdit  = (ME.role === "admin" || ME.role === "guru");

    let html = "";
    _jurnalCache.forEach(j => {
      html += kartuJurnal(j, { bisaVerif, bisaHapus, bisaEdit });
    });
    $("jurnalList").innerHTML = html;
    perbaruiBulkJurnal();
  } catch (e) {
    $("jurnalList").innerHTML = '<div class="empty">Gagal memuat: ' + esc(e.message) + '</div>';
  }
}

/* Susun satu kartu jurnal */
function kartuJurnal(j, hak){
  const status = j.status || "Menunggu";
  const bisaVerif = hak.bisaVerif;
  // daftar siswa tidak hadir (untuk info ringkas)
  const takHadir = (Array.isArray(j.absensi) ? j.absensi : [])
    .filter(a => String(a.status).toLowerCase() !== "hadir");
  const semuaHadir = takHadir.length === 0 && Array.isArray(j.absensi) && j.absensi.length > 0;
  const cekBox = bisaVerif ?
    '<label class="jurnal-cek"><input type="checkbox" ' + (_pilihJurnal.has(j.id) ? "checked" : "") +
      ' onclick="togglePilihJurnal(\'' + j.id + '\')"></label>' : '';

  const punyaFoto = j.fotoUrl && String(j.fotoUrl).startsWith("data:");

  let tombol = '<div class="actions">' +
    '<button class="jbtn jbtn-ghost" onclick="cetakJurnal(\'' + j.id + '\')">\uD83D\uDda8 Cetak / PDF</button>' +
    (punyaFoto ?
      '<button class="jbtn jbtn-ghost" onclick="lihatDokumentasi(\'' + j.id + '\')">\uD83D\uDCf7 Lihat Dokumentasi</button>' : '') +
    (hak.bisaEdit ?
      '<button class="jbtn jbtn-edit" onclick="editJurnal(\'' + j.id + '\')">\u270e Edit</button>' : '') +
    (hak.bisaHapus ?
      '<button class="jbtn jbtn-hapus" onclick="hapusJurnal(\'' + j.id + '\')">\uD83D\uDDd1 Hapus</button>' : '') +
    '</div>';

  // tombol setuju/tolak hanya admin & kepsek
  let verif = "";
  if (bisaVerif) {
    verif = '<div class="actions-verif">' +
      '<button class="jbtn jbtn-setuju" onclick="verifSatu(\'' + j.id + '\',\'Disetujui\')">Setujui</button>' +
      '<button class="jbtn jbtn-tolak" onclick="verifSatu(\'' + j.id + '\',\'Ditolak\')">Tolak</button>' +
      '</div>';
  }

  return '<div class="jurnal-item">' +
    '<div class="head">' +
      cekBox +
      '<div class="head-teks"><b>' + esc(labelMapel(j.mapel)) + '</b> \u2014 ' + esc(j.kelas || "-") +
        '<div class="info-baris">' + esc(j.nama || j.email) + ' \u00b7 ' + esc(j.tanggal || "-") +
        (j.jamKe ? ' \u00b7 Jam ' + esc(j.jamKe) : '') + '</div>' +
      '</div>' +
      '<span class="chip ' + esc(status) + '">' + esc(status) + '</span>' +
    '</div>' +
    '<div class="materi" style="margin-top:6px"><b>Materi:</b> ' + esc(j.materi || "-") + '</div>' +
    '<div class="kehadiran">Kehadiran: ' + esc(j.kehadiran || "") + '</div>' +
    (semuaHadir ? '<div class="semua-hadir">Semua siswa hadir \u2713</div>' :
      (takHadir.length ? '<div class="tidak-hadir">Tidak hadir: ' +
        takHadir.map(a => esc(a.nama) + ' (' + esc(a.status) + ')').join(", ") + '</div>' : '')) +
    (j.verifikasiOleh ? '<div class="info-baris" style="margin-top:4px">Diverifikasi: ' +
      esc(j.verifikasiOleh) + (j.tglVerifikasi ? ' (' + esc(j.tglVerifikasi) + ')' : '') + '</div>' : '') +
    tombol + verif +
  '</div>';
}

/* ---- Checkbox & bulkbar ---- */
window.togglePilihJurnal = (id) => {
  if (_pilihJurnal.has(id)) _pilihJurnal.delete(id); else _pilihJurnal.add(id);
  perbaruiBulkJurnal();
};
window.cekSemuaJurnal = (cb) => {

function perbaruiBulkJurnal(){

/* ---- Verifikasi (setujui/tolak) ---- */
window.verifSatu = async (id, keputusan) => {
  try {
    await updateDoc(doc(db, "jurnal", id), {
      status: keputusan,
      verifikasiOleh: ME.nama || ME.email,
      tglVerifikasi: new Date().toLocaleString("id-ID")
    });
    toast("Jurnal " + keputusan.toLowerCase() + ".");
    _pilihJurnal.delete(id);

window.verifMassal = async (keputusan) => {
  const ids = Array.from(_pilihJurnal);
  if (!ids.length) return;
  if (!(await konfirmasi(keputusan + " Jurnal", keputusan + " " + ids.length + " jurnal yang dipilih?", keputusan, false))) return;
  try {
    const stamp = new Date().toLocaleString("id-ID");
    const oleh = ME.nama || ME.email;
    let batch = writeBatch(db), n = 0;
    for (const id of ids) {
      batch.update(doc(db, "jurnal", id), {
        status: keputusan, verifikasiOleh: oleh, tglVerifikasi: stamp
      });
      n++;
      if (n % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();
    toast(ids.length + " jurnal " + keputusan.toLowerCase() + ".");
    _pilihJurnal = new Set();
    await renderJurnal();
  } catch (e) { toast("Gagal verifikasi massal: " + e.message); }
};

/* Cari satu pengguna berdasar peran (mis. kepsek) atau berdasar email/nama guru */
async function cariPengguna_(opsi){
  try {
    const semua = await ambilSemua("pengguna");
    if (opsi.email) {
      const byEmail = semua.find(u => String(u.email||"").toLowerCase() === String(opsi.email).toLowerCase());
      if (byEmail) return byEmail;
    }
    if (opsi.nama) {
      const byNama = semua.find(u => String(u.nama||"") === String(opsi.nama));
      if (byNama) return byNama;
    }
    // role + mapel: cari guru yang mengampu mapel tertentu (spesifik, tanpa fallback)
    if (opsi.role && opsi.mapel) {
      const byRoleMapel = semua.find(u => String(u.role||"") === opsi.role &&
        mapelGuruArray(u.mapel).includes(String(opsi.mapel)));
      return byRoleMapel || null;
    }
    if (opsi.role) {
      const byRole = semua.find(u => String(u.role||"") === opsi.role);
      if (byRole) return byRole;
    }
  } catch (e) { /* abaikan */ }
  return null;
}

/* Format tanggal Indonesia dd/mm/yyyy untuk tanda tangan (tanggal berjalan) */
function tglHariIni_(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return dd + "/" + mm + "/" + d.getFullYear();
}
