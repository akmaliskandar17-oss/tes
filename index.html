/* ============================================================
   MODUL: NILAI  (pola tab + pertemuan)
   Tab: Rata-rata | Nilai Harian | Nilai Tugas | Nilai Ulangan Harian
   Model data: satu dokumen "nilai" = satu pertemuan untuk
   kombinasi kelas+mapel+jenis, berisi nilai semua siswa.
     { kelas, mapel, jenis, pertemuan:1, nilai:{ "nis1":85, "nis2":90 } }
   ============================================================ */
const TAB_NILAI = [
  { key: "ratarata", label: "Rata-rata", jenis: null },
  { key: "harian",   label: "Nilai Harian", jenis: "Harian" },
  { key: "tugas",    label: "Nilai Tugas", jenis: "Tugas" },
  { key: "uh",       label: "Nilai Ulangan Harian", jenis: "UH" },
  { key: "sumatif",  label: "Nilai Sumatif", jenis: "Sumatif" },
  { key: "rapor",    label: "Nilai Rapor", jenis: null }
];
let _nTab = "ratarata";
let _nKelas = "", _nMapel = "";
let _nSiswaKelas = [];     // siswa di kelas terpilih
let _nDokumen = [];        // dokumen nilai untuk kelas+mapel terpilih

async function muatNilai(){
  let kelasList = [], mapelList = [];
  try {
    [kelasList, mapelList] = await Promise.all([
      ambilSemua("kelas", "namaKelas"),
      ambilSemua("mapel", "namaMapel")
    ]);
  } catch (e) {
    $("main").innerHTML = '<div class="card"><div class="page-kosong">Gagal memuat data: ' +
      esc(e.message) + '</div></div>'; return;
  }
  _kelasCache = kelasList;
  window._mapelNilai = mapelList;

  const opsiKelas = '<option value="">-- pilih kelas --</option>' +
    kelasList.map(k => '<option value="' + esc(k.namaKelas) + '"' +
      (k.namaKelas===_nKelas?" selected":"") + '>' + esc(k.namaKelas) + '</option>').join("");
  window._mapelSemua = mapelList;
  const opsiMapel = opsiMapelHTML(mapelUntukSaya(mapelList), _nMapel);

  const tabBtn = TAB_NILAI.map(t =>
    '<button class="' + (t.key===_nTab?"active":"") + '" onclick="gantiTabNilai(\'' + t.key + '\')">' +
    t.label + '</button>').join("");

  $("main").innerHTML =
    '<div class="card"><h2>Daftar Nilai Kelas</h2>' +
      '<div class="row" style="align-items:flex-end">' +
        '<div><label>Kelas</label><select id="nKelas" onchange="pilihKelasMapelNilai()">' + opsiKelas + '</select></div>' +
        '<div><label>Mapel</label><select id="nMapel" onchange="pilihKelasMapelNilai()">' + opsiMapel + '</select></div>' +
        '<div style="flex:0 0 auto;display:flex;gap:8px;align-items:flex-end">' +
          '<button class="btn btn-green" style="margin-top:0" onclick="cetakNilai()">\uD83D\uDda8 Cetak Nilai</button>' +
          '<button class="btn btn-ghost" style="margin-top:0" onclick="excelNilai()">\u2b07 Excel</button>' +
        '</div>' +
      '</div>' +
      '<div class="nilai-sub" style="margin-top:14px">' + tabBtn + '</div>' +
    '</div>' +
    '<div id="nIsi"></div>';

  if (_nKelas && _nMapel) await muatDataNilai(); else tampilPilihDulu();
}

function tampilPilihDulu(){
  $("nIsi").innerHTML = '<div class="card"><div class="page-kosong">' +
    'Pilih kelas & mapel dulu untuk menampilkan nilai.</div></div>';
}

window.gantiTabNilai = (key) => {
  _nTab = key;
  document.querySelectorAll(".nilai-sub button").forEach(b => b.classList.remove("active"));
  const idx = TAB_NILAI.findIndex(t => t.key===key);
  const btns = document.querySelectorAll(".nilai-sub button");
  if (btns[idx]) btns[idx].classList.add("active");
  renderTabNilai();
};

window.pilihKelasMapelNilai = async () => {
  _nKelas = $("nKelas").value; _nMapel = $("nMapel").value;
  if (_nKelas && _nMapel) await muatDataNilai(); else tampilPilihDulu();
};

async function muatDataNilai(){
  $("nIsi").innerHTML = '<div class="card"><div class="page-kosong">Memuat...</div></div>';
  try {
    if (!_siswaCache.length) _siswaCache = await ambilSemua("siswa", "namaSiswa");
    _nSiswaKelas = _siswaCache.filter(s => s.kelas === _nKelas);
    const semua = await ambilSemua("nilai");
    _nDokumen = semua.filter(n => n.kelas===_nKelas && n.mapel===_nMapel);
    renderTabNilai();
  } catch (e) {
    $("nIsi").innerHTML = '<div class="card"><div class="page-kosong">Gagal memuat: ' + esc(e.message) + '</div></div>';
  }
}

function renderTabNilai(){
  if (!_nKelas || !_nMapel) return tampilPilihDulu();
  if (_nTab === "ratarata") return renderRataRata();
  if (_nTab === "rapor") return renderRapor();
  return renderPertemuan();   // harian / tugas / uh / sumatif
}

/* Ambil dokumen pertemuan untuk jenis aktif, urut nomor pertemuan */
function dokJenis(jenis){
  return _nDokumen.filter(d => d.jenis === jenis)
    .sort((a,b) => Number(a.pertemuan) - Number(b.pertemuan));
}
function jenisAktif(){
  const t = TAB_NILAI.find(x => x.key === _nTab);
  return t ? t.jenis : null;
}

/* ============ TAB PERTEMUAN (Harian/Tugas/UH) ============ */
function renderPertemuan(){
  const jenis = jenisAktif();
  const label = TAB_NILAI.find(t => t.key===_nTab).label;
  const dok = dokJenis(jenis);
  const bolehEdit = (ME.role === "guru" || ME.role === "admin");

  let head = '<tr><th>No</th><th>NIS</th><th>Nama Siswa</th>';
  if (!dok.length) {
    head += '<th>Belum ada pertemuan</th>';
  } else {
    dok.forEach(d => {
      head += '<th style="text-align:center">Pertemuan ' + esc(d.pertemuan) +
        (bolehEdit ? '<br><button class="aksi-hapus" style="margin-top:4px" ' +
          'onclick="hapusPertemuan(\'' + d.id + '\')">Hapus Kolom</button>' : '') + '</th>';
    });
  }
  head += '</tr>';

  let body = "";
  _nSiswaKelas.forEach((s, i) => {
    let sel = '<tr><td>' + (i+1) + '</td><td>' + esc(s.nis||"-") + '</td><td><b>' + esc(s.namaSiswa) + '</b></td>';
    if (!dok.length) {
      sel += '<td></td>';
    } else {
      dok.forEach(d => {
        const val = (d.nilai && d.nilai[s.nis] != null) ? d.nilai[s.nis] : "";
        sel += '<td style="text-align:center">' +
          (bolehEdit ?
            '<input class="input-nilai" type="number" min="0" max="100" value="' + esc(val) + '" ' +
            'data-dok="' + d.id + '" data-nis="' + esc(s.nis) + '">' :
            esc(val === "" ? "-" : val)) +
          '</td>';
      });
    }
    sel += '</tr>';
    body += sel;
  });

  $("nIsi").innerHTML =
    '<div class="card">' +
      '<div class="toolbar" style="margin-bottom:14px">' +
        '<h2 style="flex:1;min-width:180px;margin:0">Data ' + label + ' (' + dok.length + ' pertemuan)</h2>' +
        (bolehEdit ? '<button class="rekap-tab active" style="background:var(--amber)" ' +
          'onclick="tambahPertemuan()">+ Tambah Pertemuan</button>' : '') +
      '</div>' +
      '<div class="tabel-scroll"><table class="tabel-nilai" style="min-width:' +
        (420 + dok.length*90) + 'px">' + head + body + '</table></div>' +
      (dok.length && bolehEdit ?
        '<button class="btn" onclick="simpanPertemuan()">Simpan Nilai</button>' +
        '<div id="nMsg"></div>' : '') +
    '</div>';
}

window.tambahPertemuan = async () => {
  const jenis = jenisAktif();
  const dok = dokJenis(jenis);
  const nomorBaru = dok.length ? (Math.max(...dok.map(d => Number(d.pertemuan))) + 1) : 1;
  try {
    const ref = await addDoc(collection(db, "nilai"), {
      kelas: _nKelas, mapel: _nMapel, jenis, pertemuan: nomorBaru, nilai: {}
    });
    // tambahkan ke cache lokal lalu render
    _nDokumen.push({ id: ref.id, kelas:_nKelas, mapel:_nMapel, jenis, pertemuan:nomorBaru, nilai:{} });
    toast("Pertemuan " + nomorBaru + " ditambahkan.");
    renderPertemuan();
  } catch (e) { toast("Gagal menambah: " + e.message); }
};

window.hapusPertemuan = async (id) => {
  if (!(await konfirmasi("Hapus Kolom", "Hapus kolom pertemuan ini beserta nilainya?"))) return;
  try {
    await deleteDoc(doc(db, "nilai", id));
    _nDokumen = _nDokumen.filter(d => d.id !== id);
    toast("Pertemuan dihapus.");
    renderPertemuan();
  } catch (e) { toast("Gagal menghapus: " + e.message); }
};

window.simpanPertemuan = async () => {
  const setMsg = (t, ok) => { if($("nMsg")) $("nMsg").innerHTML = '<div class="msg ' + (ok?"ok":"err") + '">' + esc(t) + '</div>'; };
  // kumpulkan nilai dari input berdasarkan data-dok
  const perDok = {};   // { docId: { nis: nilai } }
  document.querySelectorAll("#nIsi input.input-nilai").forEach(inp => {
    const docId = inp.getAttribute("data-dok");
    const nis = inp.getAttribute("data-nis");
    if (!docId) return;
    if (!perDok[docId]) perDok[docId] = {};
    const v = inp.value;
    if (v !== "") perDok[docId][nis] = Math.max(0, Math.min(100, Number(v)));
  });
  try {
    let batch = writeBatch(db), n = 0;
    for (const docId in perDok) {
      batch.update(doc(db, "nilai", docId), { nilai: perDok[docId] });
      // perbarui cache lokal
      const d = _nDokumen.find(x => x.id === docId);
      if (d) d.nilai = perDok[docId];
      n++;
      if (n % 400 === 0) { await batch.commit(); batch = writeBatch(db); }
    }
    await batch.commit();
    setMsg("Nilai tersimpan.", true);
  } catch (e) { setMsg("Gagal menyimpan: " + e.message, false); }
};

/* ============ TAB RATA-RATA (dengan bobot) ============ */
let _bobotNilai = { harian: 33, tugas: 33, uh: 34 };
let _kkm = 70;   // batas nilai tuntas (bisa diatur)

async function renderRataRata(){
  $("nIsi").innerHTML = '<div class="card"><div class="page-kosong">Menghitung...</div></div>';
  // muat bobot & KKM
  // reset ke default dulu, lalu muat bobot khusus kelas+mapel ini
  _bobotNilai = { harian: 33, tugas: 33, uh: 34 };
  _kkm = 70;
  try {
    const bsnap = await getDoc(doc(db, "bobot", idBobot(_nKelas, _nMapel)));
    if (bsnap.exists()) {
      const d = bsnap.data();
      _bobotNilai = { harian: d.harian ?? 33, tugas: d.tugas ?? 33, uh: d.uh ?? 34 };
      if (d.kkm != null) _kkm = Number(d.kkm);
    }
  } catch (e) { /* pakai default */ }

  // hitung rata tiap jenis per siswa
  function rataJenisSiswa(nis, jenis){
    const dok = dokJenis(jenis);
    const nilai = dok.map(d => (d.nilai && d.nilai[nis] != null) ? Number(d.nilai[nis]) : null)
      .filter(v => v !== null && !isNaN(v));
    if (!nilai.length) return null;
    return nilai.reduce((a,b)=>a+b,0) / nilai.length;
  }

  const bobotTot = (_bobotNilai.harian + _bobotNilai.tugas + _bobotNilai.uh) || 100;
  const baris = _nSiswaKelas.map(s => {
    const rh = rataJenisSiswa(s.nis, "Harian");
    const rt = rataJenisSiswa(s.nis, "Tugas");
    const ru = rataJenisSiswa(s.nis, "UH");
    let jml = 0, wpakai = 0;
    if (rh!==null){ jml += rh*_bobotNilai.harian; wpakai += _bobotNilai.harian; }
    if (rt!==null){ jml += rt*_bobotNilai.tugas; wpakai += _bobotNilai.tugas; }
    if (ru!==null){ jml += ru*_bobotNilai.uh; wpakai += _bobotNilai.uh; }
    const akhir = wpakai>0 ? (jml/wpakai) : null;
    return { s, rh, rt, ru, akhir };
  });

  // statistik kelas
  const akhirAda = baris.map(b => b.akhir).filter(v => v !== null);
  const rataKelas = akhirAda.length ? (akhirAda.reduce((a,b)=>a+b,0)/akhirAda.length) : null;
  const tertinggi = akhirAda.length ? Math.max(...akhirAda) : null;
  const terendah  = akhirAda.length ? Math.min(...akhirAda) : null;
  const f = v => v===null ? "-" : v.toFixed(1);

  const bolehAturBobot = bisaAturNilai();

  let tabel = '<div class="tabel-scroll"><table class="tabel-nilai" style="min-width:620px">' +
    '<tr><th>No</th><th>NIS</th><th>Nama Siswa</th>' +
    '<th style="text-align:center">Rata Harian</th>' +
    '<th style="text-align:center">Rata Tugas</th>' +
    '<th style="text-align:center">Rata Ulangan</th>' +
    '<th style="text-align:center">Rata-Rata Akhir</th></tr>';
  baris.forEach((b, i) => {
    const tuntas = b.akhir!==null && b.akhir>=_kkm;
    tabel += '<tr><td>' + (i+1) + '</td><td>' + esc(b.s.nis||"-") + '</td>' +
      '<td><b>' + esc(b.s.namaSiswa) + '</b></td>' +
      '<td style="text-align:center">' + f(b.rh) + '</td>' +
      '<td style="text-align:center">' + f(b.rt) + '</td>' +
      '<td style="text-align:center">' + f(b.ru) + '</td>' +
      '<td style="text-align:center" class="nilai-akhir ' + (b.akhir===null?"":(tuntas?"tuntas":"belum")) + '">' +
        f(b.akhir) + '</td></tr>';
  });
  tabel += '</table></div>';

  $("nIsi").innerHTML =
    '<div class="stats">' +
      '<div class="stat"><div class="lbl">RATA-RATA KELAS</div><div class="num">' + f(rataKelas) + '</div></div>' +
      '<div class="stat" style="background:var(--green-bg)"><div class="lbl" style="color:var(--green)">NILAI TERTINGGI</div>' +
        '<div class="num" style="color:var(--green)">' + f(tertinggi) + '</div></div>' +
      '<div class="stat" style="background:var(--red-bg)"><div class="lbl" style="color:var(--red)">NILAI TERENDAH</div>' +
        '<div class="num" style="color:var(--red)">' + f(terendah) + '</div></div>' +
    '</div>' +
    (bolehAturBobot ?
      '<div class="card"><h2>Atur Bobot & Batas Tuntas (KKM)</h2>' +
        '<p class="info-kolom">Persentase untuk menghitung rata-rata akhir (total sebaiknya 100%), ' +
        'dan batas nilai tuntas (KKM). Nilai \u2265 KKM ditandai hijau (tuntas), di bawahnya merah.</p>' +
        '<div class="row">' +
          '<div><label>Harian (%)</label><input id="bHarian" type="number" min="0" max="100" value="' + _bobotNilai.harian + '" oninput="hitungTotalBobotN()"></div>' +
          '<div><label>Tugas (%)</label><input id="bTugas" type="number" min="0" max="100" value="' + _bobotNilai.tugas + '" oninput="hitungTotalBobotN()"></div>' +
          '<div><label>Ulangan Harian (%)</label><input id="bUh" type="number" min="0" max="100" value="' + _bobotNilai.uh + '" oninput="hitungTotalBobotN()"></div>' +
        '</div>' +
        '<div class="row">' +
          '<div><label>Batas Tuntas / KKM</label><input id="bKkm" type="number" min="0" max="100" value="' + _kkm + '"></div>' +
          '<div></div><div></div>' +
        '</div>' +
        '<div class="bobot-total" id="bobotTotalN"></div>' +
        '<button class="btn" onclick="simpanBobotN()">Simpan Pengaturan</button>' +
        '<div id="bMsgN"></div>' +
      '</div>' : '') +
    '<div class="card"><h2>Rincian Nilai Siswa</h2>' + tabel +
      '<p class="info-kolom" style="margin-top:10px">Bobot: Harian ' + _bobotNilai.harian +
      '% \u00b7 Tugas ' + _bobotNilai.tugas + '% \u00b7 UH ' + _bobotNilai.uh + '%. ' +
      'Batas tuntas (KKM) = ' + _kkm + '. Hijau = tuntas (\u2265 ' + _kkm + '), merah = belum.</p>' +
    '</div>';
  if (bolehAturBobot) hitungTotalBobotN();
}

/* ============ TAB RAPOR ============
   Nilai Rapor = gabungan berbobot dari:
     - "Rata-Rata Akhir" (hasil tab Rata-rata: Harian/Tugas/UH berbobot)
     - "Sumatif" (rata-rata dokumen jenis Sumatif)
   Bobot rapor diatur sendiri (default 50:50). */
let _bobotRapor = { rataRata: 50, sumatif: 50 };
let _kkmRapor = 70;   // batas tuntas khusus rapor

async function renderRapor(){
  $("nIsi").innerHTML = '<div class="card"><div class="page-kosong">Menghitung...</div></div>';
  // muat bobot rata-rata, KKM, dan bobot rapor
  // reset default, lalu muat bobot khusus kelas+mapel ini
  _bobotNilai = { harian: 33, tugas: 33, uh: 34 };
  _kkm = 70;
  _bobotRapor = { rataRata: 50, sumatif: 50 };
  _kkmRapor = 70;
  try {
    const bsnap = await getDoc(doc(db, "bobot", idBobot(_nKelas, _nMapel)));
    if (bsnap.exists()) {
      const d = bsnap.data();
      _bobotNilai = { harian: d.harian ?? 33, tugas: d.tugas ?? 33, uh: d.uh ?? 34 };
      if (d.kkm != null) _kkm = Number(d.kkm);
      // KKM rapor terpisah; bila belum pernah diset, ikuti KKM umum
      _kkmRapor = (d.kkmRapor != null) ? Number(d.kkmRapor) : _kkm;
      if (d.raporRata != null || d.raporSumatif != null) {
        _bobotRapor = { rataRata: d.raporRata ?? 50, sumatif: d.raporSumatif ?? 50 };
      }
    }
  } catch (e) { /* pakai default */ }

  function rataJenisSiswa(nis, jenis){
    const dok = dokJenis(jenis);
    const nilai = dok.map(d => (d.nilai && d.nilai[nis] != null) ? Number(d.nilai[nis]) : null)
      .filter(v => v !== null && !isNaN(v));
    if (!nilai.length) return null;
    return nilai.reduce((a,b)=>a+b,0) / nilai.length;
  }
  // Rata-Rata Akhir (sama seperti tab Rata-rata)
  function rataRataAkhir(nis){
    const rh = rataJenisSiswa(nis,"Harian"), rt = rataJenisSiswa(nis,"Tugas"), ru = rataJenisSiswa(nis,"UH");
    let jml=0, w=0;
    if (rh!==null){ jml+=rh*_bobotNilai.harian; w+=_bobotNilai.harian; }
    if (rt!==null){ jml+=rt*_bobotNilai.tugas; w+=_bobotNilai.tugas; }
    if (ru!==null){ jml+=ru*_bobotNilai.uh; w+=_bobotNilai.uh; }
    return w>0 ? jml/w : null;
  }

  const wrTot = (_bobotRapor.rataRata + _bobotRapor.sumatif) || 100;
  const baris = _nSiswaKelas.map(s => {
    const rata = rataRataAkhir(s.nis);
    const sum = rataJenisSiswa(s.nis, "Sumatif");
    let jml=0, w=0;
    if (rata!==null){ jml += rata*_bobotRapor.rataRata; w += _bobotRapor.rataRata; }
    if (sum!==null){ jml += sum*_bobotRapor.sumatif; w += _bobotRapor.sumatif; }
    const rapor = w>0 ? jml/w : null;
    return { s, rata, sum, rapor };
  });

  const raporAda = baris.map(b => b.rapor).filter(v => v!==null);
  const rataKelas = raporAda.length ? raporAda.reduce((a,b)=>a+b,0)/raporAda.length : null;
  const tertinggi = raporAda.length ? Math.max(...raporAda) : null;
  const terendah  = raporAda.length ? Math.min(...raporAda) : null;
  const f = v => v===null ? "-" : v.toFixed(1);
  const bolehAtur = bisaAturNilai();

  let tabel = '<div class="tabel-scroll"><table class="tabel-nilai" style="min-width:560px">' +
    '<tr><th>No</th><th>NIS</th><th>Nama Siswa</th>' +
    '<th style="text-align:center">Rata-Rata</th>' +
    '<th style="text-align:center">Sumatif</th>' +
    '<th style="text-align:center">Nilai Rapor</th></tr>';
  baris.forEach((b, i) => {
    const tuntas = b.rapor!==null && b.rapor>=_kkmRapor;
    tabel += '<tr><td>' + (i+1) + '</td><td>' + esc(b.s.nis||"-") + '</td>' +
      '<td><b>' + esc(b.s.namaSiswa) + '</b></td>' +
      '<td style="text-align:center">' + f(b.rata) + '</td>' +
      '<td style="text-align:center">' + f(b.sum) + '</td>' +
      '<td style="text-align:center" class="nilai-akhir ' + (b.rapor===null?"":(tuntas?"tuntas":"belum")) + '">' +
        f(b.rapor) + '</td></tr>';
  });
  tabel += '</table></div>';

  $("nIsi").innerHTML =
    '<div class="stats">' +
      '<div class="stat"><div class="lbl">RATA-RATA KELAS</div><div class="num">' + f(rataKelas) + '</div></div>' +
      '<div class="stat" style="background:var(--green-bg)"><div class="lbl" style="color:var(--green)">NILAI TERTINGGI</div>' +
        '<div class="num" style="color:var(--green)">' + f(tertinggi) + '</div></div>' +
      '<div class="stat" style="background:var(--red-bg)"><div class="lbl" style="color:var(--red)">NILAI TERENDAH</div>' +
        '<div class="num" style="color:var(--red)">' + f(terendah) + '</div></div>' +
    '</div>' +
    (bolehAtur ?
      '<div class="card"><h2>Atur Bobot & Batas Tuntas Rapor</h2>' +
        '<p class="info-kolom">Nilai Rapor = gabungan berbobot dari Rata-Rata (Harian/Tugas/UH) dan Sumatif ' +
        '(total sebaiknya 100%), serta batas tuntas (KKM) khusus rapor.</p>' +
        '<div class="row">' +
          '<div><label>Bobot Rata-Rata (%)</label><input id="rRata" type="number" min="0" max="100" value="' + _bobotRapor.rataRata + '" oninput="hitungTotalBobotRapor()"></div>' +
          '<div><label>Bobot Sumatif (%)</label><input id="rSum" type="number" min="0" max="100" value="' + _bobotRapor.sumatif + '" oninput="hitungTotalBobotRapor()"></div>' +
        '</div>' +
        '<div class="row">' +
          '<div><label>Batas Tuntas / KKM Rapor</label><input id="rKkm" type="number" min="0" max="100" value="' + _kkmRapor + '"></div>' +
          '<div></div>' +
        '</div>' +
        '<div class="bobot-total" id="bobotTotalRapor"></div>' +
        '<button class="btn" onclick="simpanBobotRapor()">Simpan Pengaturan Rapor</button>' +
        '<div id="rMsg"></div>' +
      '</div>' : '') +
    '<div class="card"><h2>Rincian Nilai Rapor</h2>' + tabel +
      '<p class="info-kolom" style="margin-top:10px">Bobot Rapor: Rata-Rata ' + _bobotRapor.rataRata +
      '% \u00b7 Sumatif ' + _bobotRapor.sumatif + '%. Batas tuntas (KKM) rapor = ' + _kkmRapor + '. ' +
      'Kolom "Rata-Rata" diambil dari tab Rata-rata (gabungan Harian/Tugas/UH). ' +
      'Hijau = tuntas (\u2265 ' + _kkmRapor + '), merah = belum.</p>' +
    '</div>';
  if (bolehAtur) hitungTotalBobotRapor();
}

  const raporRata = Number($("rRata").value)||0;

/* ============ HITUNG REKAP LENGKAP (untuk cetak & excel) ============ */
async function hitungRekapNilaiLengkap(){
  // muat bobot & kkm terbaru
  let bobot = { harian:33, tugas:33, uh:34 }, kkm = 70;
  let bRapor = { rataRata:50, sumatif:50 }, kkmRapor = 70;
  try {
    const bsnap = await getDoc(doc(db, "bobot", idBobot(_nKelas, _nMapel)));
    if (bsnap.exists()) {
      const d = bsnap.data();
      bobot = { harian: d.harian ?? 33, tugas: d.tugas ?? 33, uh: d.uh ?? 34 };
      if (d.kkm != null) kkm = Number(d.kkm);
      bRapor = { rataRata: d.raporRata ?? 50, sumatif: d.raporSumatif ?? 50 };
      kkmRapor = (d.kkmRapor != null) ? Number(d.kkmRapor) : kkm;
    }
  } catch (e) { /* default */ }

  function rataJenis(nis, jenis){
    const arr = dokJenis(jenis).map(d => (d.nilai && d.nilai[nis]!=null) ? Number(d.nilai[nis]) : null)
      .filter(v => v!==null && !isNaN(v));
    return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  }

  const baris = _nSiswaKelas.map(s => {
    const rh = rataJenis(s.nis,"Harian"), rt = rataJenis(s.nis,"Tugas"),
          ru = rataJenis(s.nis,"UH"), sum = rataJenis(s.nis,"Sumatif");
    let jml=0,w=0;
    if (rh!==null){ jml+=rh*bobot.harian; w+=bobot.harian; }
    if (rt!==null){ jml+=rt*bobot.tugas; w+=bobot.tugas; }
    if (ru!==null){ jml+=ru*bobot.uh; w+=bobot.uh; }
    const rataAkhir = w>0 ? jml/w : null;
    let jr=0,wr=0;
    if (rataAkhir!==null){ jr+=rataAkhir*bRapor.rataRata; wr+=bRapor.rataRata; }
    if (sum!==null){ jr+=sum*bRapor.sumatif; wr+=bRapor.sumatif; }
    const rapor = wr>0 ? jr/wr : null;
    return { nis:s.nis, nama:s.namaSiswa, rh, rt, ru, rataAkhir, sum, rapor };
  });
  return { baris, bobot, kkm, bRapor, kkmRapor };
}

/* ============ EXPORT EXCEL NILAI ============ */
window.excelNilai = async () => {
  if (!_nKelas || !_nMapel) return toast("Pilih kelas & mapel dulu.");
  const { baris, kkmRapor } = await hitungRekapNilaiLengkap();
  const bulat = v => v===null ? "" : Number(v.toFixed(1));
  const data = baris.map((b,i) => ({
    "No": i+1, "NIS": b.nis||"", "Nama": b.nama,
    "Rata Harian": bulat(b.rh), "Rata Tugas": bulat(b.rt), "Rata UH": bulat(b.ru),
    "Rata-Rata Akhir": bulat(b.rataAkhir), "Sumatif": bulat(b.sum),
    "Nilai Rapor": bulat(b.rapor),
    "Keterangan": b.rapor===null ? "" : (b.rapor>=kkmRapor ? "Tuntas" : "Belum Tuntas")
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  ws["!cols"] = [{wch:5},{wch:12},{wch:24},{wch:11},{wch:11},{wch:10},{wch:14},{wch:10},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Nilai");
  const namaFile = "Nilai-" + _nKelas.replace(/\s+/g,"") + "-" + _nMapel.replace(/\s+/g,"") + ".xlsx";
  XLSX.writeFile(wb, namaFile);
  toast("Excel diunduh.");
};
