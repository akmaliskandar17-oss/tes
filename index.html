                                            <td className="p-4 text-slate-600">{g.mapel}</td>
                                            <td className="p-4 text-slate-500 font-mono text-xs">{g.password}</td>
                                            <td className="p-4 text-center space-x-2 font-semibold">
                                                <button onClick={() => handleEditClick(g)} className="px-2.5 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition">
                                                    Ubah
                                                </button>
                                                <button onClick={() => deleteGuru(g.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition" title="Hapus Akun">
                                                    <IconTrash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {listGuru.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="p-12 text-center text-slate-400">
                                                Belum ada guru yang didaftarkan.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewKelolaReferensi = ({ classes, subjects, addClass, deleteClass, addSubject, deleteSubject, triggerAlert }) => {
            const [classNameInput, setClassNameInput] = useState('');
            const [subjectNameInput, setSubjectNameInput] = useState('');

            const handleAddClass = async (e) => {
                e.preventDefault();
                if (!classNameInput.trim()) return;
                const exist = classes.find(c => c.nama.toUpperCase() === classNameInput.trim().toUpperCase());
                if (exist) {
                    triggerAlert("Peringatan", "Kelas tersebut sudah terdaftar!");
                    return;
                }
                await addClass({ nama: classNameInput.trim().toUpperCase() });
                setClassNameInput('');
                triggerAlert("Berhasil", "Kelas baru berhasil ditambahkan!");
            };

            const handleAddSubject = async (e) => {
                e.preventDefault();
                if (!subjectNameInput.trim()) return;
                const exist = subjects.find(s => s.nama.toLowerCase() === subjectNameInput.trim().toLowerCase());
                if (exist) {
                    triggerAlert("Peringatan", "Mata pelajaran tersebut sudah terdaftar!");
                    return;
                }
                await addSubject({ nama: subjectNameInput.trim() });
                setSubjectNameInput('');
                triggerAlert("Berhasil", "Mata pelajaran baru berhasil ditambahkan!");
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in duration-200">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                            <span className="text-indigo-600 text-xl">🏫</span>
                            <span>Kelola Referensi Kelas</span>
                        </h3>
                        <form onSubmit={handleAddClass} className="flex space-x-2 mb-6">
                            <input 
                                type="text" 
                                required 
                                placeholder="Nama Kelas (Contoh: XI-C)" 
                                value={classNameInput} 
                                onChange={e => setClassNameInput(e.target.value)} 
                                className="flex-1 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm uppercase" 
                            />
                            <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 rounded-xl transition text-sm shadow-md">
                                Tambah
                            </button>
                        </form>
                        
                        <div className="overflow-y-auto max-h-[40vh] rounded-xl border border-slate-100">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="sticky top-0 bg-slate-50 font-semibold z-10 border-b border-slate-100">
                                    <tr className="text-slate-500">
                                        <th className="p-4">Nama Kelas</th>
                                        <th className="p-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {classes.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-50/30 transition">
                                            <td className="p-4 font-bold text-indigo-700">{c.nama}</td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => deleteClass(c.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition mx-auto block" title="Hapus Kelas">
                                                    <IconTrash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {classes.length === 0 && (
                                        <tr>
                                            <td colSpan="2" className="p-8 text-center text-slate-400">Belum ada kelas terdaftar.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                            <span className="text-indigo-600 text-xl">📚</span>
                            <span>Kelola Referensi Mata Pelajaran</span>
                        </h3>
                        <form onSubmit={handleAddSubject} className="flex space-x-2 mb-6">
                            <input 
                                type="text" 
                                required 
                                placeholder="Nama Mapel (Contoh: IPA Terapan)" 
                                value={subjectNameInput} 
                                onChange={e => setSubjectNameInput(e.target.value)} 
                                className="flex-1 p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" 
                            />
                            <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 rounded-xl transition text-sm shadow-md">
                                Tambah
                            </button>
                        </form>
                        
                        <div className="overflow-y-auto max-h-[40vh] rounded-xl border border-slate-100">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="sticky top-0 bg-slate-50 font-semibold z-10 border-b border-slate-100">
                                    <tr className="text-slate-500">
                                        <th className="p-4">Nama Mata Pelajaran</th>
                                        <th className="p-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {subjects.map(s => (
                                        <tr key={s.id} className="hover:bg-slate-50/30 transition">
                                            <td className="p-4 font-semibold text-slate-800">{s.nama}</td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => deleteSubject(s.id)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition mx-auto block" title="Hapus Mapel">
                                                    <IconTrash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {subjects.length === 0 && (
                                        <tr>
                                            <td colSpan="2" className="p-8 text-center text-slate-400">Belum ada mata pelajaran terdaftar.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewKelolaKop = ({ kop, updateKop, triggerAlert }) => {
            const [instansi, setInstansi] = useState(kop.instansi || '');
            const [sekolah, setSekolah] = useState(kop.sekolah || '');
            const [alamat, setAlamat] = useState(kop.alamat || '');
            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                setInstansi(kop.instansi || '');
                setSekolah(kop.sekolah || '');
                setAlamat(kop.alamat || '');
            }, [kop]);

            const handleSave = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                try {
                    await updateKop({ instansi, sekolah, alamat });
                    triggerAlert("Kop Cetak Diperbarui", "Desain Kop Surat resmi berhasil disimpan!");
                } catch (err) {
                    console.error(err);
                    triggerAlert("Error", "Gagal memperbarui Kop Cetak.");
                }
                setIsSaving(false);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in duration-200">
                    <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                        <IconPrint />
                        <span>Pengaturan Kop Cetak Resmi</span>
                    </h3>
                    
                    <form onSubmit={handleSave} className="space-y-5">
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Instansi / Dinas (Baris 1)</label>
                            <input type="text" required placeholder="Contoh: PEMERINTAH PROVINSI SULAWESI SELATAN" value={instansi} onChange={e=>setInstansi(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm font-semibold uppercase" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Sekolah / Lembaga (Baris 2)</label>
                            <input type="text" required placeholder="Contoh: SMK NEGERI 3 SELAYAR" value={sekolah} onChange={e=>setSekolah(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm font-black uppercase" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Alamat Lengkap &amp; Detail Kontak (Baris 3)</label>
                            <textarea required rows="2" placeholder="Contoh: Jl. Pendidikan No. 3 Benteng, Kab. Kepulauan Selayar" value={alamat} onChange={e=>setAlamat(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm resize-none"></textarea>
                        </div>
                        
                        <div className="p-5 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 text-center">Pratinjau Kop Surat Resmi</h4>
                            <div className="bg-white p-6 border border-slate-200 text-center text-slate-900 shadow-sm rounded-lg">
                                <h1 className="text-xs font-bold uppercase leading-tight">{instansi || 'INSTANSI'}</h1>
                                <h2 className="text-sm font-black uppercase mt-0.5">{sekolah || 'SEKOLAH'}</h2>
                                <p className="text-[10px] text-slate-500 mt-1">{alamat || 'ALAMAT'}</p>
                                <div className="w-full h-0.5 bg-slate-900 mt-3"></div>
                            </div>
                        </div>

                        <button type="submit" disabled={isSaving} className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-150 text-sm shadow-lg shadow-indigo-600/20">
                            {isSaving ? 'Menyimpan...' : 'Perbarui Desain Kop Surat'}
                        </button>
                    </form>
                </div>
            );
        };

        const ViewKelolaKepsek = ({ gurus, updateGuru, triggerAlert }) => {
            const listKepsek = useMemo(() => gurus.filter(g => g.role === 'kepsek'), [gurus]);

            const [nip, setNip] = useState('');
            const [nama, setNama] = useState('');
            const [password, setPassword] = useState('');
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                if (listKepsek.length > 0) {
                    const k = listKepsek[0];
                    setEditingId(k.id);
                    setNip(k.nip);
                    setNama(k.nama);
                    setPassword(k.password);
                }
            }, [listKepsek]);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!nip.trim() || !nama.trim() || !password.trim()) return;

                const payload = {
                    nip: nip.trim(),
                    nama: nama.trim(),
                    password: password.trim(),
                    mapel: 'Kepala Sekolah',
                    role: 'kepsek'

                try {
                    if (editingId) {

                    }
                } catch (err) {
                    console.error(err);

            return (

                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Kata Sandi Akun</label>

        const ViewKelolaAdmin = ({ gurus, updateGuru, loggedInUser, triggerAlert }) => {
            const currentAdmin = useMemo(() => gurus.find(g => g.role === 'admin' && g.id === loggedInUser.id) || loggedInUser, [gurus, loggedInUser]);

            const [nip, setNip] = useState('');
            const [nama, setNama] = useState('');
            const [password, setPassword] = useState('');

            useEffect(() => {
                if (currentAdmin) {
                    setNip(currentAdmin.nip);
                    setNama(currentAdmin.nama);
                    setPassword(currentAdmin.password);
                }
            }, [currentAdmin]);

            const handleSave = async (e) => {
                e.preventDefault();
                if (!nip.trim() || !nama.trim() || !password.trim()) return;

                const payload = {
                    nip: nip.trim(),
                    nama: nama.trim(),
                    password: password.trim(),
                    mapel: currentAdmin.mapel || 'Sistem IT',
                    role: 'admin'
                };

                try {
                    await updateGuru(currentAdmin.id, payload);
                    triggerAlert("Admin Diperbarui", "Akun Administrator Berhasil Diperbarui!");
                } catch (err) {
                    console.error(err);
                }
            };

            return (
                <div className="max-w-xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 animate-in fade-in duration-200">

                    <form onSubmit={handleSave} className="space-y-5">

                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Administrator</label>
                            <input type="text" required placeholder="Nama Lengkap Admin" value={nama} onChange={e=>setNama(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />

                        </div>
                        <button type="submit" className="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl hover:bg-indigo-700 transition duration-150 text-sm shadow-lg shadow-indigo-600/20">

        const ViewDashboard = ({ journals, students, changeView }) => {

                            <div>
                                <h3 className="text-lg font-bold text-slate-900">Aktivitas Mengajar Terkini</h3>

                            <button onClick={() => changeView('riwayat')} className="mt-3 sm:mt-0 text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">

                        <div className="overflow-x-auto">

                                    <tr className="bg-slate-50/75 text-slate-500 font-semibold border-b border-slate-100">

                                <tbody className="divide-y divide-slate-100">
                                    {journals.slice(0, 5).map((j, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition">
                                            <td className="p-4 font-medium text-slate-800">{j.tanggal}</td>

                                                    <p className="font-semibold text-sm">Belum ada jurnal KBM</p>
                                                    <p className="text-xs">Klik menu "Isi Jurnal &amp; Absen" di bilah menu samping.</p>
                                                </div>
                                            </td>
                                        </tr>
                                    )}

                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewDashboardKepsek = ({ journals, students, changeView }) => {
            const today = new Date().toISOString().split('T')[0];
            const journalsToday = journals.filter(j => j.tanggal === today).length;
            const uniqueTeachers = new Set(journals.map(j => j.guru_nama)).size;
            const classesCount = new Set(students.map(s => s.kelas)).size;

            return (
                <div className="space-y-8 animate-in fade-in duration-200">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Total Guru Aktif" value={uniqueTeachers || 0} color="indigo" icon={<IconUsers/>} onClick={() => changeView('monitoring_jurnal')} />
                        <StatCard title="Total Siswa" value={students.length} color="sky" icon={<IconUsers/>} onClick={() => {}} />
                        <StatCard title="Jumlah Kelas" value={classesCount} color="indigo" icon={<IconBook/>} onClick={() => {}} />
                        <StatCard title="KBM Hari Ini" value={journalsToday} color="emerald" icon={<IconHistory/>} onClick={() => changeView('monitoring_jurnal')} />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                            <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-900">Log Aktivitas Guru Terbaru</h3>
                                    <p className="text-slate-500 text-xs">Pemantauan kegiatan belajar mengajar real-time</p>
                                </div>
                                <button onClick={() => changeView('monitoring_jurnal')} className="text-sm font-semibold text-indigo-600 hover:text-indigo-800">
                                    Pantau Semua &rarr;
                                </button>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead>
                                        <tr className="bg-slate-50/75 text-slate-500 font-semibold border-b border-slate-100">
                                            <th className="p-4">Guru</th>
                                            <th className="p-4">Tanggal</th>
                                            <th className="p-4">Kelas</th>
                                            <th className="p-4">Materi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {journals.slice(0, 5).map((j, i) => (
                                            <tr key={i} className="hover:bg-slate-50/50 transition">
                                                <td className="p-4 font-semibold text-slate-800">{j.guru_nama}</td>
                                                <td className="p-4 text-slate-500">{j.tanggal}</td>
                                                <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                                <td className="p-4 text-slate-500 truncate max-w-[150px]">{j.materi}</td>
                                            </tr>
                                        ))}
                                        {journals.length === 0 && (
                                            <tr>
                                                <td colSpan="4" className="p-12 text-center text-slate-400">Belum ada aktivitas guru yang terekam hari ini.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                            <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-4">Persentase KBM</h3>
                            <div className="flex-1 flex flex-col items-center justify-center text-center space-y-4">
                                <div className="relative w-36 h-36 flex items-center justify-center">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-100" strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path className="text-indigo-600" strokeDasharray="85, 100" strokeWidth="3" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    </svg>
                                    <div className="absolute text-center">
                                        <p className="text-3xl font-black text-slate-900">85%</p>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Kehadiran</p>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-500 leading-relaxed px-4">Rata-rata persentase kehadiran murid di seluruh kelas bulan ini mencapai 85%.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, color, icon, onClick }) => {
            const colors = {
                indigo: 'bg-indigo-600 shadow-indigo-600/20 text-indigo-600',
                sky: 'bg-sky-500 shadow-sky-500/20 text-sky-500',
                emerald: 'bg-emerald-500 shadow-emerald-500/20 text-emerald-500'
            };
            return (
                <div onClick={onClick} className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 flex items-center space-x-5 cursor-pointer hover:shadow-md transition duration-200">
                    <div className={`p-4 rounded-2xl bg-slate-50 ${colors[color] || 'bg-slate-50 text-slate-700'}`}>
                        {icon}
                    </div>
                    <div>
                        <p className="text-xs font-semibold tracking-wider text-slate-400 uppercase">{title}</p>
                        <p className="text-3xl font-extrabold text-slate-800 mt-1">{value}</p>
                    </div>
                </div>
            );
        };

        const ViewDataSiswa = ({ students, classes, addStudent, updateStudent, addStudentsBulk, deleteStudent, deleteStudentsBulk, triggerAlert, triggerConfirm }) => {
            const [activeFormTab, setActiveFormTab] = useState('single'); 
            const [nama, setNama] = useState('');
            const [nis, setNis] = useState('');
            const [kelas, setKelas] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [editingId, setEditingId] = useState(null);
            const [filterKelas, setFilterKelas] = useState('Semua');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedSiswaIds, setSelectedSiswaIds] = useState([]);

            const availableClasses = useMemo(() => {
                return ['Semua', ...classes.map(c => c.nama)].sort();
            }, [classes]);

            const filteredStudents = useMemo(() => {
                return students.filter(s => {
                    const matchesClass = filterKelas === 'Semua' || s.kelas === filterKelas;
                    const matchesSearch = s.nama.toLowerCase().includes(searchQuery.toLowerCase()) || s.nis.includes(searchQuery);
                    return matchesClass && matchesSearch;
                });
            }, [students, filterKelas, searchQuery]);

            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if(!nama.trim() || !nis.trim() || !kelas.trim()) return;
                setIsSubmitting(true);
                try {
                    const studentPayload = {
                        nama: nama.trim(),
                        nis: nis.trim(),
                        kelas: kelas.trim()
                    };

                    if (editingId) {
                        await updateStudent(editingId, studentPayload);
                        setEditingId(null);
                        setNama('');
                        setNis('');
                        setKelas('');
                        triggerAlert("Berhasil", "Data siswa berhasil diperbarui!");
                    } else {
                        const exist = students.find(s => s.nis === studentPayload.nis);
                        if (exist) {
                            triggerAlert("Peringatan", "Siswa dengan NIS tersebut sudah terdaftar di sistem!");
                            setIsSubmitting(false);
                            return;
                        }
                        await addStudent(studentPayload);
                        setNama(''); 
                        setNis('');
                        setKelas('');
                        triggerAlert("Siswa Ditambahkan", "Data siswa berhasil dimasukkan!");
                    }
                } catch (error) {
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            const handleBulkImport = async (e) => {
                e.preventDefault();
                if(!bulkText.trim()) return;
                setIsSubmitting(true);

                const lines = bulkText.split('\n');
                const studentList = [];
                let failedCount = 0;

                for (let line of lines) {
                    if (!line.trim()) continue;
                    const cols = line.split('\t');
                    if (cols.length >= 3) {
                        studentList.push({
                            nis: cols[0].trim(),
                            nama: cols[1].trim(),
                            kelas: cols[2].trim().toUpperCase()
                        });
                    } else {
                        failedCount++;
                    }
                }

                if (studentList.length > 0) {
                    try {
                        await addStudentsBulk(studentList);
                        setBulkText('');
                        triggerAlert("Bulk Import Sukses", `Berhasil memasukkan ${studentList.length} siswa! ${failedCount > 0 ? failedCount + ' baris gagal diproses.' : ''}`);
                    } catch (error) {
                        console.error(error);
                        triggerAlert("Error", "Gagal melakukan import massal data siswa.");
                    }
                } else {
                    triggerAlert("Import Gagal", "Format data tidak valid. Gunakan format tabel Excel (NIS, Nama, Kelas) dipisahkan oleh Tab.");
                }
                setIsSubmitting(false);
            };

            const startEdit = (siswa) => {
                setEditingId(siswa.id);
                setNama(siswa.nama);
                setNis(siswa.nis);
                setKelas(siswa.kelas);
                setActiveFormTab('single');
            };

            const cancelEdit = () => {
                setEditingId(null);
                setNama('');
                setNis('');
                setKelas('');
            };

            const handleSelectSiswa = (id) => {
                setSelectedSiswaIds(prev => 
                    prev.includes(id) ? prev.filter(item => item !== id) : [...prev, id]
                );
            };

            const handleSelectAllFiltered = () => {
                const filteredIds = filteredStudents.map(s => s.id);
                const allSelected = filteredIds.every(id => selectedSiswaIds.includes(id));
                if (allSelected) {
                    setSelectedSiswaIds(prev => prev.filter(id => !filteredIds.includes(id)));
                } else {
                    setSelectedSiswaIds(prev => [...new Set([...prev, ...filteredIds])]);
                }
            };

            const handleDeleteSelected = () => {
                if (selectedSiswaIds.length === 0) return;
                triggerConfirm(
                    "Hapus Massal Siswa",
                    `Apakah Anda yakin ingin menghapus ${selectedSiswaIds.length} siswa terpilih secara permanen?`,
                    async () => {
                        await deleteStudentsBulk(selectedSiswaIds);
                        setSelectedSiswaIds([]);
                        triggerAlert("Sukses", "Data siswa terpilih berhasil dihapus.");
                    }
                );
            };

            const handleDeleteClass = () => {
                if (filterKelas === 'Semua') return;
                const classStudents = students.filter(s => s.kelas === filterKelas);
                if (classStudents.length === 0) return;
                triggerConfirm(
                    "Hapus Satu Kelas",
                    `Apakah Anda yakin ingin menghapus SELURUH siswa kelas ${filterKelas} (${classStudents.length} siswa) secara permanen?`,
                    async () => {
                        const idsToDelete = classStudents.map(s => s.id);
                        await deleteStudentsBulk(idsToDelete);
                        setSelectedSiswaIds([]);
                        triggerAlert("Sukses", `Seluruh siswa kelas ${filterKelas} berhasil dihapus.`);
                    }
                );
            };

            const handleDeleteSingle = (siswa) => {
                triggerConfirm(
                    "Hapus Siswa",
                    `Apakah Anda yakin ingin menghapus siswa ${siswa.nama} (NIS: ${siswa.nis}) secara permanen?`,
                    async () => {
                        await deleteStudent(siswa.id);
                        setSelectedSiswaIds(prev => prev.filter(id => id !== siswa.id));
                        triggerAlert("Sukses", "Siswa berhasil dihapus.");
                    }
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-in fade-in duration-200">
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 h-fit">
                        <div className="flex border-b border-slate-100 mb-6">
                            <button 
                                onClick={() => setActiveFormTab('single')}
                                className={`flex-1 pb-3 text-xs font-bold uppercase tracking-wider transition ${activeFormTab === 'single' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                {editingId ? 'Edit Siswa' : 'Tambah Satu'}
                            </button>
                            {!editingId && (
                                <button 
                                    onClick={() => setActiveFormTab('bulk')}
                                    className={`flex-1 pb-3 text-xs font-bold uppercase tracking-wider transition ${activeFormTab === 'bulk' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}
                                >
                                    Import Massal
                                </button>
                            )}
                        </div>

                        {activeFormTab === 'single' ? (
                            <form onSubmit={handleAddOrUpdate} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nomor Induk Siswa (NIS)</label>
                                    <input type="text" required placeholder="Contoh: 24011" value={nis} onChange={e=>setNis(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Lengkap Siswa</label>
                                    <input type="text" required placeholder="Contoh: Adelia Pratiwi" value={nama} onChange={e=>setNama(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Rombel / Kelas</label>
                                    <select required value={kelas} onChange={e=>setKelas(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm bg-white">
                                        <option value="">-- Pilih Kelas --</option>
                                        {classes.map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                                    </select>
                                </div>
                                <div className="flex space-x-2">
                                    {editingId && (
                                        <button type="button" onClick={cancelEdit} className="w-1/2 bg-slate-100 text-slate-600 font-semibold py-3 rounded-xl hover:bg-slate-200 transition text-sm">
                                            Batal
                                        </button>
                                    )}
                                    <button type="submit" disabled={isSubmitting} className={`font-semibold py-3 rounded-xl hover:bg-indigo-700 transition duration-150 disabled:opacity-50 text-sm shadow-md shadow-indigo-600/10 ${editingId ? 'w-1/2 bg-indigo-600 text-white' : 'w-full bg-indigo-600 text-white'}`}>
                                        {isSubmitting ? 'Sedang Menyimpan...' : editingId ? 'Simpan Perubahan' : 'Masukkan Data Siswa'}
                                    </button>
                                </div>
                            </form>
                        ) : (
                            <form onSubmit={handleBulkImport} className="space-y-5">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Salin Data dari Excel (NIS &rarr; Nama &rarr; Kelas)</label>
                                    <textarea 
                                        required 
                                        rows="10" 
                                        placeholder="24011&#9;Adelia Pratiwi&#9;XI-A&#10;24012&#9;Budi Nugraha&#9;XI-A"
                                        value={bulkText} 
                                        onChange={e=>setBulkText(e.target.value)} 
                                        className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm font-mono whitespace-pre resize-none"
                                    ></textarea>
                                </div>
                                <p className="text-[11px] text-slate-400 leading-relaxed">
                                    * Tips: Di Excel, buat 3 kolom yaitu NIS, Nama, Kelas. Salin dan tempelkan langsung ke kolom teks di atas.
                                </p>
                                <button type="submit" disabled={isSubmitting} className="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transition duration-150 disabled:opacity-50 text-sm shadow-md shadow-indigo-600/10">
                                    {isSubmitting ? 'Memproses Import...' : 'Proses Import Massal'}
                                </button>
                            </form>
                        )}
                    </div>

                    <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b border-slate-100 pb-4">
                            <h3 className="text-lg font-bold text-slate-900">
                                Daftar Siswa Terdaftar ({filteredStudents.length})
                            </h3>
                            <div className="flex flex-wrap items-center gap-2">
                                <select 
                                    value={filterKelas} 
                                    onChange={e => { setFilterKelas(e.target.value); setSelectedSiswaIds([]); }}
                                    className="p-2 text-xs border border-slate-200 rounded-xl font-semibold outline-none bg-slate-50 text-slate-700 font-sans"
                                >
                                    {availableClasses.map(c => <option key={c} value={c}>{c === 'Semua' ? 'Semua Kelas' : `Kelas: ${c}`}</option>)}
                                </select>
                                <input 
                                    type="text" 
                                    placeholder="Cari nama / NIS..." 
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                    className="p-2 text-xs border border-slate-200 rounded-xl outline-none bg-slate-50 text-slate-700 w-36 sm:w-48 font-sans"
                                />
                            </div>
                        </div>

                        {selectedSiswaIds.length > 0 && (
                            <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-2xl flex items-center justify-between mb-4 animate-in fade-in slide-in-from-top-4 duration-150">
                                <span className="text-xs font-bold text-indigo-800">
                                    {selectedSiswaIds.length} Siswa Terpilih
                                </span>
                                <button 
                                    onClick={handleDeleteSelected}
                                    className="px-3 py-1.5 bg-rose-600 hover:bg-rose-700 text-white font-bold text-xs rounded-xl transition shadow-md shadow-rose-600/15"
                                >
                                    Hapus Terpilih
                                </button>
                            </div>
                        )}

                        {filterKelas !== 'Semua' && filteredStudents.length > 0 && (
                            <div className="flex justify-end mb-4">
                                <button 
                                    onClick={handleDeleteClass}
                                    className="px-3 py-1.5 border border-rose-200 text-rose-600 hover:bg-rose-50 text-xs font-bold rounded-xl transition"
                                >
                                    Hapus Seluruh Kelas {filterKelas}
                                </button>
                            </div>
                        )}

                        <div className="overflow-y-auto max-h-[60vh] rounded-xl border border-slate-100">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="sticky top-0 bg-slate-50 font-semibold z-10 border-b border-slate-100">
                                    <tr className="text-slate-500">
                                        <th className="p-4 w-12 text-center">
                                            <input 
                                                type="checkbox"
                                                checked={filteredStudents.length > 0 && filteredStudents.every(s => selectedSiswaIds.includes(s.id))}
                                                onChange={handleSelectAllFiltered}
                                                className="w-4 h-4 cursor-pointer accent-indigo-600"
                                            />
                                        </th>
                                        <th className="p-4">Kelas</th>
                                        <th className="p-4">NIS</th>
                                        <th className="p-4">Nama Lengkap</th>
                                        <th className="p-4 text-center">Tindakan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredStudents.map(s => (
                                        <tr key={s.id} className={`border-b hover:bg-slate-50/30 transition ${selectedSiswaIds.includes(s.id) ? 'bg-indigo-50/30' : ''}`}>
                                            <td className="p-4 text-center">
                                                <input 
                                                    type="checkbox"
                                                    checked={selectedSiswaIds.includes(s.id)}
                                                    onChange={() => handleSelectSiswa(s.id)}
                                                    className="w-4 h-4 cursor-pointer accent-indigo-600"
                                                />
                                            </td>
                                            <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{s.kelas}</span></td>
                                            <td className="p-4 text-slate-600 font-mono text-xs">{s.nis}</td>
                                            <td className="p-4 text-slate-800 font-medium">{s.nama}</td>
                                            <td className="p-4 text-center space-x-2 whitespace-nowrap font-semibold">
                                                <button onClick={() => startEdit(s)} className="px-2.5 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition">
                                                    Ubah
                                                </button>
                                                <button onClick={() => handleDeleteSingle(s)} className="p-1.5 text-rose-500 hover:bg-rose-50 rounded-lg transition" title="Hapus Siswa">
                                                    <IconTrash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredStudents.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="p-12 text-center text-slate-400">
                                                Tidak menemukan data siswa yang sesuai.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewIsiJurnal = ({ students, classes, subjects, addJournal, onSuccess, triggerAlert }) => {
            const [tanggal, setTanggal] = useState(new Date().toISOString().split('T')[0]);
            const [kelasTerpilih, setKelasTerpilih] = useState('');
            const [mapel, setMapel] = useState('');
            const [materi, setMateri] = useState('');
            const [jumlahJam, setJumlahJam] = useState('');
            const [guruPengganti, setGuruPengganti] = useState('');
            const [catatan, setCatatan] = useState('');
            const [absensi, setAbsensi] = useState({});
            const [fotoBase64, setFotoBase64] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const availableClasses = useMemo(() => {
                return classes.map(c => c.nama).sort();
            }, [classes]);
            
            const studentsInClass = useMemo(() => {
                return students.filter(s => s.kelas === kelasTerpilih);
            }, [students, kelasTerpilih]);

            useEffect(() => {
                const initialAbsen = {};
                studentsInClass.forEach(s => {
                    initialAbsen[s.id] = 'H';
                });
                setAbsensi(initialAbsen);
            }, [studentsInClass]);

            const handleAbsenChange = (studentId, status) => {
                setAbsensi(prev => ({ ...prev, [studentId]: status }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const base64Str = canvas.toDataURL('image/jpeg', 0.65);
                        setFotoBase64(base64Str);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!kelasTerpilih || studentsInClass.length === 0) {
                    triggerAlert("Formulir Belum Lengkap", "Harap pilih kelas yang telah memiliki murid sebelum menyimpan jurnal!");
                    return;
                }
                
                setIsSubmitting(true);
                
                let hadir = 0, sakit = 0, izin = 0, alpa = 0;
                Object.values(absensi).forEach(val => {
                    if(val === 'H') hadir++;
                    else if(val === 'S') sakit++;
                    else if(val === 'I') izin++;
                    else if(val === 'A') alpa++;
                });

                const payload = {
                    tanggal,
                    kelas: kelasTerpilih,
                    mapel,
                    materi,
                    jumlah_jam: jumlahJam,
                    guru_pengganti: guruPengganti.trim(),
                    catatan,
                    fotoUrl: fotoBase64 || "https://placehold.co/800x450/e2e8f0/64748b?text=Tidak+Ada+Dokumentasi+KBM",
                    waktu_input: new Date().toISOString(),
                    absensi_data: absensi,
                    rekap: { hadir, sakit, izin, alpa }
                };

                try {
                    await addJournal(payload);
                    onSuccess();
                } catch (error) {
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 max-w-5xl mx-auto animate-in fade-in duration-200">
                    <div className="border-b border-slate-100 pb-4 mb-6">
                        <h2 className="text-xl font-bold text-slate-900">Form Jurnal Mengajar Terintegrasi</h2>
                        <p className="text-xs text-slate-500 mt-1">Pengisian lembar jurnal KBM sekaligus mengabsen seluruh murid</p>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Tanggal Pertemuan</label>
                                <input type="date" required value={tanggal} onChange={e=>setTanggal(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white text-sm font-sans" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Pilih Kelas</label>
                                <select required value={kelasTerpilih} onChange={e=>setKelasTerpilih(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white text-sm font-semibold font-sans">
                                    <option value="">-- Silakan Pilih Kelas --</option>
                                    {availableClasses.map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Mata Pelajaran</label>
                                <select required value={mapel} onChange={e=>setMapel(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm bg-white font-sans">
                                    <option value="">-- Pilih Mata Pelajaran --</option>
                                    {subjects.map(s => <option key={s.id} value={s.nama}>{s.nama}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Pokok Bahasan / Materi</label>
                                <input type="text" required placeholder="Contoh: Hukum Newton 1, 2, dan 3" value={materi} onChange={e=>setMateri(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Jumlah Jam Pelajaran (JP)</label>
                                <input type="number" required min="1" placeholder="Contoh: 2" value={jumlahJam} onChange={e=>setJumlahJam(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Guru Pengganti (Opsional)</label>
                                <input type="text" placeholder="Nama Guru Pengganti (Kosongkan jika tidak ada)" value={guruPengganti} onChange={e=>setGuruPengganti(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm" />
                            </div>
                        </div>

                        {kelasTerpilih && studentsInClass.length > 0 ? (
                            <div className="border border-slate-200/80 rounded-2xl overflow-hidden shadow-sm">
                                <div className="bg-slate-50 px-6 py-4 border-b border-slate-200/80 flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800 text-sm">Lembar Absensi: Kelas {kelasTerpilih}</h3>
                                    <span className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1 rounded-full">{studentsInClass.length} Siswa Terdaftar</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-200 text-slate-500 font-semibold bg-slate-50/50">
                                                <th className="p-4 w-12 text-center">No</th>
                                                <th className="p-4">Nama Siswa</th>
                                                <th className="p-4 text-center text-emerald-600">Hadir</th>
                                                <th className="p-4 text-center text-amber-500">Sakit</th>
                                                <th className="p-4 text-center text-blue-500">Izin</th>
                                                <th className="p-4 text-center text-rose-500">Alpa</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {studentsInClass.map((s, idx) => (
                                                <tr key={s.id} className="hover:bg-slate-50/20 transition">
                                                    <td className="p-4 text-center text-slate-400">{idx + 1}</td>
                                                    <td className="p-4">
                                                        <span className="font-semibold text-slate-800">{s.nama}</span>
                                                        <span className="text-[10px] text-slate-400 block font-mono mt-0.5">{s.nis}</span>
                                                    </td>
                                                    {['H', 'S', 'I', 'A'].map(status => (
                                                        <td key={status} className="p-4 text-center">
                                                            <input 
                                                                type="radio" 
                                                                name={`absen_${s.id}`} 
                                                                value={status}
                                                                checked={absensi[s.id] === status}
                                                                onChange={() => handleAbsenChange(s.id, status)}
                                                                className="w-5 h-5 cursor-pointer accent-indigo-600"
                                                            />
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : kelasTerpilih ? (
                            <div className="p-8 text-center text-amber-600 bg-amber-50 rounded-2xl border border-amber-200/50 text-sm font-medium">
                                Belum ada siswa yang didaftarkan pada kelas ini.
                            </div>
                        ) : null}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Catatan Kelas / Hambatan KBM</label>
                                <textarea rows="5" value={catatan} onChange={e=>setCatatan(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none resize-none text-sm placeholder-slate-300" placeholder="Hambatan pembelajaran hari ini..."></textarea>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Foto Dokumentasi KBM</label>
                                <div className="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 transition relative h-[142px] flex flex-col justify-center items-center">
                                    {fotoBase64 ? (
                                        <div className="relative">
                                            <img src={fotoBase64} alt="Preview" className="h-28 rounded-lg shadow-md mx-auto object-cover" />
                                            <button type="button" onClick={() => setFotoBase64(null)} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1 shadow hover:bg-rose-600 transition">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <IconImage className="mx-auto text-slate-300 mb-2" />
                                            <p className="text-xs text-slate-400 mb-1">Unggah dokumentasi kelas (.jpg, .png)</p>
                                            <input type="file" accept="image/*;capture=camera" onChange={handleImageUpload} className="block w-full text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="pt-6 border-t border-slate-100">
                            <button type="submit" disabled={isSubmitting || !kelasTerpilih || studentsInClass.length === 0} className="w-full py-4 bg-indigo-600 text-white text-base font-bold rounded-2xl shadow-xl shadow-indigo-600/10 hover:bg-indigo-700 transition duration-150 disabled:opacity-50">
                                {isSubmitting ? 'Menyimpan Semua Data...' : 'Simpan Jurnal &amp; Absensi Kelas'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const ViewRiwayat = ({ journals, deleteJournal, kop }) => {
            const [selectedJournal, setSelectedJournal] = useState(null);

            if (selectedJournal) {
                return <ViewDetailJurnal journal={selectedJournal} onClose={() => setSelectedJournal(null)} deleteJournal={deleteJournal} showDeleteBtn={true} kop={kop} />;
            }

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden print-hidden animate-in fade-in duration-200">
                    <div className="px-6 py-5 border-b border-slate-100 bg-slate-50/75 flex justify-between items-center">
                        <h2 className="text-base font-bold text-slate-800">Riwayat Jurnal KBM Guru</h2>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider bg-slate-50/30">
                                    <th className="p-4">Tanggal</th>
                                    <th className="p-4">Kelas</th>
                                    <th className="p-4">Mata Pelajaran</th>
                                    <th className="p-4">Pembahasan Materi</th>
                                    <th className="p-4 text-center">Kehadiran</th>
                                    <th className="p-4 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {journals.map(j => (
                                    <tr key={j.id} className="hover:bg-indigo-50/10 transition">
                                        <td className="p-4 text-sm font-medium text-slate-800 whitespace-nowrap">{j.tanggal}</td>
                                        <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                        <td className="p-4 text-sm font-semibold text-slate-700">{j.mapel}</td>
                                        <td className="p-4 text-sm text-slate-500 truncate max-w-[200px]">{j.materi}</td>
                                        <td className="p-4 text-center text-sm">
                                            <span className="text-emerald-600 font-extrabold">{j.rekap?.hadir || 0}</span>
                                            <span className="text-slate-300 mx-1">/</span>
                                            <span className="text-rose-500 font-extrabold">{j.rekap?.alpa || 0}</span>
                                        </td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => setSelectedJournal(j)} className="px-3 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition">
                                                Detail KBM
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ViewMonitoringJurnal = ({ journals, deleteJournal, kop }) => {
            const [selectedJournal, setSelectedJournal] = useState(null);

            if (selectedJournal) {
                return <ViewDetailJurnal journal={selectedJournal} onClose={() => setSelectedJournal(null)} deleteJournal={deleteJournal} showDeleteBtn={false} kop={kop} />;
            }

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden print-hidden animate-in fade-in duration-200">
                    <div className="px-6 py-5 border-b border-slate-100 bg-slate-50/75 flex justify-between items-center">
                        <h2 className="text-base font-bold text-slate-800">Pemantauan Jurnal Guru Terdaftar</h2>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider bg-slate-50/30">
                                    <th className="p-4">Guru Pengajar</th>
                                    <th className="p-4">Tanggal KBM</th>
                                    <th className="p-4">Kelas</th>
                                    <th className="p-4">Mapel</th>
                                    <th className="p-4">Materi Pembelajaran</th>
                                    <th className="p-4 text-center">Detail</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {journals.map(j => (
                                    <tr key={j.id} className="hover:bg-indigo-50/10 transition">
                                        <td className="p-4 text-sm font-semibold text-slate-800">{j.guru_nama}</td>
                                        <td className="p-4 text-sm text-slate-500">{j.tanggal}</td>
                                        <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                        <td className="p-4 text-sm text-slate-600 font-medium">{j.mapel}</td>
